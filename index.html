<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>市價徵收查估作業-地標距離（穩定最終版）</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }

#panel{
position:absolute;top:12px;right:12px;width:320px;
background: linear-gradient(135deg,#ffffff,#f3f7ff);
padding:14px;z-index:1000;border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
font-size:13px;border:1px solid #e6e9ff;
}

#panel h3{margin:0 0 8px 0;color:#1e3a8a;}

#panel input{width:95%;padding:6px;margin:3px 0;
border-radius:8px;border:1px solid #cbd5e1;}

#panel label{
display:grid;grid-template-columns:18px 1fr;
align-items:center;column-gap:8px;padding:4px 6px;
border-radius:8px;cursor:pointer;
}

#panel label:hover{background:#e0ecff;}

#panel button{
width:100%;margin-top:6px;padding:8px;border:none;
border-radius:10px;cursor:pointer;font-weight:bold;
background:#2563eb;color:white;
}

#panel button.clear-btn{background:#10b981;}

#status{
margin-top:6px;padding:6px;background:#fff7ed;
border-radius:8px;color:#c2410c;font-size:12px;
}

#resultPanel{
position:absolute;top:120px;left:120px;width:40%;
max-width:600px;background:white;border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
z-index:999;overflow:hidden;
}

#resultHeader{
background:#2563eb;color:white;padding:8px;
font-weight:bold;display:flex;
justify-content:space-between;align-items:center;
}

#resultHeader button{
background:#10b981;border:none;color:white;
padding:4px 8px;border-radius:6px;cursor:pointer;
font-size:12px;
}

#resultTableWrapper{max-height:180px;overflow-y:auto;}

table{width:100%;border-collapse:collapse;font-size:12px;}
td,th{border:1px solid #e5e7eb;padding:6px;}
th{background:#dbeafe;position:sticky;top:0;}

#routeInfo{
margin-top:10px;padding:8px;background:#eff6ff;
border-radius:10px;color:#1d4ed8;font-weight:bold;
}
</style>
</head>

<body>

<div id="panel">
<h3>GIS 查詢</h3>

緯度:<input id="lat" value="25.04024">
經度:<input id="lon" value="121.43148">
半徑(m):<input id="radius" value="2000">

<h3>類型</h3>

<label><input type="checkbox" value="station">交通運輸-接近大型車站之程度</label>
<label><input type="checkbox" value="bus_stop">交通運輸-站牌之接近程度或密集程度</label>
<label><input type="checkbox" value="motorway_junction">交通運輸-交流道之有無及接近交流道之程度</label>

<label><input type="checkbox" value="school" checked>公共建設-接近學校之程度(國小、國中、高中、大專院校)</label>
<label><input type="checkbox" value="marketplace">公共建設-接近市場之程度(傳統市場、超級市場、超大型購物中心)</label>
<label><input type="checkbox" value="park">公共建設-接近公園(里鄰公園、一般公園)、廣場、徒步區之程度</label>
<label><input type="checkbox" value="tourism">公共建設-接近觀光遊憩設施之程度</label>
<label><input type="checkbox" value="parking">公共建設-停車場地之便利程度</label>
<label><input type="checkbox" value="bank">公共建設-接近服務性設施的程度(郵局、銀行、醫院、機關等設施)</label>

<button onclick="runQuery()">查詢</button>
<button class="clear-btn" onclick="clearRoute()">清除路線</button>

<div id="status">狀態：待命</div>
<div id="routeInfo">路線距離：尚未計算</div>
</div>

<div id="resultPanel">
<div id="resultHeader">
查詢結果
<button onclick="exportExcel()">Excel</button>
</div>

<div id="resultTableWrapper">
<table>
<thead>
<tr><th>名稱</th><th>類型</th><th>距離</th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<div id="map"></div>

<script>

let map=L.map('map').setView([25.04024,121.43148],15);

L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',{
maxZoom:19
}).addTo(map);

let markerLayer=L.layerGroup().addTo(map);
let origin=null;
let results=[];
let routeLayer=null;
let circleLayer=null;
let userMarker=null;

/* 🔴 紅色定位 icon */
const redIcon=L.icon({
iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
shadowUrl:"https://unpkg.com/leaflet@1.9.3/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41]
});

/* ✅ 補回定位功能 */
map.on('click',e=>{
const lat=e.latlng.lat;
const lon=e.latlng.lng;

document.getElementById("lat").value=lat.toFixed(6);
document.getElementById("lon").value=lon.toFixed(6);

origin=[lat,lon];

if(userMarker) map.removeLayer(userMarker);

userMarker=L.marker([lat,lon],{icon:redIcon}).addTo(map);

/* 畫半徑 */
if(circleLayer) map.removeLayer(circleLayer);

circleLayer=L.circle([lat,lon],{
radius:+document.getElementById("radius").value,
color:'blue',
fillOpacity:0.15
}).addTo(map);
});

/* 查詢（穩定版） */
async function fetchOverpass(query){

const servers=[
"https://overpass-api.de/api/interpreter",
"https://overpass.kumi.systems/api/interpreter",
"https://lz4.overpass-api.de/api/interpreter"
];

for(const url of servers){
try{
const res=await fetch(url,{
method:"POST",
body:"data="+encodeURIComponent(query),
headers:{"Content-Type":"application/x-www-form-urlencoded"}
});
if(res.ok){
const data=await res.json();
if(data?.elements) return data;
}
}catch(e){}
}

throw new Error("fail");
}

async function runQuery(){

const lat=+document.getElementById("lat").value;
const lon=+document.getElementById("lon").value;
const r=+document.getElementById("radius").value;

document.getElementById("status").innerText="查詢中...";

tbody.innerHTML="";
markerLayer.clearLayers();

const query=`[out:json];nwr(around:${r},${lat},${lon});out center;`;

try{

const data=await fetchOverpass(query);

if(!data.elements.length){
document.getElementById("status").innerText="查詢完成：無資料";
return;
}

data.elements.forEach(e=>{
const lat2=e.center?.lat||e.lat;
const lon2=e.center?.lon||e.lon;

L.marker([lat2,lon2],{icon:redIcon}).addTo(markerLayer);
});

document.getElementById("status").innerText="查詢成功："+data.elements.length+" 筆";

}catch(e){
document.getElementById("status").innerText="查詢失敗";
}
}

function clearRoute(){
if(routeLayer) map.removeLayer(routeLayer);
document.getElementById("routeInfo").innerText="路線距離：尚未計算";
}

function exportExcel(){}

</script>

</body>
</html>
