<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>新北市大專院校租金 GIS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, "Segoe UI";
}

#map {
  position: absolute;
  left: 0;
  top: 0;
  width: calc(100% - 380px);
  height: 100vh;
}

#panel {
  position: absolute;
  right: 0;
  top: 0;
  width: 380px;
  height: 100vh;
  background: rgba(255,255,255,0.92);
  border-left: 1px solid #e5e7eb;
  display: flex;
  flex-direction: column;
}

#filterBox {
  padding: 10px;
  border-bottom: 1px solid #eee;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

select {
  padding: 6px;
}

#list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.card {
  padding: 10px;
  margin-bottom: 8px;
  background: #f3f4f6;
  border-radius: 8px;
  cursor: pointer;
}

.card.active {
  background: #dbeafe;
  border: 1px solid #3b82f6;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <div id="filterBox">
    <select id="district">
      <option value="all">全部行政區</option>
      <option value="新莊">新莊</option>
      <option value="泰山">泰山</option>
      <option value="板橋">板橋</option>
      <option value="淡水">淡水</option>
      <option value="三峽">三峽</option>
      <option value="林口">林口</option>
      <option value="中和">中和</option>
      <option value="新店">新店</option>
      <option value="深坑">深坑</option>
    </select>

    <select id="season">
      <option value="all">請選季別</option>
      <option value="2025-Q1">2025 Q1</option>
      <option value="2025-Q2">2025 Q2</option>
      <option value="2025-Q3">2025 Q3</option>
      <option value="2025-Q4">2025 Q4</option>
    </select>
  </div>

  <div id="list"></div>
</div>

<script>

const map = L.map('map').setView([25.05,121.45], 11);

L.tileLayer(
  'https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}',
  { maxZoom: 18 }
).addTo(map);

// ===================== 你的 DATA（完全不動） =====================
const data = [
  {name:"輔仁大學", district:"新莊", lat:25.0355, lng:121.4315, season:"2025-Q1", rents:{雅房:9000, 套房:12000, 整層:20000}},
  {name:"輔仁大學", district:"新莊", lat:25.0355, lng:121.4315, season:"2025-Q2", rents:{雅房:9100, 套房:12100, 整層:20100}},
  {name:"輔仁大學", district:"新莊", lat:25.0355, lng:121.4315, season:"2025-Q3", rents:{雅房:9200, 套房:12200, 整層:20200}},
  {name:"輔仁大學", district:"新莊", lat:25.0355, lng:121.4315, season:"2025-Q4", rents:{雅房:9300, 套房:12300, 整層:20300}},

  {name:"致理科大", district:"板橋", lat:25.0208, lng:121.4643, season:"2025-Q1", rents:{雅房:11000, 套房:13000, 整層:22000}},
  {name:"致理科大", district:"板橋", lat:25.0208, lng:121.4643, season:"2025-Q2", rents:{雅房:11200, 套房:13200, 整層:22200}},
  {name:"致理科大", district:"板橋", lat:25.0208, lng:121.4643, season:"2025-Q3", rents:{雅房:11300, 套房:13300, 整層:22300}},
  {name:"致理科大", district:"板橋", lat:25.0208, lng:121.4643, season:"2025-Q4", rents:{雅房:11500, 套房:13500, 整層:22500}},

  {name:"亞東科大", district:"板橋", lat:24.9951, lng:121.4531, season:"2025-Q1", rents:{雅房:10800, 套房:12800, 整層:21000}},
  {name:"亞東科大", district:"板橋", lat:24.9951, lng:121.4531, season:"2025-Q2", rents:{雅房:10900, 套房:12900, 整層:21100}},
  {name:"亞東科大", district:"板橋", lat:24.9951, lng:121.4531, season:"2025-Q3", rents:{雅房:11000, 套房:13000, 整層:21200}},
  {name:"亞東科大", district:"板橋", lat:24.9951, lng:121.4531, season:"2025-Q4", rents:{雅房:11100, 套房:13100, 整層:21300}},

  {name:"淡江大學", district:"淡水", lat:25.1762, lng:121.4510, season:"2025-Q1", rents:{雅房:8000, 套房:10000, 整層:18000}},
  {name:"淡江大學", district:"淡水", lat:25.1762, lng:121.4510, season:"2025-Q2", rents:{雅房:8100, 套房:10100, 整層:18100}},
  {name:"淡江大學", district:"淡水", lat:25.1762, lng:121.4510, season:"2025-Q3", rents:{雅房:8200, 套房:10200, 整層:18200}},
  {name:"淡江大學", district:"淡水", lat:25.1762, lng:121.4510, season:"2025-Q4", rents:{雅房:8300, 套房:10300, 整層:18300}},

  {name:"真理大學", district:"淡水", lat:25.1751, lng:121.4325, season:"2025-Q1", rents:{雅房:7500, 套房:9500, 整層:17000}},
  {name:"真理大學", district:"淡水", lat:25.1751, lng:121.4325, season:"2025-Q2", rents:{雅房:7600, 套房:9600, 整層:17100}},
  {name:"真理大學", district:"淡水", lat:25.1751, lng:121.4325, season:"2025-Q3", rents:{雅房:7700, 套房:9700, 整層:17200}},
  {name:"真理大學", district:"淡水", lat:25.1751, lng:121.4325, season:"2025-Q4", rents:{雅房:7800, 套房:9800, 整層:17300}}
];

// ===================== STATE =====================
let markerLayer = L.layerGroup().addTo(map);
let circleLayer = L.layerGroup().addTo(map);

let currentData = [];
let selectedSchool = null;

// ===================== MAP DRAW =====================
function drawCircle(lat,lng){
  circleLayer.clearLayers();

  L.circle([lat,lng],{
    radius:2000,
    color:"#3b82f6",
    fillColor:"#93c5fd",
    fillOpacity:0.25
  }).addTo(circleLayer);
}

function go(lat,lng,name){
  selectedSchool = name;

  drawCircle(lat,lng);

  map.fitBounds(
    L.circle([lat,lng],{radius:2000}).getBounds(),
    {padding:[40,40]}
  );

  render(currentData);
}

// ===================== RENDER =====================
function render(list){

  markerLayer.clearLayers();

  const el = document.getElementById("list");
  el.innerHTML = "";

  const grouped = {};
  list.forEach(d=>{
    if(!grouped[d.name]) grouped[d.name]=[];
    grouped[d.name].push(d);
  });

  Object.keys(grouped).forEach(name=>{
    const first = grouped[name][0];

    L.marker([first.lat, first.lng])
      .addTo(markerLayer)
      .on("click",()=>go(first.lat,first.lng,name));

    const card = document.createElement("div");
    card.className = "card" + (selectedSchool===name ? " active":"");
    card.innerHTML = name;
    card.onclick = ()=>go(first.lat,first.lng,name);

    el.appendChild(card);
  });
}

// ===================== UPDATE VIEW =====================
function updateView(){

  const d = document.getElementById("district").value;
  const s = document.getElementById("season").value;

  selectedSchool = null;
  markerLayer.clearLayers();
  circleLayer.clearLayers();

  if(d==="all" || s==="all"){
    document.getElementById("list").innerHTML =
      "請選行政區與季別";
    return;
  }

  currentData = data.filter(x =>
    x.district === d && x.season === s
  );

  if(currentData.length === 0){
    document.getElementById("list").innerHTML = "查無資料";
    return;
  }

  render(currentData);

  // ⭐只做一次 auto focus（不再重複 render / go）
  const first = currentData[0];
  go(first.lat, first.lng, first.name);
}

// ===================== EVENTS =====================
document.getElementById("district").onchange = updateView;
document.getElementById("season").onchange = updateView;

updateView();

</script>

</body>
</html>
