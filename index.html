<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>都市計畫圖層整合系統 v1.0</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* 側邊欄 */
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom: 1px solid #ddd;
        }
        
        .sidebar-header h1 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .sidebar-header p {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .sidebar-content {
            flex: 1;
            padding: 20px;
        }
        
        /* 地圖容器 */
        #map {
            flex: 1;
            position: relative;
        }
        
        /* 圖層分類 */
        .layer-section {
            margin-bottom: 30px;
        }
        
        .layer-section-title {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }
        
        .layer-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            background: #f9f9f9;
        }
        
        .layer-item:hover {
            background: #eef1f7;
            transform: translateX(4px);
        }
        
        .layer-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 10px;
            accent-color: #667eea;
        }
        
        .layer-info {
            flex: 1;
        }
        
        .layer-name {
            font-size: 13px;
            font-weight: 500;
            color: #333;
        }
        
        .layer-source {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }
        
        .layer-status {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 3px;
            margin-left: 8px;
        }
        
        .status-loading {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-ok {
            background: #d4edda;
            color: #155724;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        /* 透明度控制 */
        .opacity-control {
            margin-top: 15px;
            padding: 12px;
            background: #f0f0f0;
            border-radius: 6px;
            display: none;
        }
        
        .opacity-control.active {
            display: block;
        }
        
        .opacity-control label {
            font-size: 12px;
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
        }
        
        .opacity-control input[type="range"] {
            width: 100%;
            cursor: pointer;
            height: 5px;
        }
        
        .opacity-value {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            text-align: right;
        }
        
        /* 座標顯示 */
        .coordinates-display {
            position: fixed;
            bottom: 20px;
            left: 340px;
            background: white;
            padding: 12px 16px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: #667eea;
            min-width: 250px;
            z-index: 1000;
        }
        
        .coord-row {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
        }
        
        .coord-label {
            color: #999;
            margin-right: 10px;
        }
        
        /* 控制面板 */
        .control-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            z-index: 999;
        }
        
        .control-button {
            display: block;
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            color: #667eea;
            transition: all 0.2s;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .control-button:hover {
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }
        
        /* 搜尋欄 */
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        /* 加載動畫 */
        .loader {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 按鈕樣式 */
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: #667eea;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: #764ba2;
        }
        
        /* 訊息提示 */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 15px 20px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 2000;
            animation: slideIn 0.3s ease-out;
        }
        
        .toast.success {
            background: #28a745;
        }
        
        .toast.error {
            background: #dc3545;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* 響應式設計 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid #ddd;
            }
            
            .container {
                flex-direction: column;
            }
            
            #map {
                height: 60vh;
            }
            
            .coordinates-display {
                left: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左側邊欄 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-map"></i> 都市計畫圖層</h1>
                <p>Urban Planning Map Viewer v1.0</p>
            </div>
            
            <div class="sidebar-content">
                <!-- 搜尋欄 -->
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 搜尋圖層...">
                </div>
                
                <!-- 底圖圖層 -->
                <div class="layer-section">
                    <div class="layer-section-title">底圖 (Base Maps)</div>
                    
                    <div class="layer-item">
                        <input type="checkbox" id="nlsc-cadastral" data-layer="nlsc-cadastral" checked>
                        <div class="layer-info">
                            <div class="layer-name">NLSC 地籍圖</div>
                            <div class="layer-source">國土測繪中心</div>
                        </div>
                        <span class="layer-status status-ok">✓ 就緒</span>
                    </div>
                    
                    <div class="layer-item">
                        <input type="checkbox" id="nlsc-electronic" data-layer="nlsc-electronic">
                        <div class="layer-info">
                            <div class="layer-name">NLSC 電子地圖</div>
                            <div class="layer-source">國土測繪中心</div>
                        </div>
                        <span class="layer-status status-ok">✓ 就緒</span>
                    </div>
                    
                    <div class="opacity-control active" id="opacity-nlsc">
                        <label>透明度調整</label>
                        <input type="range" min="0" max="100" value="100" class="opacity-slider">
                        <div class="opacity-value">不透明度: <span class="opacity-percent">100</span>%</div>
                    </div>
                </div>
                
                <!-- 都市計畫圖層 -->
                <div class="layer-section">
                    <div class="layer-section-title">都市計畫圖層</div>
                    
                    <div class="layer-item">
                        <input type="checkbox" id="ntpc-urban-plan" data-layer="ntpc-urban-plan">
                        <div class="layer-info">
                            <div class="layer-name">新北市都計圖</div>
                            <div class="layer-source">新北市政府 GeoServer</div>
                        </div>
                        <span class="layer-status status-error">⚠ 未連接</span>
                    </div>
                    
                    <div class="opacity-control" id="opacity-ntpc">
                        <label>透明度調整</label>
                        <input type="range" min="0" max="100" value="70" class="opacity-slider">
                        <div class="opacity-value">不透明度: <span class="opacity-percent">70</span>%</div>
                    </div>
                </div>
                
                <!-- 行政邊界 -->
                <div class="layer-section">
                    <div class="layer-section-title">行政邊界</div>
                    
                    <div class="layer-item">
                        <input type="checkbox" id="osm-boundary" data-layer="osm-boundary">
                        <div class="layer-info">
                            <div class="layer-name">OSM 行政區域</div>
                            <div class="layer-source">OpenStreetMap</div>
                        </div>
                        <span class="layer-status status-ok">✓ 就緒</span>
                    </div>
                </div>
                
                <!-- 工具按鈕 -->
                <button class="btn" onclick="exportData()">
                    <i class="fas fa-download"></i> 匯出 GeoJSON
                </button>
                <button class="btn" onclick="showCoordinateInfo()">
                    <i class="fas fa-info-circle"></i> 座標資訊
                </button>
            </div>
        </div>
        
        <!-- 地圖容器 -->
        <div id="map"></div>
        
        <!-- 座標顯示 -->
        <div class="coordinates-display" id="coordinatesDisplay">
            <div class="coord-row">
                <span class="coord-label">經度 (Lng):</span>
                <span id="coord-lng">-</span>
            </div>
            <div class="coord-row">
                <span class="coord-label">緯度 (Lat):</span>
                <span id="coord-lat">-</span>
            </div>
            <div class="coord-row">
                <span class="coord-label">縮放級別:</span>
                <span id="coord-zoom">-</span>
            </div>
            <div class="coord-row">
                <span class="coord-label">座標系統:</span>
                <span id="coord-system">WGS84</span>
            </div>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <button class="control-button" title="定位到台北" onclick="goToTaipei()">
                <i class="fas fa-map-pin"></i>
            </button>
            <button class="control-button" title="全屏顯示" onclick="toggleFullscreen()">
                <i class="fas fa-expand"></i>
            </button>
            <button class="control-button" title="刷新地圖" onclick="refreshLayers()">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>
    
    <!-- Leaflet JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <script>
        // 全局變數
        let map;
        const layers = {};
        const activeLayers = {};
        
        // 初始化地圖
        function initMap() {
            map = L.map('map').setView([25.0330, 121.5654], 10); // 台北市中心
            
            // 添加 NLSC 地籍圖（WMTS）
            const nlscCadastral = L.tileLayer(
                'https://tiles.moi.gov.tw/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&STYLE=default&TILEMATRIXSET=GoogleMapsCompatible_Level{z}&FORMAT=image/png&LAYER=CADASTRAL&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}',
                {
                    minZoom: 5,
                    maxZoom: 18,
                    attribution: '© <a href="https://www.nlsc.gov.tw/">國土測繪中心</a>'
                }
            );
            
            // 添加 NLSC 電子地圖
            const nlscElectronic = L.tileLayer(
                'https://tiles.moi.gov.tw/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&STYLE=default&TILEMATRIXSET=GoogleMapsCompatible_Level{z}&FORMAT=image/png&LAYER=EMAP10&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}',
                {
                    minZoom: 5,
                    maxZoom: 18,
                    attribution: '© <a href="https://www.nlsc.gov.tw/">國土測繪中心</a>'
                }
            );
            
            // 添加 OSM 邊界（GeoJSON示例）
            const osmBoundary = L.geoJSON(null, {
                style: {
                    color: '#667eea',
                    weight: 2,
                    opacity: 0.7,
                    fillOpacity: 0.1
                }
            });
            
            // 儲存圖層參考
            layers['nlsc-cadastral'] = nlscCadastral;
            layers['nlsc-electronic'] = nlscElectronic;
            layers['osm-boundary'] = osmBoundary;
            
            // 預設加載 NLSC 地籍圖
            nlscCadastral.addTo(map);
            activeLayers['nlsc-cadastral'] = nlscCadastral;
            
            // 綁定事件
            map.on('mousemove', updateCoordinates);
            map.on('zoomend', updateZoomLevel);
            
            // 綁定圖層切換
            setupLayerControls();
        }
        
        // 設置圖層控制
        function setupLayerControls() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const layerId = this.dataset.layer;
                    const isChecked = this.checked;
                    const opacityControl = document.getElementById(`opacity-${layerId.split('-')[0]}`);
                    
                    if (isChecked) {
                        // 添加圖層
                        if (layers[layerId] && !activeLayers[layerId]) {
                            layers[layerId].addTo(map);
                            activeLayers[layerId] = layers[layerId];
                            showToast(`✓ 已加載 ${this.parentElement.querySelector('.layer-name').textContent}`, 'success');
                            
                            // 顯示透明度控制
                            if (opacityControl) {
                                opacityControl.classList.add('active');
                            }
                        }
                    } else {
                        // 移除圖層
                        if (layers[layerId] && activeLayers[layerId]) {
                            map.removeLayer(layers[layerId]);
                            delete activeLayers[layerId];
                            showToast(`✗ 已移除 ${this.parentElement.querySelector('.layer-name').textContent}`, 'success');
                            
                            // 隱藏透明度控制
                            if (opacityControl) {
                                opacityControl.classList.remove('active');
                            }
                        }
                    }
                });
            });
            
            // 透明度調整
            document.querySelectorAll('.opacity-slider').forEach(slider => {
                slider.addEventListener('input', function() {
                    const opacityValue = this.value / 100;
                    const parentSection = this.closest('.opacity-control');
                    const layerPrefix = parentSection.id.split('-')[1];
                    
                    // 應用到相應的圖層
                    Object.keys(activeLayers).forEach(layerId => {
                        if (layerId.includes(layerPrefix)) {
                            activeLayers[layerId].setOpacity(opacityValue);
                        }
                    });
                    
                    this.parentElement.querySelector('.opacity-percent').textContent = this.value;
                });
            });
        }
        
        // 更新座標顯示
        function updateCoordinates(e) {
            document.getElementById('coord-lng').textContent = e.latlng.lng.toFixed(6);
            document.getElementById('coord-lat').textContent = e.latlng.lat.toFixed(6);
        }
        
        // 更新縮放級別
        function updateZoomLevel() {
            document.getElementById('coord-zoom').textContent = map.getZoom();
        }
        
        // 定位到台北
        function goToTaipei() {
            map.setView([25.0330, 121.5654], 11);
            showToast('✓ 已定位到台北市', 'success');
        }
        
        // 全屏功能
        function toggleFullscreen() {
            const mapElement = document.getElementById('map');
            if (!document.fullscreenElement) {
                mapElement.requestFullscreen().catch(err => {
                    showToast('✗ 全屏請求失敗', 'error');
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        // 刷新圖層
        function refreshLayers() {
            showToast('🔄 正在刷新圖層...');
            
            // 重新加載所有活躍圖層
            setTimeout(() => {
                Object.keys(activeLayers).forEach(layerId => {
                    if (activeLayers[layerId].redraw) {
                        activeLayers[layerId].redraw();
                    }
                });
                showToast('✓ 圖層已刷新', 'success');
            }, 1000);
        }
        
        // 匯出 GeoJSON
        function exportData() {
            const data = {
                type: 'FeatureCollection',
                features: [],
                metadata: {
                    timestamp: new Date().toISOString(),
                    layers: Object.keys(activeLayers)
                }
            };
            
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `urban-plan-export-${Date.now()}.geojson`;
            a.click();
            
            showToast('✓ 已匯出 GeoJSON 文件', 'success');
        }
        
        // 顯示座標資訊
        function showCoordinateInfo() {
            const center = map.getCenter();
            const zoom = map.getZoom();
            showToast(`📍 中心座標: ${center.lat.toFixed(4)}, ${center.lng.toFixed(4)} | 縮放: ${zoom}`, 'success');
        }
        
        // 提示訊息
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // 搜尋功能
        document.getElementById('searchInput')?.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.layer-item').forEach(item => {
                const name = item.querySelector('.layer-name').textContent.toLowerCase();
                const source = item.querySelector('.layer-source').textContent.toLowerCase();
                
                if (name.includes(query) || source.includes(query)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        });
        
        // 頁面加載時初始化
        document.addEventListener('DOMContentLoaded', initMap);
        
        // 防止地圖被意外選中
        document.getElementById('map').addEventListener('selectstart', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
