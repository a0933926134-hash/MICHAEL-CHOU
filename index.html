<script>
let map = L.map('map').setView([25.012098, 121.465675], 15);

/* =========================================================
   GIS 多底圖架構（合法替代 Google Maps）
   ========================================================= */

const nlscEMAP = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:19,
    attribution:'© NLSC'
});

const nlscPHOTO = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:20,
    attribution:'© NLSC 正射影像'
});

const osmLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19,
    attribution:'© OpenStreetMap contributors'
});

const esriWorldImagery = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
    maxZoom:19,
    attribution:'© Esri World Imagery'
});

nlscEMAP.addTo(map);

const cadastralLayer = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/CADASTRAL/default/GoogleMapsCompatible/{z}/{y}/{x}',
{
    maxZoom:20,
    opacity:0.75,
    attribution:'© NLSC 地籍圖'
}
);

cadastralLayer.addTo(map);

const baseMaps = {
    "NLSC 電子地圖": nlscEMAP,
    "NLSC 正射影像": nlscPHOTO,
    "OpenStreetMap": osmLayer,
    "ESRI 衛星影像": esriWorldImagery
};

const nlscDEM = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP5_OPENDATA/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:18,
    opacity:0.45,
    attribution:'© NLSC DEM'
});

const overlayMaps = {
    "地籍圖": cadastralLayer,
    "DEM 地形": nlscDEM
};

L.control.layers(baseMaps, overlayMaps,{
    collapsed:false,
    position:'topright'
}).addTo(map);

const scaleControl = L.control({ position: 'bottomleft' });

scaleControl.onAdd = function () {
this._div = L.DomUtil.create('div', 'scale-denominator');
this._div.style.background = 'rgba(255,255,255,0.9)';
this._div.style.padding = '4px 8px';
this._div.style.borderRadius = '6px';
this._div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.3)';
this._div.style.fontSize = '12px';
this._div.style.fontWeight = 'bold';
this._div.style.marginBottom = '42px';
this.update();
return this._div;
};

scaleControl.update = function () {
const center = map.getCenter();
const zoom = map.getZoom();
const metersPerPixel = 40075016.686 * Math.abs(Math.cos(center.lat * Math.PI / 180)) / Math.pow(2, zoom + 8);
const dpi = 96;
const scale = metersPerPixel * dpi / 0.0254;
const rounded = Math.round(scale / 100) * 100;
this._div.innerHTML = `比例尺 1:${rounded.toLocaleString()}`;
};

scaleControl.addTo(map);
map.on('zoomend moveend', () => {
    scaleControl.update();
});

let markerLayer=L.layerGroup().addTo(map);
  
const latInput=document.getElementById("lat");
const lonInput=document.getElementById("lon");
const radiusInput=document.getElementById("radius");
const tbody=document.getElementById("tbody");
const routeInfo=document.getElementById("routeInfo");
const queryBtn=document.getElementById("query-btn");

let userMarker=null;
let origin=null;
let results=[];

let sortState = { distance:true, route:true };
let routeLayer=null;

origin=[25.012098,121.465675];

userMarker=L.marker(origin,{
icon:L.divIcon({
className:'',
html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
iconSize:[18,18],
iconAnchor:[9,9]
}),
interactive:false
}).addTo(map);

/* ====================================================================
    ★ 多邊形繪製系統 v2.0
    支持：多邊形、獨立編輯、選取、量取
   ==================================================================== */

let isDrawingPolygon = false;
let drawPoints = [];       
let previewPolyline = null;
let drawMarkers = L.layerGroup().addTo(map);
let polygonLayer = L.layerGroup().addTo(map);
let polygonsList = [];  // 存儲所有多邊形
let selectedPolygonId = null;  // 當前選中的多邊形
let centroidMarkers = L.layerGroup().addTo(map);  // 存儲形心標記
let polygonLabels = L.layerGroup().addTo(map);  // 存儲多邊形標籤

/* 繪製控制工具 */
const drawControl = L.control({ position: 'topleft' });
drawControl.onAdd = function() {
    const div = L.DomUtil.create('div', 'draw-control-bar');
    div.innerHTML = `
        <button id="btn-start-draw" class="draw-btn" onclick="toggleDrawMode(this)">📐 繪製新範圍</button>
        <button id="btn-end-draw" class="draw-btn" onclick="finishPolygon()" style="display:none; background:#10b981; color:white;">✓ 完成閉合</button>
        <button id="btn-export-all-shp" class="draw-btn shp-btn" onclick="exportAllPolygonsSHP()" style="display:none;">📥 匯出全部 SHP</button>
        <button id="btn-export-all-geojson" class="draw-btn shp-btn" onclick="exportAllPolygonsGeoJSON()" style="display:none;">📥 匯出全部 GeoJSON</button>
        <label id="lbl-import-shp" class="shp-import-label">📤 匯入範圍 (SHP.zip 或 GeoJSON)
            <input type="file" id="shp-file-input" accept=".zip,.geojson,.json" style="display:none;" onchange="importPolygonSHP(event)">
        </label>
        <button id="btn-clear-draw" class="draw-btn" onclick="clearPolygon()" style="display:none; background:#6b7280; color:white;">✕ 清除繪製</button>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
};
drawControl.addTo(map);

const resPanel = document.getElementById("resultPanel");
const sidePanel = document.getElementById("panel");
const polyPanel = document.getElementById("polygonPanel");
const slopePanel = document.getElementById("slopePanel");
L.DomEvent.disableClickPropagation(resPanel);
L.DomEvent.disableClickPropagation(sidePanel);
L.DomEvent.disableClickPropagation(polyPanel);
L.DomEvent.disableClickPropagation(slopePanel);

/* ====================================================================
    ★ 面板拖曳功能
   ==================================================================== */

function makePanelDraggable(panelId, headerId) {
    const panel = document.getElementById(panelId);
    const header = document.getElementById(headerId);
    let isMouseDown = false;
    let offset = { x: 0, y: 0 };

    header.addEventListener('mousedown', (e) => {
        isMouseDown = true;
        offset.x = e.clientX - panel.offsetLeft;
        offset.y = e.clientY - panel.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {
        if (!isMouseDown) return;
        
        let newX = e.clientX - offset.x;
        let newY = e.clientY - offset.y;
        
        // 限制邊界
        newX = Math.max(0, Math.min(newX, window.innerWidth - panel.offsetWidth));
        newY = Math.max(0, Math.min(newY, window.innerHeight - panel.offsetHeight));
        
        panel.style.left = newX + 'px';
        panel.style.top = newY + 'px';
    });

    document.addEventListener('mouseup', () => {
        isMouseDown = false;
    });
}

// 為地形坡度面板啟用拖曳
makePanelDraggable('slopePanel', 'slopeHeader');

// 為多邊形管理面板啟用拖曳
makePanelDraggable('polygonPanel', 'polygonHeader');

function toggleDrawMode(btn) {
    isDrawingPolygon = !isDrawingPolygon;
    if (isDrawingPolygon) {
        btn.classList.add('active');
        btn.innerText = "🛑 停止點選";
        document.getElementById('btn-end-draw').style.display = 'block';
        document.getElementById('btn-clear-draw').style.display = 'block';
        clearPolygonData();
        selectedPolygonId = null;
        updatePolygonListUI();
    } else {
        btn.classList.remove('active');
        btn.innerText = "📐 繪製新範圍";
        if (drawPoints.length === 0) {
            document.getElementById('btn-end-draw').style.display = 'none';
            document.getElementById('btn-clear-draw').style.display = 'none';
        }
    }
}

function clearPolygonData() {
    drawPoints = [];
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    drawMarkers.clearLayers();
}

function clearPolygon() {
    clearPolygonData();
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製新範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-clear-draw').style.display = 'none';
}

function finishPolygon() {
    if (drawPoints.length < 3) {
        alert("請至少點選 3 個以上的頂點才能閉合範圍！");
        return;
    }
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    
    // 創建新的多邊形對象
    const polygonId = Date.now();
    const pointsCopy = JSON.parse(JSON.stringify(drawPoints));
    
    const newPolygon = {
        id: polygonId,
        points: pointsCopy,
        centroid: null,
        polygon: null,
        markers: L.layerGroup(),
        isSelected: false,
        label: null,
        labelMarker: null
    };
    
    // 計算形心
    calculateCentroid(newPolygon);
    
    // 渲染多邊形
    renderPolygon(newPolygon);
    
    // 加入列表
    polygonsList.push(newPolygon);
    
    // 重置繪製模式
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製新範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-export-all-shp').style.display = 'block';
    document.getElementById('btn-export-all-geojson').style.display = 'block';
    
    // 更新 UI
    clearPolygonData();
    updatePolygonListUI();
}

function calculateCentroid(polygon) {
    if (!polygon.points || polygon.points.length < 3) return;
    
    let coordinates = polygon.points.map(p => [p[1], p[0]]);
    if (coordinates[0][0] !== coordinates[coordinates.length-1][0] || 
        coordinates[0][1] !== coordinates[coordinates.length-1][1]) {
        coordinates.push([polygon.points[0][1], polygon.points[0][0]]);
    }
    
    let turfPoly = turf.polygon([coordinates]);
    let centroid = turf.centroid(turfPoly);
    
    polygon.centroid = {
        lat: centroid.geometry.coordinates[1],
        lon: centroid.geometry.coordinates[0]
    };
}

function renderPolygon(polygon) {
    if (polygon.polygon) {
        map.removeLayer(polygon.polygon);
    }
    polygon.markers.clearLayers();
    
    // 繪製多邊形
    polygon.polygon = L.polygon(polygon.points, {
        color: '#dc2626',
        weight: 2,
        fillColor: '#dc2626',
        fillOpacity: 0.2
    }).addTo(polygonLayer);
    
    // 點擊多邊形選中
    polygon.polygon.on('click', () => {
        selectPolygon(polygon.id);
    });
    
    // 繪製編輯控制點
    polygon.points.forEach((pt, index) => {
        let marker = L.marker(pt, {
            icon: L.divIcon({
                className: '',
                html: '<div class="edit-handle"></div>',
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            }),
            draggable: true
        });
        
        marker.on('drag', function(e) {
            let newLatLng = e.target.getLatLng();
            polygon.points[index] = [newLatLng.lat, newLatLng.lng];
            polygon.polygon.setLatLngs(polygon.points);
        });
        
        marker.on('dragend', function() {
            calculateCentroid(polygon);
            updateCentroidMarker(polygon);
        });
        
        marker.addTo(polygon.markers);
    });
    
    polygon.markers.addTo(map);
    
    // 繪製形心標記
    updateCentroidMarker(polygon);
}

function updateCentroidMarker(polygon) {
    centroidMarkers.clearLayers();
    polygonLabels.clearLayers();
    
    // 只顯示選中多邊形的形心
    if (selectedPolygonId === polygon.id && polygon.centroid) {
        // 紅色圓圈形心
        const centroidMarker = L.marker([polygon.centroid.lat, polygon.centroid.lon], {
            icon: L.divIcon({
                className: '',
                html: `<div style="width:20px;height:20px;background:transparent;border:3px solid #dc2626;border-radius:50%;box-shadow:inset 0 0 0 2px #dc2626, 0 0 0 3px rgba(220,38,38,0.3);"></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            }),
            interactive: false
        }).addTo(centroidMarkers);
        
        // 在形心上方顯示浮動標籤
        const idx = polygonsList.findIndex(p => p.id === polygon.id);
        const labelText = `範圍 #${idx + 1}`;
        
        const labelMarker = L.marker([polygon.centroid.lat, polygon.centroid.lon], {
            icon: L.divIcon({
                className: 'polygon-label',
                html: labelText,
                iconSize: null,
                iconAnchor: null
            }),
            interactive: false
        }).addTo(polygonLabels);
        
        polygon.labelMarker = labelMarker;
    }
}

function selectPolygon(polygonId) {
    // 取消之前的選擇
    if (selectedPolygonId !== null) {
        const prevPoly = polygonsList.find(p => p.id === selectedPolygonId);
        if (prevPoly) {
            prevPoly.isSelected = false;
            prevPoly.polygon.setStyle({color: '#dc2626', weight: 2, fillOpacity: 0.2});
            prevPoly.markers.clearLayers();
        }
    }
    
    // 選擇新多邊形
    selectedPolygonId = polygonId;
    const polygon = polygonsList.find(p => p.id === polygonId);
    if (polygon) {
        polygon.isSelected = true;
        polygon.polygon.setStyle({color: '#2563eb', weight: 3, fillOpacity: 0.35});
        
        // 重新繪製控制點
        polygon.points.forEach((pt, index) => {
            let marker = L.marker(pt, {
                icon: L.divIcon({
                    className: '',
                    html: '<div class="edit-handle"></div>',
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                }),
                draggable: true
            });
            
            marker.on('drag', function(e) {
                let newLatLng = e.target.getLatLng();
                polygon.points[index] = [newLatLng.lat, newLatLng.lng];
                polygon.polygon.setLatLngs(polygon.points);
            });
            
            marker.on('dragend', function() {
                calculateCentroid(polygon);
                updateCentroidMarker(polygon);
            });
            
            marker.addTo(polygon.markers);
        });
        
        polygon.markers.addTo(map);
        updateCentroidMarker(polygon);
        
        // 更新查詢中心點
        if (polygon.centroid) {
            latInput.value = polygon.centroid.lat.toFixed(6);
            lonInput.value = polygon.centroid.lon.toFixed(6);
            origin = [polygon.centroid.lat, polygon.centroid.lon];
            
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker([polygon.centroid.lat, polygon.centroid.lon], {
                icon: L.divIcon({
                    className: '',
                    html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
                    iconSize: [18, 18],
                    iconAnchor: [9, 9]
                }),
                interactive: false
            }).addTo(map);
        }
    }
    
    updatePolygonListUI();
}

function deletePolygon(polygonId) {
    const index = polygonsList.findIndex(p => p.id === polygonId);
    if (index !== -1) {
        const polygon = polygonsList[index];
        if (polygon.polygon) map.removeLayer(polygon.polygon);
        polygon.markers.clearLayers();
        polygonsList.splice(index, 1);
        
        if (selectedPolygonId === polygonId) {
            selectedPolygonId = null;
            centroidMarkers.clearLayers();
            polygonLabels.clearLayers();
        }
        
        updatePolygonListUI();
        
        if (polygonsList.length === 0) {
            document.getElementById('btn-export-all-shp').style.display = 'none';
            document.getElementById('btn-export-all-geojson').style.display = 'none';
        }
    }
}

function updatePolygonListUI() {
    const listDiv = document.getElementById('polygonList');
    const countSpan = document.getElementById('polygonCount');
    
    countSpan.textContent = polygonsList.length;
    
    if (polygonsList.length === 0) {
        listDiv.innerHTML = '<div style="color:#999;padding:20px 8px;text-align:center;">尚未繪製範圍</div>';
        return;
    }
    
    listDiv.innerHTML = polygonsList.map((polygon, idx) => {
        const area = calculatePolygonArea(polygon.points);
        const className = selectedPolygonId === polygon.id ? 'polygon-item active' : 'polygon-item';
        
        return `
            <div class="${className}" onclick="selectPolygon(${polygon.id})">
                <div class="polygon-item-title">範圍 #${idx + 1}</div>
                <div class="polygon-item-info">
                    <div>節點數：${polygon.points.length}</div>
                    <div>面積：${(area / 10000).toFixed(2)} 公頃</div>
                    <div>形心：${polygon.centroid?.lat.toFixed(6)}, ${polygon.centroid?.lon.toFixed(6)}</div>
                </div>
                <div class="polygon-item-actions">
                    <button class="query-btn" onclick="event.stopPropagation(); queryPolygon(${polygon.id})">量取</button>
                    <button class="delete-btn" onclick="event.stopPropagation(); deletePolygon(${polygon.id})">刪除</button>
                </div>
            </div>
        `;
    }).join('');
}

function calculatePolygonArea(points) {
    if (points.length < 3) return 0;
    let coordinates = points.map(p => [p[1], p[0]]);
    if (coordinates[0][0] !== coordinates[coordinates.length-1][0] || 
        coordinates[0][1] !== coordinates[coordinates.length-1][1]) {
        coordinates.push([points[0][1], points[0][0]]);
    }
    let turfPoly = turf.polygon([coordinates]);
    return turf.area(turfPoly);
}

function queryPolygon(polygonId) {
    const polygon = polygonsList.find(p => p.id === polygonId);
    if (polygon && polygon.centroid) {
        selectPolygon(polygonId);
        latInput.value = polygon.centroid.lat.toFixed(6);
        lonInput.value = polygon.centroid.lon.toFixed(6);
        origin = [polygon.centroid.lat, polygon.centroid.lon];
        
        // 觸發查詢
        setTimeout(() => runQuery(), 100);
    }
}

function exportAllPolygonsSHP() {
    if (polygonsList.length === 0) {
        alert("沒有範圍可以匯出");
        return;
    }
    
    try {
        let featureArray = [];
        
        polygonsList.forEach((polygon, idx) => {
            let ring = polygon.points.map(p => [Number(p[1]), Number(p[0])]);
            ring.push([Number(polygon.points[0][1]), Number(polygon.points[0][0])]);
            
            let tempPoly = turf.polygon([ring]);
            let areaSqm = Math.round(turf.area(tempPoly));
            
            featureArray.push({
                geometry: {
                    type: 'Polygon',
                    coordinates: [ring]
                },
                properties: {
                    Name: `Zone_${idx + 1}`,
                    Area_Sqm: areaSqm,
                    Centroid_Lat: polygon.centroid.lat,
                    Centroid_Lon: polygon.centroid.lon
                }
            });
        });
        
        shpwrite.download(featureArray);
    } catch (err) {
        console.error("SHP Export Error:", err);
        alert("SHP 匯出失敗，自動切換為 GeoJSON 格式");
        exportAllPolygonsGeoJSON();
    }
}

function exportAllPolygonsGeoJSON() {
    if (polygonsList.length === 0) {
        alert("沒有範圍可以匯出");
        return;
    }
    
    const features = polygonsList.map((polygon, idx) => {
        let ring = polygon.points.map(p => [Number(p[1]), Number(p[0])]);
        ring.push([Number(polygon.points[0][1]), Number(polygon.points[0][0])]);
        
        let tempPoly = turf.polygon([ring]);
        let areaSqm = Math.round(turf.area(tempPoly));
        
        return {
            type: "Feature",
            geometry: {
                type: "Polygon",
                coordinates: [ring]
            },
            properties: {
                Name: `Zone_${idx + 1}`,
                Area_Sqm: areaSqm,
                Centroid_Lat: polygon.centroid.lat,
                Centroid_Lon: polygon.centroid.lon
            }
        };
    });
    
    const geojsonObj = {
        type: "FeatureCollection",
        features: features
    };
    
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(geojsonObj, null, 2));
    const downloadAnchor = document.createElement('a');
    downloadAnchor.setAttribute("href", dataStr);
    downloadAnchor.setAttribute("download", "Polygons_Export.geojson");
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    downloadAnchor.remove();
}

function importPolygonSHP(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    
    reader.onload = async (e) => {
        try {
            let geojson = null;
            
            if (file.name.endsWith('.zip')) {
                const zip = new JSZip();
                const zipData = await zip.loadAsync(e.target.result);
                const shpFile = Object.keys(zipData.files).find(name => name.endsWith('.shp'));
                
                if (!shpFile) {
                    alert("未找到 .shp 文件");
                    return;
                }
                
                geojson = await shp(zipData);
            } else if (file.name.endsWith('.geojson') || file.name.endsWith('.json')) {
                geojson = JSON.parse(e.target.result);
            } else {
                alert("不支援的檔案格式");
                return;
            }
            
            if (!geojson || !geojson.features) {
                alert("無效的 GeoJSON 檔案");
                return;
            }
            
            geojson.features.forEach((feature) => {
                if (feature.geometry.type === 'Polygon') {
                    const ring = feature.geometry.coordinates[0];
                    const points = ring.map(coord => [coord[1], coord[0]]);
                    
                    if (points.length >= 3) {
                        const polygonId = Date.now() + Math.random();
                        const newPolygon = {
                            id: polygonId,
                            points: points,
                            centroid: null,
                            polygon: null,
                            markers: L.layerGroup(),
                            isSelected: false,
                            label: null,
                            labelMarker: null
                        };
                        
                        calculateCentroid(newPolygon);
                        renderPolygon(newPolygon);
                        polygonsList.push(newPolygon);
                    }
                }
            });
            
            document.getElementById('btn-export-all-shp').style.display = 'block';
            document.getElementById('btn-export-all-geojson').style.display = 'block';
            updatePolygonListUI();
            alert(`成功匯入 ${geojson.features.length} 個範圍`);
        } catch (err) {
            console.error("Import Error:", err);
            alert("匯入失敗：" + err.message);
        }
    };
    
    reader.readAsArrayBuffer(file);
}

// 地圖點擊事件：繪製多邊形
map.on('click', (e) => {
    if (!isDrawingPolygon) return;
    
    const latlng = e.latlng;
    drawPoints.push([latlng.lat, latlng.lng]);
    
    // 隱藏臨時點標記，只顯示預覽線
    if (drawPoints.length > 1) {
        if (previewPolyline) {
            map.removeLayer(previewPolyline);
        }
        previewPolyline = L.polyline(drawPoints, {
            color: '#2563eb',
            weight: 2,
            dashArray: '5, 5',
            opacity: 0.8
        }).addTo(map);
    }
});

// 地圖滑鼠移動事件：更新預覽線
map.on('mousemove', (e) => {
    if (!isDrawingPolygon || drawPoints.length === 0) return;
    
    const latlng = e.latlng;
    const tempPoints = [...drawPoints, [latlng.lat, latlng.lng]];
    
    if (previewPolyline) {
        map.removeLayer(previewPolyline);
    }
    previewPolyline = L.polyline(tempPoints, {
        color: '#2563eb',
        weight: 2,
        dashArray: '5, 5',
        opacity: 0.8
    }).addTo(map);
});

// ====== 模擬查詢函數 ======
function runQuery() {
    alert("查詢中：緯度 " + latInput.value + "，經度 " + lonInput.value + "，半徑 " + radiusInput.value + "m");
}

function getCurrentLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            latInput.value = lat.toFixed(6);
            lonInput.value = lon.toFixed(6);
            origin = [lat, lon];
            
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker([lat, lon], {
                icon: L.divIcon({
                    className: '',
                    html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
                    iconSize: [18,18],
                    iconAnchor: [9,9]
                }),
                interactive:false
            }).addTo(map);
            
            map.setView([lat, lon], 16);
        });
    } else {
        alert("瀏覽器不支援定位功能");
    }
}

function clearRoute() {
    routeInfo.innerText = "路線距離：尚未計算";
    if (routeLayer) {
        map.removeLayer(routeLayer);
        routeLayer = null;
    }
}

function sortResults(field) {
    if (results.length === 0) return;
    const ascending = sortState[field];
    results.sort((a, b) => {
        const valA = parseFloat(a[field]) || 0;
        const valB = parseFloat(b[field]) || 0;
        return ascending ? valA - valB : valB - valA;
    });
    sortState[field] = !ascending;
    renderResults();
}

function renderResults() {
    tbody.innerHTML = results.map(r => `
        <tr class="${r.highlight ? 'highlight' : ''}">
            <td>${r.name}</td>
            <td>${r.type}</td>
            <td>${r.distance.toFixed(0)}</td>
            <td>${r.route ? r.route.toFixed(0) : '-'}</td>
        </tr>
    `).join('');
}

function exportExcel() {
    if (results.length === 0) {
        alert("沒有資料可匯出");
        return;
    }
    
    const ws = XLSX.utils.json_to_sheet(results);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "查詢結果");
    XLSX.writeFile(wb, "查詢結果.xlsx");
}

function analyzeSlopeAction() {
    alert("坡度分析功能");
}
