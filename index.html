<script>
let map = L.map('map').setView([25.012098, 121.465675], 15);

const nlscEMAP = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',
{maxZoom:19, attribution:'© NLSC'});

const nlscPHOTO = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/EPSG:3857/{z}/{y}/{x}',
{maxZoom:20, attribution:'© NLSC 正射影像'});

const osmLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19, attribution:'© OpenStreetMap contributors'});

const esriWorldImagery = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19, attribution:'© Esri World Imagery'});

nlscEMAP.addTo(map);

const cadastralLayer = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/CADASTRAL/default/GoogleMapsCompatible/{z}/{y}/{x}',
{maxZoom:20, opacity:0.75, attribution:'© NLSC 地籍圖'});

cadastralLayer.addTo(map);

const baseMaps = {
    "NLSC 電子地圖": nlscEMAP,
    "NLSC 正射影像": nlscPHOTO,
    "OpenStreetMap": osmLayer,
    "ESRI 衛星影像": esriWorldImagery
};

const nlscDEM = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP5_OPENDATA/default/EPSG:3857/{z}/{y}/{x}',
{maxZoom:18, opacity:0.45, attribution:'© NLSC DEM'});

const overlayMaps = {
    "地籍圖": cadastralLayer,
    "DEM 地形": nlscDEM
};

L.control.layers(baseMaps, overlayMaps,{collapsed:false, position:'topright'}).addTo(map);

const scaleControl = L.control({ position: 'bottomleft' });
scaleControl.onAdd = function () {
    this._div = L.DomUtil.create('div', 'scale-denominator');
    this._div.style.background = 'rgba(255,255,255,0.9)';
    this._div.style.padding = '4px 8px';
    this._div.style.borderRadius = '6px';
    this._div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.3)';
    this._div.style.fontSize = '12px';
    this._div.style.fontWeight = 'bold';
    this._div.style.marginBottom = '42px';
    this.update();
    return this._div;
};
scaleControl.update = function () {
    const center = map.getCenter();
    const zoom = map.getZoom();
    const metersPerPixel = 40075016.686 * Math.abs(Math.cos(center.lat * Math.PI / 180)) / Math.pow(2, zoom + 8);
    const scale = metersPerPixel * 96 / 0.0254;
    const rounded = Math.round(scale / 100) * 100;
    this._div.innerHTML = `比例尺 1:${rounded.toLocaleString()}`;
};
scaleControl.addTo(map);
map.on('zoomend moveend', () => { scaleControl.update(); });

let markerLayer=L.layerGroup().addTo(map);
const latInput=document.getElementById("lat");
const lonInput=document.getElementById("lon");
const radiusInput=document.getElementById("radius");
const tbody=document.getElementById("tbody");
const routeInfo=document.getElementById("routeInfo");
const queryBtn=document.getElementById("query-btn");

let userMarker=null;
let origin=null;
let results=[];
let sortState = { distance:true, route:true };
let routeLayer=null;

origin=[25.012098,121.465675];
userMarker=L.marker(origin,{
    icon:L.divIcon({className:'',html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,iconSize:[18,18],iconAnchor:[9,9]}),
    interactive:false
}).addTo(map);

let isDrawingPolygon = false;
let drawPoints = [];       
let previewPolyline = null;
let drawMarkers = L.layerGroup().addTo(map);
let polygonLayer = L.layerGroup().addTo(map);
let polygonsList = [];
let selectedPolygonId = null;
let centroidMarkers = L.layerGroup().addTo(map);
let polygonLabels = L.layerGroup().addTo(map);

const drawControl = L.control({ position: 'topleft' });
drawControl.onAdd = function() {
    const div = L.DomUtil.create('div', 'draw-control-bar');
    div.innerHTML = `
        <button id="btn-start-draw" class="draw-btn" onclick="toggleDrawMode(this)">📐 繪製新範圍</button>
        <button id="btn-end-draw" class="draw-btn" onclick="finishPolygon()" style="display:none; background:#10b981; color:white;">✓ 完成閉合</button>
        <button id="btn-export-all-shp" class="draw-btn shp-btn" onclick="exportAllPolygonsSHP()" style="display:none;">📥 匯出全部 SHP</button>
        <button id="btn-export-all-geojson" class="draw-btn shp-btn" onclick="exportAllPolygonsGeoJSON()" style="display:none;">📥 匯出全部 GeoJSON</button>
        <label id="lbl-import-shp" class="shp-import-label">📤 匯入範圍 (SHP.zip 或 GeoJSON)
            <input type="file" id="shp-file-input" accept=".zip,.geojson,.json" style="display:none;" onchange="importPolygonSHP(event)">
        </label>
        <button id="btn-clear-draw" class="draw-btn" onclick="clearPolygon()" style="display:none; background:#6b7280; color:white;">✕ 清除繪製</button>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
};
drawControl.addTo(map);

const resPanel = document.getElementById("resultPanel");
const sidePanel = document.getElementById("panel");
const slopePanel = document.getElementById("slopePanel");
L.DomEvent.disableClickPropagation(resPanel);
L.DomEvent.disableClickPropagation(sidePanel);
L.DomEvent.disableClickPropagation(slopePanel);

function makePanelDraggable(panelId, headerId) {
    const panel = document.getElementById(panelId);
    const header = document.getElementById(headerId);
    let isMouseDown = false;
    let offset = { x: 0, y: 0 };

    header.addEventListener('mousedown', (e) => {
        isMouseDown = true;
        offset.x = e.clientX - panel.offsetLeft;
        offset.y = e.clientY - panel.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {
        if (!isMouseDown) return;
        let newX = e.clientX - offset.x;
        let newY = e.clientY - offset.y;
        newX = Math.max(0, Math.min(newX, window.innerWidth - panel.offsetWidth));
        newY = Math.max(0, Math.min(newY, window.innerHeight - panel.offsetHeight));
        panel.style.left = newX + 'px';
        panel.style.top = newY + 'px';
    });

    document.addEventListener('mouseup', () => {
        isMouseDown = false;
    });
}

makePanelDraggable('slopePanel', 'slopeHeader');
makePanelDraggable('resultPanel', 'resultHeader');

function toggleDrawMode(btn) {
    isDrawingPolygon = !isDrawingPolygon;
    if (isDrawingPolygon) {
        btn.classList.add('active');
        btn.innerText = "🛑 停止點選";
        document.getElementById('btn-end-draw').style.display = 'block';
        document.getElementById('btn-clear-draw').style.display = 'block';
        clearPolygonData();
        selectedPolygonId = null;
        updatePolygonInfoPanel();
    } else {
        btn.classList.remove('active');
        btn.innerText = "📐 繪製新範圍";
        if (drawPoints.length === 0) {
            document.getElementById('btn-end-draw').style.display = 'none';
            document.getElementById('btn-clear-draw').style.display = 'none';
        }
    }
}

function clearPolygonData() {
    drawPoints = [];
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    drawMarkers.clearLayers();
}

function clearPolygon() {
    clearPolygonData();
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製新範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-clear-draw').style.display = 'none';
}

function finishPolygon() {
    if (drawPoints.length < 3) {
        alert("請至少點選 3 個以上的頂點才能閉合範圍！");
        return;
    }
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    
    const polygonId = Date.now();
    const pointsCopy = JSON.parse(JSON.stringify(drawPoints));
    
    const newPolygon = {
        id: polygonId,
        points: pointsCopy,
        centroid: null,
        polygon: null,
        markers: L.layerGroup(),
        isSelected: false,
        label: null,
        labelMarker: null
    };
    
    calculateCentroid(newPolygon);
    renderPolygon(newPolygon);
    polygonsList.push(newPolygon);
    
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製新範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-export-all-shp').style.display = 'block';
    document.getElementById('btn-export-all-geojson').style.display = 'block';
    document.getElementById('clear-all-polygons-btn').style.display = 'block';
    
    clearPolygonData();
    selectPolygon(polygonId);
}

function calculateCentroid(polygon) {
    if (!polygon.points || polygon.points.length < 3) return;
    
    let coordinates = polygon.points.map(p => [p[1], p[0]]);
    if (coordinates[0][0] !== coordinates[coordinates.length-1][0] || 
        coordinates[0][1] !== coordinates[coordinates.length-1][1]) {
        coordinates.push([polygon.points[0][1], polygon.points[0][0]]);
    }
    
    let turfPoly = turf.polygon([coordinates]);
    let centroid = turf.centroid(turfPoly);
    
    polygon.centroid = {
        lat: centroid.geometry.coordinates[1],
        lon: centroid.geometry.coordinates[0]
    };
}

function renderPolygon(polygon) {
    if (polygon.polygon) {
        map.removeLayer(polygon.polygon);
    }
    polygon.markers.clearLayers();
    
    polygon.polygon = L.polygon(polygon.points, {
        color: '#dc2626',
        weight: 2,
        fillColor: '#dc2626',
        fillOpacity: 0.2
    }).addTo(polygonLayer);
    
    polygon.polygon.on('click', () => {
        selectPolygon(polygon.id);
    });
    
    polygon.points.forEach((pt, index) => {
        let marker = L.marker(pt, {
            icon: L.divIcon({
                className: '',
                html: '<div class="edit-handle"></div>',
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            }),
            draggable: true
        });
        
        marker.on('drag', function(e) {
            let newLatLng = e.target.getLatLng();
            polygon.points[index] = [newLatLng.lat, newLatLng.lng];
            polygon.polygon.setLatLngs(polygon.points);
        });
        
        marker.on('dragend', function() {
            calculateCentroid(polygon);
            updateCentroidMarker(polygon);
        });
        
        marker.addTo(polygon.markers);
    });
    
    polygon.markers.addTo(map);
    updateCentroidMarker(polygon);
}

function updateCentroidMarker(polygon) {
    centroidMarkers.clearLayers();
    polygonLabels.clearLayers();
    
    if (selectedPolygonId === polygon.id && polygon.centroid) {

        const labelText = `範圍 #${idx + 1}`;

function selectPolygon(polygonId) {
    if (selectedPolygonId !== null) {
        const prevPoly = polygonsList.find(p => p.id === selectedPolygonId);
        if (prevPoly) {
            prevPoly.isSelected = false;
            prevPoly.polygon.setStyle({color: '#dc2626', weight: 2, fillOpacity: 0.2});
            prevPoly.markers.clearLayers();
        }
    }
    
    selectedPolygonId = polygonId;
    const polygon = polygonsList.find(p => p.id === polygonId);
    if (polygon) {
        polygon.isSelected = true;
        polygon.polygon.setStyle({color: '#2563eb', weight: 3, fillOpacity: 0.35});
        
        polygon.points.forEach((pt, index) => {
            let marker = L.marker(pt, {
                icon: L.divIcon({
                    className: '',
                    html: '<div class="edit-handle"></div>',
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                }),
                draggable: true
            });
            
            marker.on('drag', function(e) {
                let newLatLng = e.target.getLatLng();
                polygon.points[index] = [newLatLng.lat, newLatLng.lng];
                polygon.polygon.setLatLngs(polygon.points);
            });
            
            marker.on('dragend', function() {
                calculateCentroid(polygon);
                updateCentroidMarker(polygon);
            });
            
            marker.addTo(polygon.markers);
        });
        
        polygon.markers.addTo(map);
        updateCentroidMarker(polygon);
        
        if (polygon.centroid) {
            latInput.value = polygon.centroid.lat.toFixed(6);
            lonInput.value = polygon.centroid.lon.toFixed(6);
            origin = [polygon.centroid.lat, polygon.centroid.lon];
            
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker([polygon.centroid.lat, polygon.centroid.lon], {
                icon: L.divIcon({
                    className: '',
                    html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
                    iconSize: [18, 18],
                    iconAnchor: [9, 9]
                }),
                interactive: false
            }).addTo(map);
        }
    }
    
    updatePolygonInfoPanel();
}

    document.getElementById('polygonCentroid').textContent = 
        `${polygon.centroid?.lat.toFixed(6)}, ${polygon.centroid?.lon.toFixed(6)}`;
    
    infoPanelDiv.style.display = 'block';
}

function calculatePolygonArea(points) {
    if (points.length < 3) return 0;
    let coordinates = points.map(p => [p[1], p[0]]);
    if (coordinates[0][0] !== coordinates[coordinates.length-1][0] || 
        coordinates[0][1] !== coordinates[coordinates.length-1][1]) {
        coordinates.push([points[0][1], points[0][0]]);
    }
    let turfPoly = turf.polygon([coordinates]);
    return turf.area(turfPoly);
}

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

async function getRouteDistance(lat1, lon1, lat2, lon2) {
    try {
        const url = `https://router.project-osrm.org/route/v1/driving/${lon1},${lat1};${lon2},${lat2}?overview=false`;
        const response = await fetch(url);
        const data = await response.json();
        if (data.routes && data.routes.length > 0) {
            return data.routes[0].distance;
        }
    } catch (error) {
        console.log('路線計算失敗');
    }
    return null;
}

async function runQuery() {
    results = [];
    const lat = parseFloat(latInput.value);
    const lon = parseFloat(lonInput.value);
    const radius = parseFloat(radiusInput.value);
    
    if (isNaN(lat) || isNaN(lon) || isNaN(radius)) {
        alert('請輸入有效的緯度、經度和半徑！');
        return;
    }
    
    origin = [lat, lon];
    
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([lat, lon], {
        icon: L.divIcon({
            className: '',
            html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        }),
        interactive: false
    }).addTo(map);
    
    const checkedTypes = Array.from(document.querySelectorAll('#panel input[type="checkbox"]:checked')).map(el => el.value);
    
    if (checkedTypes.length === 0) {
        alert('請選擇至少一個類型！');
        return;
    }
    
    let totalResults = 0;
    for (const type of checkedTypes) {
        if (landmarkDatabase[type] && landmarkDatabase[type].features.length > 0) {
            for (const feature of landmarkDatabase[type].features) {
                const distance = calculateDistance(lat, lon, feature.lat, feature.lon);
                if (distance <= radius) {
                    const result = {
                        name: feature.name,
                        type: landmarkDatabase[type].name,
                        distance: distance,
                        route: null
                    };
                    results.push(result);
                    totalResults++;
                }
            }
        }
    }
    
    results.sort((a, b) => a.distance - b.distance);
    
    displayResults();
    
    markerLayer.clearLayers();
    results.forEach(result => {
        const feature = null;
        for (const type of checkedTypes) {
            const found = landmarkDatabase[type].features.find(f => f.name === result.name);
            if (found) {
                L.marker([found.lat, found.lon], {
                    icon: L.icon({
                        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-blue.png`,
                        iconSize: [25, 41],
                        iconAnchor: [12, 41],
                        popupAnchor: [1, -34]
                    })
                }).bindPopup(`<b>${result.name}</b><br>${result.type}<br>距離: ${result.distance.toFixed(0)}m`).addTo(markerLayer);
                break;
            }
        }
    });
}

function displayResults() {
    tbody.innerHTML = '';
    results.forEach((result, index) => {
        const row = tbody.insertRow();
        row.id = `result-${index}`;
        row.innerHTML = `
            <td>${result.name}</td>
            <td>${result.type}</td>
            <td>${result.distance.toFixed(0)}</td>
            <td>${result.route ? result.route.toFixed(0) : '-'}</td>
        `;
    });
}

function sortResults(field) {
    sortState[field] = !sortState[field];
    if (field === 'distance') {
        results.sort((a, b) => sortState[field] ? a.distance - b.distance : b.distance - a.distance);
    } else if (field === 'route') {
        results.sort((a, b) => {
            const aVal = a.route === null ? Infinity : a.route;
            const bVal = b.route === null ? Infinity : b.route;
            return sortState[field] ? aVal - bVal : bVal - aVal;
        });
    }
    displayResults();
}

function importPolygonSHP(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            let geojson = null;
            if (file.name.endsWith('.zip')) {
                shp(e.target.result).then(data => {
                    geojson = data;
                    loadGeoJSONPolygons(geojson);
                });
            } else {
                geojson = JSON.parse(e.target.result);
                loadGeoJSONPolygons(geojson);
            }
        } catch (error) {
            alert('檔案解析失敗！');
            console.error(error);
        }
    };
    if (file.name.endsWith('.zip')) {
        reader.readAsArrayBuffer(file);
    } else {
        reader.readAsText(file);
    }
    event.target.value = '';
}

function loadGeoJSONPolygons(geojson) {
    if (!geojson || !geojson.features) {
        alert('無效的 GeoJSON 檔案！');
        return;
    }
    geojson.features.forEach(feature => {
        if (feature.geometry.type === 'Polygon') {
            const coords = feature.geometry.coordinates[0];
            const points = coords.map(c => [c[1], c[0]]);
            const polygonId = Date.now() + Math.random();
            const newPolygon = {
                id: polygonId,
                points: points,
                centroid: null,
                polygon: null,
                markers: L.layerGroup(),
                isSelected: false,
                label: null,
                labelMarker: null
            };
            calculateCentroid(newPolygon);
            renderPolygon(newPolygon);
            polygonsList.push(newPolygon);
        }
    });
    if (polygonsList.length > 0) {
        document.getElementById('btn-export-all-shp').style.display = 'block';
        document.getElementById('btn-export-all-geojson').style.display = 'block';
        document.getElementById('clear-all-polygons-btn').style.display = 'block';
        selectPolygon(polygonsList[0].id);
    }
}
