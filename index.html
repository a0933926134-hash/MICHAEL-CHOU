<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
        .controls { position: absolute; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="controls">
        <label>
            <input type="checkbox" id="emap5-toggle" checked> 都市計畫圖層
        </label><br>
        透明度: <input type="range" id="opacity-slider" min="0" max="100" value="70">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([25.0330, 121.5654], 13);

        // 基礎圖層
        L.tileLayer(
            'https://wmts.nlsc.gov.tw/EMAP/default/GoogleMapsCompatible_Level/{z}/{y}/{x}.jpg',
            { attribution: '© NLSC', crossOrigin: true }
        ).addTo(map);

        // 都市計畫圖層
        const emap5Layer = L.tileLayer(
            'https://wmts.nlsc.gov.tw/EMAP5/default/GoogleMapsCompatible_Level/{z}/{y}/{x}.png',
            { 
                attribution: '© NLSC EMAP5',
                crossOrigin: true,
                opacity: 0.7
            }
        ).addTo(map);

        // 控制器
        document.getElementById('emap5-toggle').addEventListener('change', (e) => {
            e.target.checked ? emap5Layer.addTo(map) : map.removeLayer(emap5Layer);
        });

        document.getElementById('opacity-slider').addEventListener('input', (e) => {
            emap5Layer.setOpacity(e.target.value / 100);
        });
    </script>
</body>
</html>
