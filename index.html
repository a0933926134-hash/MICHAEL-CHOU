<script>
let map=L.map('map').setView([25.012098,121.465675],15);

L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',{
maxZoom:19
}).addTo(map);

/* 比例尺 */
const scaleControl = L.control({ position: 'bottomleft' });

scaleControl.onAdd = function () {
this._div = L.DomUtil.create('div', 'scale-denominator');
this._div.style.background = 'rgba(255,255,255,0.9)';
this._div.style.padding = '4px 8px';
this._div.style.borderRadius = '6px';
this._div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.3)';
this._div.style.fontSize = '12px';
this._div.style.fontWeight = 'bold';
this._div.style.marginBottom = '42px';
this.update();
return this._div;
};

scaleControl.update = function () {
const center = map.getCenter();
const zoom = map.getZoom();
const metersPerPixel = 40075016.686 * Math.abs(Math.cos(center.lat * Math.PI / 180)) / Math.pow(2, zoom + 8);
const dpi = 96;
const scale = metersPerPixel * dpi / 0.0254;
const rounded = Math.round(scale / 100) * 100;
this._div.innerHTML = `比例尺 1:${rounded.toLocaleString()}`;
};

scaleControl.addTo(map);
map.on('zoomend moveend', () => { scaleControl.update(); });

let markerLayer=L.layerGroup().addTo(map);
/* 地籍圖 */
const cadastralLayer = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/CADASTRAL/default/EPSG:3857/{z}/{y}/{x}',{
maxZoom:22,
opacity:0.75
}
);
cadastralLayer.addTo(map);
  
const latInput=document.getElementById("lat");
const lonInput=document.getElementById("lon");
const radiusInput=document.getElementById("radius");
const tbody=document.getElementById("tbody");
const routeInfo=document.getElementById("routeInfo");
const queryBtn=document.getElementById("query-btn");

let userMarker=null;
let origin=null;
let results=[];

let sortState = { distance:true, route:true };
let routeLayer=null;

origin=[25.012098,121.465675];

userMarker=L.marker(origin,{
icon:L.divIcon({
className:'',
html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
iconSize:[18,18],
iconAnchor:[9,9]
}),
interactive:false
}).addTo(map);


/* =========================
   多多邊形繪製核心
========================= */

let isDrawingPolygon = false;

/* 正在繪製中的點 */
let currentDrawPoints = [];

/* 所有 Polygon */
let polygons = [];
let selectedPolygonId = null;    
/*
polygons 結構：

{
    id,
    points: [[lat,lng],...],
    polygonLayer,
    markerLayer
}
*/

let previewPolyline = null;

/* 全部 Polygon 圖層 */
let polygonGroup = L.layerGroup().addTo(map);

const drawControl = L.control({ position: 'topleft' });
drawControl.onAdd = function() {
    const div = L.DomUtil.create('div', 'draw-control-bar');
    div.innerHTML = `
        <button id="btn-start-draw" class="draw-btn" onclick="toggleDrawMode(this)">📐 繪製範圍</button>
        <button id="btn-end-draw" class="draw-btn" onclick="finishPolygon()" style="display:none; background:#10b981; color:white;">✓ 完成閉合</button>
        <button id="btn-export-shp" class="draw-btn shp-btn" onclick="exportPolygonSHP()" style="display:none;">📥 匯出範圍 SHP</button>
        <label id="lbl-import-shp" class="shp-import-label">📤 匯入範圍 (支援 SHP.zip 或 GeoJSON)
            <input type="file" id="shp-file-input" accept=".zip,.geojson,.json" style="display:none;" onchange="importPolygonSHP(event)">
        </label>
        <button id="btn-clear-draw" class="draw-btn" onclick="clearPolygon()" style="display:none; background:#6b7280; color:white;">✕ 清除範圍</button>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
};
drawControl.addTo(map);

const resPanel = document.getElementById("resultPanel");
const sidePanel = document.getElementById("panel");
L.DomEvent.disableClickPropagation(resPanel);
L.DomEvent.disableClickPropagation(sidePanel);

function toggleDrawMode(btn) {
    isDrawingPolygon = !isDrawingPolygon;

    if (isDrawingPolygon) {

        currentDrawPoints = [];

        btn.classList.add('active');
        btn.innerText = "🛑 停止點選";

        document.getElementById('btn-end-draw').style.display = 'block';
        document.getElementById('btn-clear-draw').style.display = 'block';

    } else {

        btn.classList.remove('active');
        btn.innerText = "📐 繪製範圍";

        if(previewPolyline){
            map.removeLayer(previewPolyline);
            previewPolyline = null;
        }

        currentDrawPoints = [];
    }
}

function clearPolygon(){

    polygons.forEach(p=>{
        polygonGroup.removeLayer(p.polygonLayer);
        polygonGroup.removeLayer(p.markerLayer);
    });

    polygons = [];

    currentDrawPoints = [];

    if(previewPolyline){
        map.removeLayer(previewPolyline);
        previewPolyline = null;
    }

    isDrawingPolygon = false;

    const btn = document.getElementById('btn-start-draw');

    btn.classList.remove('active');
    btn.innerText = "📐 繪製範圍";

    document.getElementById('btn-end-draw').style.display='none';
    document.getElementById('btn-clear-draw').style.display='none';
    document.getElementById('btn-export-shp').style.display='none';
    }

function clearPolygon() {
    clearPolygonData();
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-clear-draw').style.display = 'none';
}

function finishPolygon(){

    if(currentDrawPoints.length < 3){
        alert("請至少點選3個頂點");
        return;
    }

    if(previewPolyline){
        map.removeLayer(previewPolyline);
        previewPolyline = null;
    }

    const polyId = Date.now();

    const polygonLayer = L.polygon(currentDrawPoints,{
        color:'#dc2626',
        weight:3,
        fillColor:'#dc2626',
        fillOpacity:0.25
    });

    
    const markerLayer = L.layerGroup();
   

    const polygonObj = {
        id: polyId,
        points: JSON.parse(JSON.stringify(currentDrawPoints)),
        polygonLayer,
        markerLayer
    };

    polygonObj.points.forEach((pt,index)=>{

        const marker = L.marker(pt,{
            icon:L.divIcon({
                className:'',
                html:'<div class="edit-handle"></div>',
                iconSize:[12,12],
                iconAnchor:[6,6]
            }),
            draggable:true
        });

        marker.on('drag',function(e){

            const latlng = e.target.getLatLng();

            polygonObj.points[index] = [latlng.lat,latlng.lng];

            polygonLayer.setLatLngs(polygonObj.points);

        });

        marker.on('dragend',function(){
            updateGlobalCentroid();
            selectPolygon(polygonObj.id);
            selectPolygon(polyId);
        });

        markerLayer.addLayer(marker);

    });

    polygons.push(polygonObj);
    polygonLayer.on('click',function(e){

    L.DomEvent.stopPropagation(e);

    selectPolygon(polygonObj.id);

});

    currentDrawPoints = [];

    function selectPolygon(id){

    selectedPolygonId = id;

    polygons.forEach(p=>{

        const isSelected = p.id === id;

        /* Polygon 高亮 */
        p.polygonLayer.setStyle({

            color: isSelected ? '#2563eb' : '#dc2626',
            fillColor: isSelected ? '#60a5fa' : '#dc2626',
            fillOpacity: isSelected ? 0.35 : 0.25,
            weight: isSelected ? 4 : 3

        });

        /* 控制點顯示切換 */
        if(isSelected){

            if(!polygonGroup.hasLayer(p.markerLayer)){
                polygonGroup.addLayer(p.markerLayer);
            }

        }else{

            if(polygonGroup.hasLayer(p.markerLayer)){
                polygonGroup.removeLayer(p.markerLayer);
            }

        }

    });

}
function selectPolygon(id){

    selectedPolygonId = id;

    polygons.forEach(p=>{

        const isSelected = p.id === id;

        /* Polygon 高亮 */
        p.polygonLayer.setStyle({

            color: isSelected ? '#2563eb' : '#dc2626',
            fillColor: isSelected ? '#60a5fa' : '#dc2626',
            fillOpacity: isSelected ? 0.35 : 0.25,
            weight: isSelected ? 4 : 3

        });

        /* 控制點顯示切換 */
        if(isSelected){

            if(!polygonGroup.hasLayer(p.markerLayer)){
                polygonGroup.addLayer(p.markerLayer);
            }

        }else{

            if(polygonGroup.hasLayer(p.markerLayer)){
                polygonGroup.removeLayer(p.markerLayer);
            }

        }

    });

}
function renderEditablePolygon() {
    if (finalPolygon) { map.removeLayer(finalPolygon); }
    drawMarkers.clearLayers();

    finalPolygon = L.polygon(drawPoints, {
        color: '#dc2626',
        weight: 3,
        fillColor: '#dc2626',
        fillOpacity: 0.25
    }).addTo(map);

    drawPoints.forEach((pt, index) => {
        let marker = L.marker(pt, {
            icon: L.divIcon({
                className: '',
                html: '<div class="edit-handle"></div>',
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            }),
            draggable: true
        });
        
        marker.on('drag', function(e) {
            let newLatLng = e.target.getLatLng();
            drawPoints[index] = [newLatLng.lat, newLatLng.lng];
            finalPolygon.setLatLngs(drawPoints);
        });
        
        marker.on('dragend', function() {
            updateCentroidByPoints(drawPoints);
        });

        marker.addTo(drawMarkers);
    });
}

function updateCentroidByPoints(pts) {
    if (!pts || pts.length < 3) return;
    
    let coordinates = pts.map(p => [p[1], p[0]]);
    if (coordinates[0][0] !== coordinates[coordinates.length-1][0] || coordinates[0][1] !== coordinates[coordinates.length-1][1]) {
        coordinates.push([pts[0][1], pts[0][0]]);
    }
    
    let turfPoly = turf.polygon([coordinates]);
    let centroid = turf.centroid(turfPoly);
    
    const cLon = centroid.geometry.coordinates[0];
    const cLat = centroid.geometry.coordinates[1];

    latInput.value = cLat.toFixed(6);
    lonInput.value = cLon.toFixed(6);
    origin = [cLat, cLon];

    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([cLat, cLon], {
        icon: L.divIcon({
            className: '',
            html: `<div style="width:18px; height:18px; background:#ef4444; border:3px solid #ffffff; border-radius:50%; box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        }),
        interactive: false
    }).addTo(map);

    finalPolygon.bindPopup(`
        <div style="font-size:12px; line-height:1.4;">
            <b style="color:#dc2626;">📐 範圍與節點更新完成</b><br>
            已動態重算幾何形心並帶入中心點。<br>您可直接**拖曳邊界上的白色圓點**再次微調範圍，或點擊左側面板「查詢」進行量距。
        </div>
    `).openPopup([cLat, cLon]);
}

function exportPolygonSHP(){

    if(polygons.length===0){
        alert("沒有可匯出的範圍");
        return;
    }

    try{

        let multiCoords = [];

        polygons.forEach(p=>{

            let ring = p.points.map(pt=>[
                Number(pt[1]),
                Number(pt[0])
            ]);

            ring.push([
                Number(p.points[0][1]),
                Number(p.points[0][0])
            ]);

            multiCoords.push([ring]);

        });

        const geojson = {
            type:"FeatureCollection",
            features:[
                {
                    type:"Feature",
                    geometry:{
                        type:"MultiPolygon",
                        coordinates:multiCoords
                    },
                    properties:{
                        Name:"MultiZone"
                    }
                }
            ]
        };

        shpwrite.download(geojson);

    }catch(err){

        console.error(err);

        alert("匯出失敗");

    }

}

function importPolygonSHP(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    
    if (file.name.endsWith('.geojson') || file.name.endsWith('.json')) {
        reader.onload = function(e) {
            try {
                const geojson = JSON.parse(e.target.result);
                processImportedGeoJSON(geojson);
            } catch (err) {
                alert("GeoJSON 解析失敗，請確認檔案格式正確。");
            }
        };
        reader.readAsText(file);
    } else if (file.name.endsWith('.zip')) {
        reader.onload = function(e) {
            shp(e.target.result).then(function(geojson) {
                processImportedGeoJSON(geojson);
            }).catch(function(err) {
                console.error(err);
                alert("SHP 解壓縮解碼失敗，請確保該 .zip 內含有同名的 .shp, .shx, .dbf 檔案。");
            });
        };
        reader.readAsArrayBuffer(file);
    }
}

function processImportedGeoJSON(geojson) {
    let feature = null;
    if (geojson.type === "FeatureCollection" && geojson.features.length > 0) {
        feature = geojson.features[0];
    } else if (geojson.type === "Feature") {
        feature = geojson;
    } else if (geojson.geometry && geojson.geometry.type === "Polygon") {
        feature = geojson;
    }

    if (!feature || !feature.geometry || feature.geometry.type !== "Polygon") {
        alert("找不到有效的多邊形 (Polygon) 幾何結構！");
        return;
    }

    let rings = feature.geometry.coordinates[0];
    
    if (rings.length > 1 && rings[0][0] === rings[rings.length-1][0] && rings[0][1] === rings[rings.length-1][1]) {
        rings.pop();
    }

    const polygonLayer = L.polygon(
    rings.map(coord=>[coord[1],coord[0]]),
    {
        color:'#dc2626',
        weight:3,
        fillColor:'#dc2626',
        fillOpacity:0.25
    }
);

polygonGroup.addLayer(polygonLayer);

const markerLayer = L.layerGroup();


const polygonObj = {
    id: Date.now(),
    points: rings.map(coord=>[coord[1],coord[0]]),
    polygonLayer,
    markerLayer
};

/* 哈弗辛直線距離 */
function haversine(lat1, lon1, lat2, lon2){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);
const a= Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* OSRM 路由服務 (整合交流道反向優化與區段內部直接歸零判定) */
async function getRouteDistance(to, straightDist, isJunction = false, isInZone = false){
if(isInZone) {
    return { value: 0, isFallback: false, msg: "" };
}
try{
if(!origin) return null;

let url = `https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=false`;

if(isJunction) {
    url = `https://router.project-osrm.org/route/v1/driving/${to[1]},${to[0]};${origin[1]},${origin[0]}?overview=false&radiuses=50;unlimited`;
}

const res = await fetch(url);
const data = await res.json();

if(data.routes && data.routes.length > 0) {
    return { value: Math.round(data.routes[0].distance), isFallback: false, msg: "" };
}

return { value: straightDist, isFallback: true, msg: " (直線備援)" };
}catch(err){
console.error("OSRM 路由異常:", err);
return { value: straightDist, isFallback: true, msg: " (直線備援)" };
}
}  

async function drawRoute(to, item){
try{
if(!origin) return;

if(item.在範圍內) {
    routeInfo.innerText = "路線距離：0 m (此設施位於您編輯的範圍區段內部)";
    if(routeLayer) map.removeLayer(routeLayer);
    return;
}

let isJunction = item.原始類型 === "motorway_junction" || item.原始類型 === "ramp";

let url=`https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=full&geometries=geojson`;

if(isJunction) {
    url = `https://router.project-osrm.org/route/v1/driving/${to[1]},${to[0]};${origin[1]},${origin[0]}?overview=full&geometries=geojson&radiuses=50;unlimited`;
}

const res=await fetch(url);
const data=await res.json();

if(!data.routes?.length){
    routeInfo.innerText = "路線距離：" + item.距離 + " m (採直線路徑示意)";
    if(routeLayer) map.removeLayer(routeLayer);
    routeLayer = L.polyline([origin, to], {color: "red", weight: 3, dashArray: "5, 10"}).addTo(map);
    return;
}

const route=data.routes[0];
let routeDist = Math.round(route.distance);
routeInfo.innerText="路線距離：" + routeDist + " m" + (isJunction ? " (平面路網逆向計算)" : "");

if(routeLayer) map.removeLayer(routeLayer);
routeLayer=L.geoJSON(route.geometry,{ style:{color: isJunction ? "#059669" : "blue", weight:5} }).addTo(map);
}catch(err){
routeInfo.innerText="路線服務異常，改繪直線";
if(routeLayer) map.removeLayer(routeLayer);
routeLayer = L.polyline([origin, to], {color: "red", weight: 3, dashArray: "5, 10"}).addTo(map);
}
}

/* 表格選取連動 */
function selectItemById(id){
const item = results.find(r => r.id === id);
if(!item) return;

function selectItem(item){
drawRoute(item.座標, item);
document.querySelectorAll("#tbody tr").forEach(r=>{ r.classList.remove("highlight"); });
const row=document.querySelector(`#tbody tr[data-id="${item.id}"]`);
if(row){
row.classList.add("highlight");
row.scrollIntoView({ behavior:"smooth", block:"center" });
}
}

/* Overpass API 查詢與幾何相交拓撲核心 */
async function runQuery(){
const lat=parseFloat(latInput.value);
const lon=parseFloat(lonInput.value);
const radius=parseFloat(radiusInput.value);

if(radius > 3000){
alert("半徑超過3000m可能造成系統過慢");
return;
}

queryBtn.disabled = true;
queryBtn.innerText = "⌛ 檢索圖資中...";

try {
    markerLayer.clearLayers();
    if(routeLayer){ map.removeLayer(routeLayer); routeLayer=null; }
    routeInfo.innerText="路線距離：尚未計算";
    tbody.innerHTML="";
    results=[];
    let parts=[];

    // 預先檢查是否有繪製好的多邊形，用來判定「設施是否在範圍內」
    let turfZonePolygons = [];

if(polygons.length > 0){

    polygons.forEach(p=>{

        let ring = p.points.map(pt=>[
            Number(pt[1]),
            Number(pt[0])
        ]);

        ring.push([
            Number(p.points[0][1]),
            Number(p.points[0][0])
        ]);

        turfZonePolygons.push(
            turf.polygon([ring])
        );

    });

}

    const checkedBoxes = document.querySelectorAll("input[type=checkbox]:checked");
    if(checkedBoxes.length === 0) {
        alert("請至少勾選一個分析類型！");
        queryBtn.disabled = false;
        queryBtn.innerText = "查詢";
        return;
    }

    checkedBoxes.forEach(e=>{
    let t=e.value;
    if(t==="station"){
    parts.push(`
    nwr["railway"="station"](around:${radius},${lat},${lon});
    nwr["railway"="station"]["station"="train"](around:${radius},${lat},${lon});
    nwr["railway"="station"]["train"="yes"](around:${radius},${lat},${lon});
    nwr["railway"="halt"](around:${radius},${lat},${lon});
    nwr["railway"="subway_entrance"](around:${radius},${lat},${lon});
    nwr["amenity"="bus_station"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="bus_stop"){
    parts.push(`nwr["highway"="bus_stop"](around:${radius},${lat},${lon});`);
    }
    else if(t==="motorway_junction"){
    parts.push(`
    node["highway"="motorway_junction"](around:${radius},${lat},${lon});
    nwr["highway"="ramp"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="parking"){
    parts.push(`
    nwr["amenity"="parking"](around:${radius},${lat},${lon});
    nwr["amenity"="parking_entrance"](around:${radius},${lat},${lon});
    nwr["parking"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="marketplace"){
    parts.push(`
    nwr["amenity"="marketplace"](around:${radius},${lat},${lon});
    nwr["shop"="supermarket"](around:${radius},${lat},${lon});
    nwr["name"~"costco|好市多|家樂福|大潤發|愛買",i](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="waste_disposal"){
    parts.push(`
    nwr["amenity"="waste_transfer_station"](around:${radius},${lat},${lon});
    nwr["name"~"焚化|垃圾|廢棄物|資源回收|處理場"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="park"){
    parts.push(`nwr["leisure"="park"](around:${radius},${lat},${lon});`);
    }
    else if(t==="tourism"){
    parts.push(`nwr["tourism"](around:${radius},${lat},${lon})["leisure"!="park"];`);
    }
    else if(t==="bank"){
    parts.push(`
    nwr["amenity"="bank"](around:${radius},${lat},${lon});
    nwr["amenity"="post_office"](around:${radius},${lat},${lon});
    nwr["amenity"="hospital"](around:${radius},${lat},${lon});
    nwr["office"="government"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="cemetery"){
    parts.push(`
    nwr["landuse"="cemetery"](around:${radius},${lat},${lon});
    nwr["name"~"親儀|生命紀念|納骨|火化"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="school"){
    parts.push(`
    nwr["amenity"="school"](around:${radius},${lat},${lon});
    nwr["amenity"="university"](around:${radius},${lat},${lon});
    node["entrance"="main"](around:${radius},${lat},${lon});
    node["amenity"="school_entrance"](around:${radius},${lat},${lon});
    node["barrier"="gate"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="gas"){
    parts.push(`
    nwr["power"="substation"](around:${radius},${lat},${lon});
    nwr["amenity"="fuel"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="pollution"){
    parts.push(`
    nwr["man_made"="wastewater_treatment_plant"](around:${radius},${lat},${lon});
    nwr["landuse"="industrial"](around:${radius},${lat},${lon});
    `);
    }
    });

    const query=`[out:json][timeout:60];(${parts.join("\n")});out center;`;
    const res=await fetch("https://overpass-api.de/api/interpreter",{
    method:"POST",
    body:"data="+encodeURIComponent(query),
    headers:{"Content-Type":"application/x-www-form-urlencoded"}
    });
    const data=await res.json();
    if(!data.elements) {
        queryBtn.disabled = false;
        queryBtn.innerText = "查詢";
        return;
    }

    let rawSchools = [];
    let gates = [];
    const dedup = new Set();

    data.elements.forEach(e=>{
        let lat2=e.center?.lat ?? e.lat;
        let lon2=e.center?.lon ?? e.lon;
        if(lat2 == null || lon2 == null) return;
        
        const key = `${e.type}-${e.id}`;
        if(dedup.has(key)) return;
        dedup.add(key);

        let rawType = e.tags?.highway || e.tags?.amenity || e.tags?.tourism || e.tags?.shop || e.tags?.railway || e.tags?.entrance || e.tags?.barrier || "未知";
        let name = e.tags?.name || "";

        if(rawType === "school" || rawType === "university") {
            rawSchools.push({ id: e.id, name: name, lat: lat2, lon: lon2, rawType: rawType });
        } else if(rawType === "main" || rawType === "school_entrance" || rawType === "gate" || e.tags?.entrance === "main") {
            gates.push({ lat: lat2, lon: lon2 });
        } else {
            let typeName = rawType;
            if(rawType === "motorway_junction" || rawType === "ramp") typeName = "交流道入口(平面路口)";
            
            // ★核心空間拓撲判定：利用 Turf.js 計算設施點是否落在編輯範圍內
            let inside = false;
            if(turfZonePolygons.length){

    let pt = turf.point([lon2,lat2]);

    inside = turfZonePolygons.some(poly=>
        turf.booleanPointInPolygon(pt,poly)
    );
}

            results.push({
                id: results.length,
                名稱: name || (rawType === "ramp" ? "交流道平面路口/匝道端" : "周邊設施"),
                類型: typeName,
                原始類型: rawType,
                座標: [lat2, lon2],
                在範圍內: inside,
                距離: inside ? 0 : Math.round(haversine(lat, lon, lat2, lon2)),
                直線距離顯示: inside ? "0 (位於區段範圍內)" : Math.round(haversine(lat, lon, lat2, lon2)),
                路線距離: inside ? "0 (位於區段範圍內)" : "計算中...",
                路線距離數值: inside ? 0 : null
            });
        }
    });

    rawSchools.forEach(sch => {
        let finalLat = sch.lat;
        let finalLon = sch.lon;
        let hasMainGate = false;
        let minGateDist = 250; 

        gates.forEach(gate => {
            let d = haversine(sch.lat, sch.lon, gate.lat, gate.lon);
            if(d < minGateDist) {
                minGateDist = d;
                finalLat = gate.lat;
                finalLon = gate.lon;
                hasMainGate = true;
            }
        });

        // 學校部分同樣進行多邊形相交檢查
        let inside = false;
        if(turfZonePolygon) {
            let pt = turf.point([finalLon, finalLat]);
            inside = turf.booleanPointInPolygon(pt, turfZonePolygon);
        }

        results.push({
            id: results.length,
            名稱: sch.name || "未命名學校",
            類型: hasMainGate ? "學校(已精準定位大門門牌)" : "學校區域(採用形心估算)",
            原始類型: sch.rawType,
            座標: [finalLat, finalLon],
            在範圍內: inside,
            距離: inside ? 0 : Math.round(haversine(lat, lon, finalLat, finalLon)),
            直線距離顯示: inside ? "0 (位於區段範圍內)" : Math.round(haversine(lat, lon, finalLat, finalLon)),
            路線距離: inside ? "0 (位於區段範圍內)" : "計算中...",
            路線距離數值: inside ? 0 : null
        });
    });

    // 排序：0公尺（在範圍內）的設施會自動排在表格最上方
    results.sort((a,b)=>a.距離-b.距離);
    renderTable();

    results.forEach(item => {
        const m=L.marker(item.座標).addTo(markerLayer).bindTooltip(item.名稱,{direction:"top"});
        m.on("click",()=>{
            map.flyTo(item.座標,17,{duration:0.8});
            selectItem(item);
        });
    });

    queryBtn.innerText = "🚗 計算路網距離中...";

    /* 背景非同步更新路網距離 */
    for (const item of results.slice(0,80)) {
        if (item.在範圍內) continue; // 如果在範圍內，直接跳過不打 API，保留 0 值的顯示
        
        let isJunc = item.原始類型 === "motorway_junction" || item.原始類型 === "ramp";
        const routeRes = await getRouteDistance(item.座標, item.距離, isJunc, item.在範圍內);

        item.路線距離數值 = routeRes.value;
        item.路線距離 = routeRes.value + " m" + routeRes.msg;

        const cell = document.getElementById(`route-${item.id}`);
        if(cell) cell.innerText = item.路線距離;
    }

} catch(err) {
    console.error(err);
    alert("查詢發生異常，請稍後再試。");
} finally {
    queryBtn.disabled = false;
    queryBtn.innerText = "查詢";
}
}

/* 點擊欄位排序 */
function sortResults(type){
if(type==="distance"){
results.sort((a,b)=>{ return sortState.distance ? a.距離 - b.距離 : b.距離 - a.距離; });
sortState.distance = !sortState.distance;
}
else if(type==="route"){
results.sort((a,b)=>{
const ra = a.路線距離數值 ?? 99999999;
const rb = b.路線距離數值 ?? 99999999;
return sortState.route ? ra - rb : rb - ra;
});
sortState.route = !sortState.route;
}
renderTable();
}

/* 重新渲染表格 */
function renderTable(){
tbody.innerHTML="";
results.forEach(item=>{
const tr=document.createElement("tr");
tr.dataset.id=item.id;
tr.innerHTML=`
<td onclick='selectItemById(${item.id})' style="cursor:pointer;color:blue">${item.名稱}</td>
<td>${item.類型}</td>
<td>${item.直線距離顯示}</td>
<td id="route-${item.id}">${item.路線距離}</td>
`;
tbody.appendChild(tr);
});
}

}

/* 表格視窗拖曳 */
let isDragging = false;
let offsetX = 0; let offsetY = 0;
const panel = document.getElementById("resultPanel");
const header = document.getElementById("resultHeader");

header.addEventListener("mousedown", function(e){
if(e.target.tagName === "BUTTON") return; 
isDragging = true;
const rect = panel.getBoundingClientRect();
offsetX = e.clientX - rect.left;
offsetY = e.clientY - rect.top;
panel.style.position = "absolute";
panel.style.zIndex = 9999;
});

document.addEventListener("mousemove", function(e){
if(!isDragging) return;
panel.style.left = (e.clientX - offsetX) + "px";
panel.style.top = (e.clientY - offsetY) + "px";
panel.style.right = "auto";
});

document.addEventListener("mouseup", function(){ isDragging = false; });
</script>
