<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>市價徵收查估作業-地標距離</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }

/* panel */
#panel{
position:absolute;
top:12px;
right:12px;
width:320px;
background: linear-gradient(135deg,#ffffff,#f3f7ff);
padding:14px;
z-index:1000;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
font-size:13px;
border:1px solid #e6e9ff;
}

#panel h3{margin:0 0 8px 0;color:#1e3a8a;}

#panel input{
width:95%;
padding:6px;
margin:3px 0;
border-radius:8px;
border:1px solid #cbd5e1;
}

#panel label{
display:grid;
grid-template-columns: 18px 1fr;
align-items:center;
column-gap:8px;
padding:4px 6px;
border-radius:8px;
cursor:pointer;
}

#panel label:hover{background:#e0ecff;}

#panel button{
width:100%;
margin-top:6px;
padding:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:#2563eb;color:white;
}

#panel button.clear-btn{
background:#10b981;
}

/* result panel */
#resultPanel{
position:absolute;
top:120px;
left:120px;
width:40%;
max-width:600px;
background:white;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
z-index:999;
overflow:hidden;
}

#resultHeader{
background:#2563eb;
color:white;
padding:8px;
font-weight:bold;
cursor:grab;
user-select:none;
display:flex;
justify-content:space-between;
align-items:center;
}

#resultHeader:active{cursor:grabbing;}

#resultHeader button{
background:#10b981;
border:none;
color:white;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

#resultTableWrapper{
max-height:180px;
overflow-y:auto;
}

table{
width:100%;
border-collapse: collapse;
font-size:12px;
table-layout: fixed;
}

td,th{
border:1px solid #e5e7eb;
padding:6px;
}

th{
background:#dbeafe;
position:sticky;
top:0;
}

.highlight{
background:#fde68a !important;
}

#routeInfo{
margin-top:10px;
padding:8px;
background:#eff6ff;
border-radius:10px;
color:#1d4ed8;
font-weight:bold;
}
</style>
</head>

<body>

<div id="panel">
<h3>GIS 查詢</h3>

緯度:<input id="lat" value="25.04024"><br>
經度:<input id="lon" value="121.43148"><br>
半徑(m):<input id="radius" value="2000"><br>

<h3>類型</h3>

<label><input type="checkbox" value="station">交通運輸-接近大型車站之程度</label>
<label><input type="checkbox" value="bus_stop">交通運輸-站牌之接近程度或密集程度</label>
<label><input type="checkbox" value="motorway_junction">交通運輸-交流道之有無及接近交流道之程度</label>
<label><input type="checkbox" value="school" checked>公共建設-接近學校之程度(國小、國中、高中、大專院校)</label>
<label><input type="checkbox" value="marketplace">公共建設-接近市場之程度(傳統市場、超級市場、超大型購物中心)</label>
<label><input type="checkbox" value="park">公共建設-接近公園(里鄰公園、一般公園)、廣場、徒步區之程度</label>
<label><input type="checkbox" value="parking">公共建設-停車場地之便利程度</label>
<label><input type="checkbox" value="bank">接近服務性設施之程度-郵局</label>
<label><input type="checkbox" value="bank">接近服務性設施之程度-銀行</label>
<label><input type="checkbox" value="hospital" checked>接近服務性設施之程度-醫院</label>
<label><input type="checkbox" value="hospital" checked>接近服務性設施之程度-機關</label>
  
<button onclick="runQuery()">查詢</button>
<button class="clear-btn" onclick="clearRoute()">清除路線距離</button>

<div id="routeInfo">路線距離：尚未計算</div>
</div>

<div id="resultPanel">
<div id="resultHeader">
查詢結果（可匯出EXCEL）
<button onclick="exportExcel()">Excel</button>
</div>

<div id="resultTableWrapper">
<table>
<thead>
<tr>
<th>名稱</th>
<th>類型</th>
<th>直線距離</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<div id="map"></div>

<script>

let map=L.map('map').setView([25.04024,121.43148],15);

L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',{
maxZoom:19
}).addTo(map);

let markerLayer=L.layerGroup().addTo(map);

const latInput=document.getElementById("lat");
const lonInput=document.getElementById("lon");
const radiusInput=document.getElementById("radius");
const tbody=document.getElementById("tbody");
const routeInfo=document.getElementById("routeInfo");

let circleLayer=null;
let userMarker=null;
let origin=null;
let results=[];
let routeLayer=null;

const redIcon = L.divIcon({
className:'',
html:`<img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png">
<div style="font-size:12px;color:red;font-weight:bold;text-align:center;">定位點</div>`,
iconSize:[30,50],
iconAnchor:[15,50]
});

const blueIcon = new L.Icon({
iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
iconSize:[25,41],
iconAnchor:[12,41]
});

function haversine(lat1, lon1, lat2, lon2){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);
const a=Math.sin(dLat/2)**2 +
Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function clearRoute(){
if(routeLayer) map.removeLayer(routeLayer);
routeLayer=null;
routeInfo.innerText="路線距離：尚未計算";
}

function selectItem(item){
drawRoute(item.座標);
document.querySelectorAll("#tbody tr").forEach(r=>r.classList.remove("highlight"));
const row=document.querySelector(`#tbody tr[data-id="${item.id}"]`);
if(row){
row.classList.add("highlight");
row.scrollIntoView({behavior:"smooth",block:"center"});
}
}

map.on('click',e=>{
const lat=e.latlng.lat;
const lon=e.latlng.lng;

latInput.value=lat.toFixed(6);
lonInput.value=lon.toFixed(6);

origin=[lat,lon];

if(userMarker) map.removeLayer(userMarker);
userMarker=L.marker([lat,lon],{icon:redIcon}).addTo(map);

if(circleLayer) map.removeLayer(circleLayer);
circleLayer=L.circle([lat,lon],{
radius:parseFloat(radiusInput.value),
color:'blue',
fillOpacity:0.15
}).addTo(map);
});

async function drawRoute(to){
if(!origin) return;

const url=`https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=full&geometries=geojson`;

const res=await fetch(url);
const data=await res.json();
if(!data.routes?.length) return;

const route=data.routes[0];
routeInfo.innerText="路線距離：" + Math.round(route.distance) + " m";

if(routeLayer) map.removeLayer(routeLayer);
routeLayer=L.geoJSON(route.geometry,{style:{color:"blue",weight:5}}).addTo(map);
}

async function runQuery(){

const lat=parseFloat(latInput.value);
const lon=parseFloat(lonInput.value);
const radius=parseFloat(radiusInput.value);

origin=[lat,lon];

if(userMarker) map.removeLayer(userMarker);
userMarker=L.marker([lat,lon],{icon:redIcon}).addTo(map);

if(circleLayer) map.removeLayer(circleLayer);
circleLayer=L.circle([lat,lon],{
radius:radius,color:'blue',fillOpacity:0.15
}).addTo(map);

map.setView([lat,lon],15);

markerLayer.clearLayers();
tbody.innerHTML="";
results=[];

let parts=[];

document.querySelectorAll("input[type=checkbox]:checked").forEach(e=>{
let t=e.value;

if(t==="station"){
parts.push(`
node["railway"="station"](around:${radius},${lat},${lon});
node["railway"="subway_station"](around:${radius},${lat},${lon});
node["amenity"="bus_station"](around:${radius},${lat},${lon});
node["public_transport"="station"](around:${radius},${lat},${lon});
`);
}
else if(t==="bus_stop"){
parts.push(`node["highway"="bus_stop"](around:${radius},${lat},${lon});`);
}
else if(t==="motorway_junction"){
parts.push(`node["highway"="motorway_junction"](around:${radius},${lat},${lon});`);
}
else if(t==="marketplace"){
parts.push(`
node["amenity"="marketplace"](around:${radius},${lat},${lon});
node["shop"="supermarket"]["name"~"全聯|PX|Carrefour|家樂福"](around:${radius},${lat},${lon});
`);
}
else if(t==="park"){
parts.push(`
node["leisure"="park"](around:${radius},${lat},${lon});
way["leisure"="park"](around:${radius},${lat},${lon});
relation["leisure"="park"](around:${radius},${lat},${lon});
`);
}
else{
parts.push(`
node["amenity"="${t}"](around:${radius},${lat},${lon});
way["amenity"="${t}"](around:${radius},${lat},${lon});
relation["amenity"="${t}"](around:${radius},${lat},${lon});
`);
}
});

const query=`[out:json][timeout:25];(${parts.join("\n")});out center;`;

const res=await fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:"data="+encodeURIComponent(query),
headers:{"Content-Type":"application/x-www-form-urlencoded"}
});

const data=await res.json();
if(!data.elements) return;

data.elements.forEach(e=>{

const lat2=e.center?.lat ?? e.lat;
const lon2=e.center?.lon ?? e.lon;
if(!lat2||!lon2) return;

const idx=results.length;

const item={
id:idx,
名稱:e.tags?.name||"未命名",
類型:
e.tags?.amenity ||
e.tags?.highway ||
e.tags?.railway ||
e.tags?.leisure ||
e.tags?.shop ||
"",
座標:[lat2,lon2],
距離:Math.round(haversine(lat,lon,lat2,lon2))
};

results.push(item);

L.marker(item.座標,{icon:blueIcon})
.addTo(markerLayer)
.on('click',()=>selectItem(item));
});

if(results.length===0){
alert("查詢範圍內無資料");
}

results.forEach(item=>{
const tr=document.createElement("tr");
tr.dataset.id=item.id;
tr.innerHTML=`
<td onclick='selectItem(results[${item.id}])' style="cursor:pointer;color:blue">${item.名稱}</td>
<td>${item.類型}</td>
<td>${item.距離}</td>
`;
tbody.appendChild(tr);
});
}

/* 🔥 Excel 已修正為穩定版 */
function exportExcel(){

if(results.length===0){
alert("無資料");
return;
}

let data = [
["名稱","類型","直線距離(m)","緯度","經度"]
];

results.forEach(r=>{
data.push([
r.名稱 || "",
r.類型 || "",
r.距離 || 0,
r.座標[0],
r.座標[1]
]);
});

const ws = XLSX.utils.aoa_to_sheet(data);
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "GIS查詢結果");
XLSX.writeFile(wb, "GIS查詢結果.xlsx");
}

const panel=document.getElementById("resultPanel");
const header=document.getElementById("resultHeader");

let drag=false,ox=0,oy=0;

header.addEventListener("mousedown",(e)=>{
drag=true;
ox=e.clientX-panel.offsetLeft;
oy=e.clientY-panel.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(!drag) return;
panel.style.left=(e.clientX-ox)+"px";
panel.style.top=(e.clientY-oy)+"px";
panel.style.transform="none";
});

document.addEventListener("mouseup",()=>drag=false);

</script>

</body>
</html>
