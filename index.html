<style>
body { margin:0; font-family: Arial, "Microsoft JhengHei"; }

/* UI 面板 */

}

}

/* 繪製控制項工具列擴充 */
.draw-control-bar {
    background: white;
    padding: 6px;

}
.draw-btn {
    background: #ffffff;

    padding: 6px 10px;

}
.draw-btn:hover { background: #f4f4f4; }

/* 拖曳編輯控制點樣式 */
.edit-handle {

    background: #ffffff;

}

/* 坡度面板 CSS */
#slopePanel{
    position:absolute;
    top:12px;

    overflow:hidden;
    font-size:12px;
}
#slopeHeader{
    background:#7c3aed;
    color:white;
    padding:8px;
    font-weight:bold;
    cursor:grab;
    display:flex;
    justify-content:space-between;
    align-items:center;
    user-select:none;
}
#slopeHeader button{
    background:#10b981;

    padding:4px 8px;
    border-radius:6px;

}
#slopeContent{
    padding:8px;

<body>

<div style="position:absolute;bottom:8px;left:12px;font-size:11px;color:#666;background:rgba(255,255,255,0.8);padding:4px 8px;border-radius:6px;z-index:1000;">

    <div id="slopeHeader">
        🌄 地形坡度分析（可拖曳）
        <button onclick="analyzeSlope()">執行</button>
    </div>
    <div id="slopeContent">
        <div id="slopeInfo">尚未分析坡度</div>
    </div>

<div id="map"></div>

<script>
let map = L.map('map').setView([25.012098, 121.465675], 15);

/* =========================================================
   GIS 多底圖架構
   ========================================================= */
const nlscEMAP = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}', { maxZoom:19, attribution:'© NLSC' });
const nlscPHOTO = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/EPSG:3857/{z}/{y}/{x}', { maxZoom:20, attribution:'© NLSC 正射影像' });
const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'© OpenStreetMap contributors' });
const esriWorldImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom:19, attribution:'© Esri World Imagery' });

nlscEMAP.addTo(map);

const cadastralLayer = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/CADASTRAL/default/GoogleMapsCompatible/{z}/{y}/{x}', { maxZoom:20, opacity:0.75, attribution:'© NLSC 地籍圖' });
cadastralLayer.addTo(map);

const baseMaps = {
    "NLSC 電子地圖": nlscEMAP,
    "NLSC 正射影像": nlscPHOTO,
    "OpenStreetMap": osmLayer,
    "ESRI 衛星影像": esriWorldImagery
};

const nlscDEM = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP5_OPENDATA/default/EPSG:3857/{z}/{y}/{x}', { maxZoom:18, opacity:0.45, attribution:'© NLSC DEM' });

const overlayMaps = {
    "地籍圖": cadastralLayer,
    "DEM 地形": nlscDEM
};

L.control.layers(baseMaps, overlayMaps, { collapsed:false, position:'topright' }).addTo(map);

/* 比例尺 */
const scaleControl = L.control({ position: 'bottomleft' });
scaleControl.onAdd = function () {
    this._div = L.DomUtil.create('div', 'scale-denominator');
    this._div.style.background = 'rgba(255,255,255,0.9)';
    this._div.style.padding = '4px 8px';
    this._div.style.borderRadius = '6px';
    this._div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.3)';
    this._div.style.fontSize = '12px';
    this._div.style.fontWeight = 'bold';
    this._div.style.marginBottom = '42px';
    this.update();
    return this._div;
};
scaleControl.update = function () {
    const center = map.getCenter();
    const zoom = map.getZoom();
    const metersPerPixel = 40075016.686 * Math.abs(Math.cos(center.lat * Math.PI / 180)) / Math.pow(2, zoom + 8);
    const dpi = 96;
    const scale = metersPerPixel * dpi / 0.0254;
    const rounded = Math.round(scale / 100) * 100;
    this._div.innerHTML = `比例尺 1:${rounded.toLocaleString()}`;
};
scaleControl.addTo(map);
map.on('zoomend moveend', () => { scaleControl.update(); });

let markerLayer = L.layerGroup().addTo(map);
  
const latInput = document.getElementById("lat");
const lonInput = document.getElementById("lon");
const radiusInput = document.getElementById("radius");
const tbody = document.getElementById("tbody");
const routeInfo = document.getElementById("routeInfo");
const queryBtn = document.getElementById("query-btn");

let userMarker = null;
let origin = [25.012098, 121.465675];
let results = [];
let sortState = { distance:true, route:true };
let routeLayer = null;

/* 全域快取宣告 (重要修正) */
const routeCache = new Map();
const entranceCache = new Map();      // 新增
const directionCache = new Map();     // 新增
const elevationCache = {};

userMarker = L.marker(origin, {
    icon: L.divIcon({
        className: '',
        html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
        iconSize:[18,18],
        iconAnchor:[9,9]
    }),
    interactive:false
}).addTo(map);

/* ====================================================================
    ★ 多邊形繪製與二次編輯核心
   ==================================================================== */
let isDrawingPolygon = false;
let drawPoints = [];       
let previewPolyline = null;
let finalPolygon = null;
let drawMarkers = L.layerGroup().addTo(map);

const drawControl = L.control({ position: 'topleft' });
drawControl.onAdd = function() {
    const div = L.DomUtil.create('div', 'draw-control-bar');
    div.innerHTML = `
        <button id="btn-start-draw" class="draw-btn" onclick="toggleDrawMode(this)">📐 繪製範圍</button>
        <button id="btn-end-draw" class="draw-btn" onclick="finishPolygon()" style="display:none; background:#10b981; color:white;">✓ 完成閉合</button>
        <button id="btn-export-shp" class="draw-btn shp-btn" onclick="exportPolygonSHP()" style="display:none;">📥 匯出範圍 SHP</button>
        <label id="lbl-import-shp" class="shp-import-label">📤 匯入範圍 (支援 SHP.zip 或 GeoJSON)
            <input type="file" id="shp-file-input" accept=".zip,.geojson,.json" style="display:none;" onchange="importPolygonSHP(event)">
        </label>
        <button id="btn-clear-draw" class="draw-btn" onclick="clearPolygon()" style="display:none; background:#6b7280; color:white;">✕ 清除範圍</button>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
};
drawControl.addTo(map);

const resPanel = document.getElementById("resultPanel");
const sidePanel = document.getElementById("panel");
L.DomEvent.disableClickPropagation(resPanel);
L.DomEvent.disableClickPropagation(sidePanel);

function toggleDrawMode(btn) {
    isDrawingPolygon = !isDrawingPolygon;
    if (isDrawingPolygon) {
        btn.classList.add('active');
        btn.innerText = "🛑 停止點選";
        document.getElementById('btn-end-draw').style.display = 'block';
        document.getElementById('btn-clear-draw').style.display = 'block';
        clearPolygonData();
    } else {
        btn.classList.remove('active');
        btn.innerText = "📐 繪製範圍";
        if (drawPoints.length === 0) {
            document.getElementById('btn-end-draw').style.display = 'none';
            document.getElementById('btn-clear-draw').style.display = 'none';
        }
    }
}

function clearPolygonData() {
    drawPoints = [];
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    if (finalPolygon) { map.removeLayer(finalPolygon); finalPolygon = null; }
    drawMarkers.clearLayers();
    document.getElementById('btn-export-shp').style.display = 'none';
}

function clearPolygon() {
    clearPolygonData();
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-clear-draw').style.display = 'none';
}

function finishPolygon() {
    if (drawPoints.length < 3) {
        alert("請至少點選 3 個以上的頂點才能閉合範圍！");
        return;
    }
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    renderEditablePolygon();
    updateCentroidByPoints(drawPoints);
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-export-shp').style.display = 'block';
}

function renderEditablePolygon() {
    if (finalPolygon) { map.removeLayer(finalPolygon); }
    drawMarkers.clearLayers();
    finalPolygon = L.polygon(drawPoints, { color: '#dc2626', weight: 3, fillColor: '#dc2626', fillOpacity: 0.25 }).addTo(map);
    drawPoints.forEach((pt, index) => {
        let marker = L.marker(pt, {
            icon: L.divIcon({
                className: '',
                html: '<div class="edit-handle"></div>',
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            }),
            draggable: true
        });
        marker.on('drag', function(e) {
            let newLatLng = e.target.getLatLng();
            drawPoints[index] = [newLatLng.lat, newLatLng.lng];
            finalPolygon.setLatLngs(drawPoints);
        });
        marker.on('dragend', function() {
            updateCentroidByPoints(drawPoints);
        });
        marker.addTo(drawMarkers);
    });
}

function updateCentroidByPoints(pts) {
    if (!pts || pts.length < 3) return;
    let coordinates = pts.map(p => [p[1], p[0]]);
    if (coordinates[0][0] !== coordinates[coordinates.length-1][0] || coordinates[0][1] !== coordinates[coordinates.length-1][1]) {
        coordinates.push([pts[0][1], pts[0][0]]);
    }
    let turfPoly = turf.polygon([coordinates]);
    let centroid = turf.centroid(turfPoly);
    const cLon = centroid.geometry.coordinates[0];
    const cLat = centroid.geometry.coordinates[1];
    latInput.value = cLat.toFixed(6);
    lonInput.value = cLon.toFixed(6);
    origin = [cLat, cLon];

    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([cLat, cLon], {
        icon: L.divIcon({
            className: '',
            html: `<div style="width:18px; height:18px; background:#ef4444; border:3px solid #ffffff; border-radius:50%; box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        }),
        interactive: false
    }).addTo(map);

    finalPolygon.bindPopup(`
        <div style="font-size:12px; line-height:1.4;">
            <b style="color:#dc2626;">📐 範圍與節點更新完成</b><br>
            已動態重算幾何形心並帶入中心點。<br>您可直接**拖曳邊界上的白色圓點**再次微調範圍，或點擊左側面板「查詢」進行量距。
        </div>
    `).openPopup([cLat, cLon]);
}

function exportPolygonSHP() {
    if (!drawPoints || drawPoints.length < 3) {
        alert("目前沒有完整的繪製範圍可供匯出！");
        return;
    }
    try {
        let ring = drawPoints.map(p => [Number(p[1]), Number(p[0])]);
        ring.push([Number(drawPoints[0][1]), Number(drawPoints[0][0])]);
        let tempPoly = turf.polygon([ring]);
        let areaSqm = Math.round(turf.area(tempPoly));
        let featureLayer = [{
            geometry: { type: 'Polygon', coordinates: [ring] },
            properties: { Name: "Zone_Area", Area_Sqm: areaSqm }
        }];
        shpwrite.download(featureLayer);
    } catch (err) {
        console.error("SHP Export Error:", err);
        let ringBackup = drawPoints.map(p => [Number(p[1]), Number(p[0])]);
        ringBackup.push([Number(drawPoints[0][1]), Number(drawPoints[0][0])]);
        let geojsonObj = {
            type: "FeatureCollection",
            features: [{
                type: "Feature",
                geometry: { type: "Polygon", coordinates: [ringBackup] },
                properties: { Name: "Zone_Area", Area_Sqm: Math.round(turf.area(turf.polygon([ringBackup]))) }
            }]
        };
        let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(geojsonObj));
        let downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "Estimated_Boundary_Backup.geojson");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        alert("提示：由於網頁快取防護阻擋，系統已為您自動下載為高相容性的 .geojson 向量格式圖資。");
    }
}

function importPolygonSHP(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    if (file.name.endsWith('.geojson') || file.name.endsWith('.json')) {
        reader.onload = function(e) {
            try {
                const geojson = JSON.parse(e.target.result);
                processImportedGeoJSON(geojson);
            } catch (err) {
                alert("GeoJSON 解析失敗，請確認檔案格式正確。");
            }
        };
        reader.readAsText(file);
    } else if (file.name.endsWith('.zip')) {
        reader.onload = function(e) {
            shp(e.target.result).then(function(geojson) {
                processImportedGeoJSON(geojson);
            }).catch(function(err) {
                console.error(err);
                alert("SHP 解壓縮解碼失敗，請確保該 .zip 內含有同名的 .shp, .shx, .dbf 檔案。");
            });
        };
        reader.readAsArrayBuffer(file);
    }
}

function processImportedGeoJSON(geojson) {
    let feature = null;
    if (geojson.type === "FeatureCollection" && geojson.features.length > 0) {
        feature = geojson.features[0];
    } else if (geojson.type === "Feature") {
        feature = geojson;
    } else if (geojson.geometry && geojson.geometry.type === "Polygon") {
        feature = geojson;
    }
    if (!feature || !feature.geometry) {
        alert("無法辨識 GeoJSON 幾何結構");
        return;
    }
    let rings = null;
    if (feature.geometry.type === "Polygon") {
        rings = feature.geometry.coordinates[0];
    } else if (feature.geometry.type === "MultiPolygon") {
        rings = feature.geometry.coordinates[0][0];
    } else if (feature.geometry.type === "GeometryCollection") {
        const poly = feature.geometry.geometries.find(g => g.type === "Polygon" || g.type === "MultiPolygon");
        if (!poly) { alert("GeometryCollection 中找不到 Polygon"); return; }
        rings = (poly.type === "Polygon") ? poly.coordinates[0] : poly.coordinates[0][0];
    }
    if (!rings || rings.length < 3) { alert("Polygon 節點不足"); return; }
    if (rings.length > 1 && rings[0][0] === rings[rings.length-1][0] && rings[0][1] === rings[rings.length-1][1]) {
        rings.pop();
    }
    const invalidCoord = rings.some(coord => Math.abs(coord[1]) > 90 || Math.abs(coord[0]) > 180);
    if (invalidCoord) {
        alert("此 SHP 可能不是 WGS84(EPSG:4326) 座標系統，請先轉換座標。");
        return;
    }
    drawPoints = rings.map(coord => [coord[1], coord[0]]);
    renderEditablePolygon();
    updateCentroidByPoints(drawPoints);
    if (drawPoints.length > 0) { map.panTo(drawPoints[0]); }
    document.getElementById('btn-export-shp').style.display = 'block';
    document.getElementById('btn-clear-draw').style.display = 'block';
    alert("🎉 成功！已實時解壓縮讀取檔案內容，並 100% 完美還原您繪製的範圍形狀。");
}

function haversine(lat1, lon1, lat2, lon2){
    const R=6371000;
    const toRad=x=>x*Math.PI/180;
    const dLat=toRad(lat2-lat1);
    const dLon=toRad(lon2-lon1);
    const a= Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* 產生路網快取 Key */
function getCacheKey(p1, p2) {
    return `${p1[0].toFixed(5)},${p1[1].toFixed(5)}-${p2[0].toFixed(5)},${p2[1].toFixed(5)}`;
}

/* =========================================================
   🚦 整合後的穩定版 Routing Engine (含快取與交流道雙向校正)
   ========================================================= */
async function routeEngine(to, straightDist, isJunction = false, isInZone = false) {
    if (isInZone) { return { value: 0, isFallback: false, msg: "" }; }
    if (!origin) return null;

    const key = getCacheKey(origin, to);
    if (routeCache.has(key)) { return routeCache.get(key); }

    try {
        const base = "https://router.project-osrm.org/route/v1/driving";
        const urlA = `${base}/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=false&radiuses=100;100`;
        let resultA = await fetch(urlA).then(r => r.json());

        if (!resultA.routes?.length) { throw new Error("Route A failed"); }
        let distA = resultA.routes[0].distance;

        // 交流道模式 → 雙向校正 (消除匝道單向偏誤)
        if (isJunction) {
            const urlB = `${base}/${to[1]},${to[0]};${origin[1]},${origin[0]}?overview=false&radiuses=100;100`;
            let resultB = await fetch(urlB).then(r => r.json());
            if (resultB.routes?.length) {
                let distB = resultB.routes[0].distance;
                const avg = Math.round((distA + distB) / 2);
                const res = { value: avg, isFallback: false, msg: "" };
                routeCache.set(key, res);
                return res;
            }
        }

        const res = { value: Math.round(distA), isFallback: false, msg: "" };
        routeCache.set(key, res);
        return res;
    } catch (err) {
        console.error("Routing error:", err);
        const fallbackRes = { value: straightDist, isFallback: true, msg: " (直線備援)" };
        routeCache.set(key, fallbackRes);
        return fallbackRes;
    }
}

async function drawRoute(to, item){
    try{
        if(!origin) return;
        if(item.在範圍內) {
            routeInfo.innerText = "路線距離：0 m (此設施位於您編輯的範圍區段內部)";
            if(routeLayer) map.removeLayer(routeLayer);
            return;
        }
        let isJunction = item.原始類型 === "motorway_junction" || item.原始類型 === "ramp";
        let url=`https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=full&geometries=geojson`;
        if(isJunction) {
            url = `https://router.project-osrm.org/route/v1/driving/${to[1]},${to[0]};${origin[1]},${origin[0]}?overview=full&geometries=geojson&radiuses=50;unlimited`;
        }
        const res=await fetch(url);
        const data=await res.json();
        if(!data.routes?.length){
            routeInfo.innerText = "路線距離：" + item.距離 + " m (採直線路徑示意)";
            if(routeLayer) map.removeLayer(routeLayer);
            routeLayer = L.polyline([origin, to], {color: "red", weight: 3, dashArray: "5, 10"}).addTo(map);
            return;
        }
        const route=data.routes[0];
        let routeDist = Math.round(route.distance);
        routeInfo.innerText="路線距離：" + routeDist + " m" + (isJunction ? " (平面路網逆向計算)" : "");
        if(routeLayer) map.removeLayer(routeLayer);
        routeLayer=L.geoJSON(route.geometry,{ style:{color: isJunction ? "#059669" : "blue", weight:5} }).addTo(map);
    }catch(err){
        routeInfo.innerText="路線服務異常，改繪直線";
        if(routeLayer) map.removeLayer(routeLayer);
        routeLayer = L.polyline([origin, to], {color: "red", weight: 3, dashArray: "5, 10"}).addTo(map);
    }
}

/* ★ 點擊時即時計算路網 (隨選載入) */
async function selectItem(item){
    document.querySelectorAll("#tbody tr").forEach(r=>{ r.classList.remove("highlight"); });
    const row=document.querySelector(`#tbody tr[data-id="${item.id}"]`);
    if(row){
        row.classList.add("highlight");
        row.scrollIntoView({ behavior:"smooth", block:"center" });
    }
    
    // 如果該筆資料尚未計算過路線距離，點選時即時計算
    if(item.路線距離數值 === null && !item.在範圍內) {
        const cell = document.getElementById(`route-${item.id}`);
        if(cell) cell.innerText = "🚗 計算中...";
        let isJunc = item.原始類型 === "motorway_junction" || item.原始類型 === "ramp";
        const routeRes = await routeEngine(item.座標, item.距離, isJunc, item.在範圍內);
        item.路線距離數值 = routeRes.value;
        item.路線距離 = routeRes.value + " m" + routeRes.msg;
        if(cell) cell.innerText = item.路線距離;
    }
    
    drawRoute(item.座標, item);
}

            } else if(t==="marketplace"){

            } else if(t==="waste_disposal"){

            } else if(t==="tourism"){
                parts.push(`nwr["tourism"](around:${radius},${lat},${lon})["leisure"!="park"];`);
            } else if(t==="bank"){
                parts.push(`nwr["amenity"="bank"](around:${radius},${lat},${lon});nwr["amenity"="post_office"](around:${radius},${lat},${lon});nwr["operator"~"中華郵政|Chunghwa Post",i](around:${radius},${lat},${lon});nwr["brand"~"中華郵政|Chunghwa Post",i](around:${radius},${lat},${lon});nwr["name"~"郵局|Post Office",i](around:${radius},${lat},${lon});nwr["amenity"="hospital"](around:${radius},${lat},${lon});nwr["office"="government"](around:${radius},${lat},${lon});`);
            } else if (t === "cemetery") {
                parts.push(`(nwr["landuse"="cemetery"](around:${radius},${lat},${lon});nwr["amenity"~"grave_yard|crematorium"](around:${radius},${lat},${lon});nwr["building"~"funeral_hall|mortuary"](around:${radius},${lat},${lon}););`);

            } else if(t==="pollution"){
                parts.push(`nwr["man_made"="wastewater_treatment_plant"](around:${radius},${lat},${lon});nwr["landuse"="industrial"](around:${radius},${lat},${lon});`);
            }
        });

        const query=`[out:json][timeout:60];(${parts.join("\n")});out center;`;
        const res=await fetch("https://overpass-api.de/api/interpreter",{
            method:"POST",
            body:"data="+encodeURIComponent(query),
            headers:{"Content-Type":"application/x-www-form-urlencoded"}

        if(!data.elements) {

        let gates = [];
        const dedup = new Set();
        data.elements.forEach(e=>{
            let lat2=e.center?.lat ?? e.lat;
            let lon2=e.center?.lon ?? e.lon;
            if(lat2 == null || lon2 == null) return;
            
            const key = `${e.type}-${e.id}`;
            if(dedup.has(key)) return;
            dedup.add(key);

            let rawType = e.tags?.highway || e.tags?.amenity || e.tags?.tourism || e.tags?.shop || e.tags?.railway || e.tags?.entrance || e.tags?.barrier || "未知";
            if(e.tags?.amenity === "post_office" || /郵局/i.test(e.tags?.name || "") || /中華郵政/i.test(e.tags?.operator || "") || /中華郵政/i.test(e.tags?.brand || "")){

            }
            let name = e.tags?.name || "";

            if(rawType === "school" || rawType === "university") {
                rawSchools.push({ id: e.id, name: name, lat: lat2, lon: lon2, rawType: rawType });
            } else if(rawType === "main" || rawType === "school_entrance" || rawType === "gate" || e.tags?.entrance === "main") {
                gates.push({ lat: lat2, lon: lon2 });
            } else {
                let typeName = rawType;
                if(rawType === "motorway_junction" || rawType === "ramp") typeName = "交流道入口(平面路口)";
                if(rawType === "post_office"){ typeName = "郵局"; }

                let inside = false;
                if(turfZonePolygon) {
                    let pt = turf.point([lon2, lat2]);
                    inside = turf.booleanPointInPolygon(pt, turfZonePolygon);
                }

                results.push({
                    id: results.length,
                    名稱: name || (rawType === "ramp" ? "交流道平面路口/匝道端" : "周邊設施"),
                    類型: typeName,
                    原始類型: rawType,
                    座標: [lat2, lon2],
                    在範圍內: inside,
                    距離: inside ? 0 : Math.round(haversine(lat, lon, lat2, lon2)),
                    直線距離顯示: inside ? "0 (位於區段範圍內)" : Math.round(haversine(lat, lon, lat2, lon2)),
                    路線距離: inside ? "0 (位於區段範圍內)" : "👆 點擊計算",
                    路線距離數值: inside ? 0 : null
                });
            }
        });

        rawSchools.forEach(sch => {
            let finalLat = sch.lat;
            let finalLon = sch.lon;
            let hasMainGate = false;
            let minGateDist = 250; 

            gates.forEach(gate => {
                let d = haversine(sch.lat, sch.lon, gate.lat, gate.lon);
                if(d < minGateDist) {
                    minGateDist = d;
                    finalLat = gate.lat;
                    finalLon = gate.lon;
                    hasMainGate = true;
                }
            });

            let inside = false;
            if(turfZonePolygon) {
                let pt = turf.point([finalLon, finalLat]);
                inside = turf.booleanPointInPolygon(pt, turfZonePolygon);
            }

            results.push({
                id: results.length,
                名稱: sch.name || "未命名學校",
                類型: hasMainGate ? "學校(已精準定位大門門牌)" : "學校區域(採用形心估算)",
                原始類型: sch.rawType,
                座標: [finalLat, finalLon],
                在範圍內: inside,
                距離: inside ? 0 : Math.round(haversine(lat, lon, finalLat, finalLon)),
                直線距離顯示: inside ? "0 (位於區段範圍內)" : Math.round(haversine(lat, lon, finalLat, finalLon)),
                路線距離: inside ? "0 (位於區段範圍內)" : "👆 點擊計算",
                路線距離數值: inside ? 0 : null
            });
        });

        results.sort((a,b)=>a.距離-b.距離);

            });

        queryBtn.innerText = "🚗 計算近距離路網中...";
        const autoCalculateCount = 15;
        const targetItems = results.filter(r => !r.在範圍內).slice(0, autoCalculateCount);

        const batchSize = 5;
        for (let i = 0; i < targetItems.length; i += batchSize) {
            const batch = targetItems.slice(i, i + batchSize);
            await Promise.all(batch.map(async (item) => {
                let isJunc = item.原始類型 === "motorway_junction" || item.原始類型 === "ramp";
                const routeRes = await routeEngine(item.座標, item.距離, isJunc, item.在範圍內);

                item.路線距離 = routeRes.value + " m" + routeRes.msg;
                const cell = document.getElementById(`route-${item.id}`);
                if(cell) cell.innerText = item.路線距離;
            }));
            await new Promise(r => setTimeout(r, 80)); // 批次微小延遲保護伺服器
        }

    } catch(err) {
        console.error(err);
        alert("查詢發生異常，請稍後再試。");
    } finally {
        queryBtn.disabled = false;
        queryBtn.innerText = "查詢";
    }
}

function sortResults(type){
    if(type==="distance"){
        results.sort((a,b)=>{ return sortState.distance ? a.距離 - b.距離 : b.距離 - a.距離; });
        sortState.distance = !sortState.distance;
    }
    else if(type==="route"){
        results.sort((a,b)=>{
            const ra = a.路線距離數值 ?? 99999999;
            const rb = b.路線距離數值 ?? 99999999;
            return sortState.route ? ra - rb : rb - ra;
        });
        sortState.route = !sortState.route;
    }
    renderTable();
}

    }
    slopeInfo.innerHTML = "🌄 DEM 坡度分析中...";

    try {
        markerLayer.clearLayers();
        let ring = drawPoints.map(p => [Number(p[1]), Number(p[0])]);
        if (ring.length < 3) { alert("範圍點不足"); return; }
        if (ring[0][0] !== ring[ring.length - 1][0] || ring[0][1] !== ring[ring.length - 1][1]) {
            ring.push(ring[0]);
        }
        const polygon = turf.polygon([ring]);
        const bbox = turf.bbox(polygon);
        const [minLon, minLat, maxLon, maxLat] = bbox;

        const step = Math.max(Math.max(maxLon - minLon, maxLat - minLat) / 30, 0.00005);
        let elevations = [];
        let insideCount = 0;
        let failedCount = 0;

        for (let lat = minLat; lat <= maxLat; lat += step) {
            for (let lon = minLon; lon <= maxLon; lon += step) {
                const pt = turf.point([lon, lat]);
                if (!turf.booleanPointInPolygon(pt, polygon)) continue;
                insideCount++;
                const ele = await getElevation(lat, lon);
                if (ele !== null) {
                    elevations.push({ lat, lon, ele });
                } else {
                    failedCount++;
                }
                await new Promise(r => setTimeout(r,30));
            }
        }

        if (elevations.length < 5) {
            const centroid = turf.centroid(polygon).geometry.coordinates;
            const ele = await getElevation(centroid[1], centroid[0]);
            if (ele !== null && !isNaN(ele)){
                elevations = [{ lat: centroid[1], lon: centroid[0], ele }];
            } else {
                slopeInfo.innerHTML = `⚠ DEM 無資料<br>Polygon內採樣點：${insideCount}<br>成功高程點：${elevations.length}<br>DEM失敗次數：${failedCount}`;
                return;
            }
        }

        let slopes = [];
        for (let i = 1; i < elevations.length; i++) {
            const p1 = elevations[i - 1];
            const p2 = elevations[i];
            const dist = haversine(p1.lat, p1.lon, p2.lat, p2.lon);
            if (dist < 1) continue;
            const rise = Math.abs(p2.ele - p1.ele);
            slopes.push((rise / dist) * 100);
        }

        if (!slopes.length) { slopeInfo.innerHTML = "⚠ 無法計算坡度"; return; }

        const elevs = elevations.map(e => e.ele);
        const minElev = Math.min(...elevs);
        const maxElev = Math.max(...elevs);
        const avgElev = elevs.reduce((a, b) => a + b, 0) / elevs.length;
        const avgSlope = slopes.reduce((a, b) => a + b, 0) / slopes.length;
        const maxSlope = Math.max(...slopes);
        const minSlope = Math.min(...slopes);
        let terrainType = "平坦";
        if (avgSlope > 30) terrainType = "陡坡";
        else if (avgSlope > 15) terrainType = "中坡";
        else if (avgSlope > 5) terrainType = "緩坡";

        slopeInfo.innerHTML = `
            <b>🌄 DEM 坡度分析完成</b><br>
            採樣點數：${elevations.length}<br><br>
            平均高程：${avgElev.toFixed(1)} m<br>
            最低高程：${minElev.toFixed(1)} m<br>
            最高高程：${maxElev.toFixed(1)} m<br><br>
            平均坡度：${avgSlope.toFixed(2)} %<br>
            最大坡度：${maxSlope.toFixed(2)} %<br>
            最小坡度：${minSlope.toFixed(2)} %<br><br>
            地形分類：<b>${terrainType}</b>
        `;
        elevations.forEach(p => {
            let color = "#22c55e";
            if (avgSlope > 30) color = "#dc2626";
            else if (avgSlope > 15) color = "#f97316";
            else if (avgSlope > 5) color = "#eab308";
            L.circleMarker([p.lat, p.lon], { radius: 4, color, fillColor: color, fillOpacity: 0.9, weight: 1 })
            .addTo(markerLayer).bindTooltip(`高程: ${p.ele.toFixed(1)} m`);
        });
    } catch (err) {
        console.error("DEM分析錯誤:", err);
        slopeInfo.innerHTML = `❌ DEM坡度分析失敗<br><br>${err.message}`;
    }
}

function exportExcel(){
    if(!results.length){ alert("無資料"); return; }
    const ws = XLSX.utils.json_to_sheet(results.map(r=>({
        名稱:r.名稱, 類型:r.類型, 直線距離:r.直線距離顯示, 路線距離:r.路線距離 || "", 緯度:r.座標[0], 經度:r.座標[1]
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "GIS");
    XLSX.writeFile(wb, "GIS查詢結果.xlsx");
}

/* 表格視窗拖曳 */
let isDragging = false;
let offsetX = 0;
let offsetY = 0;
const panel = document.getElementById("resultPanel");
const header = document.getElementById("resultHeader");
header.addEventListener("mousedown", function(e){
    if(e.target.tagName === "BUTTON") return; 
    isDragging = true;
    const rect = panel.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    panel.style.position = "absolute";
    panel.style.zIndex = 9999;
});
document.addEventListener("mousemove", function(e){
    if(!isDragging) return;
    panel.style.left = (e.clientX - offsetX) + "px";
    panel.style.top = (e.clientY - offsetY) + "px";
    panel.style.right = "auto";
});
document.addEventListener("mouseup", function(){ isDragging = false; });

/* 坡度面板拖曳 */
let slopeDragging = false;
let slopeOffsetX = 0;
let slopeOffsetY = 0;
const slopePanel = document.getElementById("slopePanel");
const slopeHeader = document.getElementById("slopeHeader");
slopeHeader.addEventListener("mousedown", function(e){
    if(e.target.tagName === "BUTTON") return;
    slopeDragging = true;
    const rect = slopePanel.getBoundingClientRect();
    slopeOffsetX = e.clientX - rect.left;
    slopeOffsetY = e.clientY - rect.top;
    slopePanel.style.position = "absolute";
    slopePanel.style.zIndex = 99999;
});
document.addEventListener("mousemove", function(e){
    if(!slopeDragging) return;
    slopePanel.style.left = (e.clientX - slopeOffsetX) + "px";
    slopePanel.style.top = (e.clientY - slopeOffsetY) + "px";
});
document.addEventListener("mouseup", function(){ slopeDragging = false; });    
</script>
