let markerLayer = L.layerGroup().addTo(map);
let circleLayer = L.layerGroup().addTo(map);

function go(name, lat, lng, rents) {
  map.flyTo([lat, lng], 17);
  render(getFilteredData(), name);
  circleLayer.clearLayers();
  L.circle([lat, lng], { radius: 2000, color: '#f59e0b', fillOpacity: 0.2 }).addTo(circleLayer);
}

function render(list, selectedName = null) {
  markerLayer.clearLayers();
  const el = document.getElementById("list");
  if (!selectedName) el.innerHTML = "";

  const displayList = selectedName ? list.filter(item => item.name === selectedName) : list;
  
  // 1. 先將資料依據學校名稱分組
  const grouped = {};
  displayList.forEach(d => {
    if (!grouped[d.name]) grouped[d.name] = [];
    grouped[d.name].push(d);
  });

  Object.keys(grouped).forEach(name => {
    const items = grouped[name];
    const first = items[0];

    // 2. 統計計算
    const types = { 雅房: [], 套房: [], 整層: [] };
    items.forEach(i => {
      types.雅房.push(i.rents.雅房);
      types.套房.push(i.rents.套房);
      types.整層.push(i.rents.整層);
    });

    // 繪製 Marker
    const icon = L.divIcon({ className: "custom-div-icon", html: `<div class="cute-marker"></div>`, iconSize: [20, 20], iconAnchor: [10, 10] });
    L.marker([first.lat, first.lng], { icon }).addTo(markerLayer).on('click', () => go(name, first.lat, first.lng, quantile(types.套房, 0.5)));

    // 3. 顯示表格 (包含統計分位數)
    if (!selectedName) {
      const card = document.createElement("div");
      card.className = "card";
      card.onclick = () => go(name, first.lat, first.lng, quantile(types.套房, 0.5));
      card.innerHTML = `
        <div class="name">${name}</div>
        <table class="price-table">
          <tr><th>房型</th><th>25分位</th><th>中位數</th><th>75分位</th></tr>
          <tr><td>雅房</td><td>${quantile(types.雅房, 0.25).toFixed(0)}</td><td>${quantile(types.雅房, 0.5).toFixed(0)}</td><td>${quantile(types.雅房, 0.75).toFixed(0)}</td></tr>
          <tr><td>套房</td><td>${quantile(types.套房, 0.25).toFixed(0)}</td><td>${quantile(types.套房, 0.5).toFixed(0)}</td><td>${quantile(types.套房, 0.75).toFixed(0)}</td></tr>
          <tr><td>整層</td><td>${quantile(types.整層, 0.25).toFixed(0)}</td><td>${quantile(types.整層, 0.5).toFixed(0)}</td><td>${quantile(types.整層, 0.75).toFixed(0)}</td></tr>
        </table>`;
      el.appendChild(card);
    }
  });
}

function getFilteredData() {
  const d = document.getElementById("districtFilter").value;
  const s = document.getElementById("seasonFilter").value;
  return data.filter(x => (d === "all" || x.district === d) && (s === "all" || x.season === s));
}

document.getElementById("districtFilter").addEventListener("change", () => render(getFilteredData()));
document.getElementById("seasonFilter").addEventListener("change", () => render(getFilteredData()));

render(data);
