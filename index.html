<style>
/* ========================================

* {

body {

/* ========================================

}

}

.toast-notification.info {

    color: white;
}

@keyframes slideIn {
    from {
        transform: translateX(400px);

    }
    to {

}

<script>
/* ========================================
   全域設定與狀態管理
   ======================================== */

// 多語言配置
const i18n = {
    zh: {
        invalidCoords: '請輸入有效的座標',
        invalidRadius: '半徑必須在 100-10000 公尺之間',
        querySuccess: '查詢成功',
        queryFailed: '查詢失敗',
        noGeolocation: '瀏覽器不支援 GPS 定位',
        geolocationFailed: '定位失敗，請確認已允許定位權限',
        minVertices: '請至少點選 3 個以上的頂點才能閉合範圍',
        noPolygonExport: '目前沒有完整的繪製範圍可供匯出',
        shpExportError: 'SHP 匯出失敗，已自動下載為 GeoJSON 格式',
        shpImportSuccess: '成功！已實時解壓縮讀取檔案內容，並 100% 完美還原您繪製的範圍形狀',
        shpImportFailed: '檔案解析失敗，請確認格式正確'
    }
};

// 速率限制器
const rateLimiter = {
    lastCall: {},
    
    async call(key, fn, minInterval = 1000) {
        const now = Date.now();
        const lastCallTime = this.lastCall[key] || 0;
        const wait = Math.max(0, minInterval - (now - lastCallTime));
        
        if (wait > 0) {
            await new Promise(r => setTimeout(r, wait));
        }
        
        this.lastCall[key] = Date.now();
        return fn();
    }
};

// 全域變數
let map = null;
let userMarker = null;
let origin = null;
let results = [];
let sortState = { distance: true, route: true };
let routeLayer = null;
let isDrawingPolygon = false;
let drawPoints = [];
let previewPolyline = null;
let finalPolygon = null;
let drawMarkers = null;

/* ========================================
   工具函式
   ======================================== */

// 顯示通知訊息
function showNotification(message, type = 'info', duration = 3000) {
    const toast = document.createElement('div');
    toast.className = `toast-notification ${type}`;
    toast.textContent = message;
    toast.setAttribute('role', 'alert');
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s ease-out';
        setTimeout(() => toast.remove(), 300);
    }, duration);
}

// 驗證座標
function validateCoordinates(lat, lon) {
    if (isNaN(lat) || isNaN(lon)) {
        throw new Error(i18n.zh.invalidCoords);
    }
    if (Math.abs(lat) > 90 || Math.abs(lon) > 180) {
        throw new Error(i18n.zh.invalidCoords);
    }
    return true;
}

// 驗證半徑
function validateRadius(radius) {
    const r = parseFloat(radius);
    if (isNaN(r) || r < 100 || r > 10000) {
        throw new Error(i18n.zh.invalidRadius);
    }
    return r;
}

// 哈弗辛公式計算直線距離
function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000; // 地球半徑（公尺）
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

// 高程查詢
const elevationCache = {};
async function getElevation(lat, lon) {
    const cacheKey = lat.toFixed(5) + "," + lon.toFixed(5);
    
    if (elevationCache[cacheKey] !== undefined) {
        return elevationCache[cacheKey];
    }

    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);

        const url = `https://api.opentopodata.org/v1/srtm90m?locations=${lat},${lon}`;
        const res = await fetch(url, { signal: controller.signal });
        
        clearTimeout(timeout);

        if (!res.ok) {
            console.error("DEM HTTP Error:", res.status);
            return null;
        }

        const data = await res.json();

        if (data && data.results && data.results.length && data.results[0].elevation !== null) {
            elevationCache[cacheKey] = Number(data.results[0].elevation);
            return elevationCache[cacheKey];
        }

        return null;

    } catch (err) {
        console.error("DEM API Error:", err);
        return null;
    }
}

/* ========================================
   地圖初始化
   ======================================== */

function initializeMap() {
    // 地圖初始化
    map = L.map('map').setView([25.012098, 121.465675], 15);

    // 定義圖層
    const nlscEMAP = L.tileLayer(
        'https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',
        { maxZoom: 19, attribution: '© NLSC' }
    );

    const nlscPHOTO = L.tileLayer(
        'https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/EPSG:3857/{z}/{y}/{x}',
        { maxZoom: 20, attribution: '© NLSC 正射影像' }
    );

    const osmLayer = L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        { maxZoom: 19, attribution: '© OpenStreetMap contributors' }
    );

    const esriWorldImagery = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        { maxZoom: 19, attribution: '© Esri World Imagery' }
    );

    // 預設底圖
    nlscEMAP.addTo(map);

    // 地籍圖
    const cadastralLayer = L.tileLayer(
        'https://wmts.nlsc.gov.tw/wmts/CADASTRAL/default/GoogleMapsCompatible/{z}/{y}/{x}',
        { maxZoom: 20, opacity: 0.75, attribution: '© NLSC 地籍圖' }
    );
    cadastralLayer.addTo(map);

    // DEM 圖層
    const nlscDEM = L.tileLayer(
        'https://wmts.nlsc.gov.tw/wmts/EMAP5_OPENDATA/default/EPSG:3857/{z}/{y}/{x}',
        { maxZoom: 18, opacity: 0.45, attribution: '© NLSC DEM' }
    );

    // 圖層控制
    const baseMaps = {
        "NLSC 電子地圖": nlscEMAP,
        "NLSC 正射影像": nlscPHOTO,
        "OpenStreetMap": osmLayer,
        "ESRI 衛星影像": esriWorldImagery
    };

    const overlayMaps = {
        "地籍圖": cadastralLayer,
        "DEM 地形": nlscDEM
    };

    L.control.layers(baseMaps, overlayMaps, { collapsed: false, position: 'topright' }).addTo(map);

    // 比例尺
    const scaleControl = L.control({ position: 'bottomleft' });
    scaleControl.onAdd = function () {
        const div = L.DomUtil.create('div', 'scale-denominator');
        div.style.background = 'rgba(255,255,255,0.9)';
        div.style.padding = '4px 8px';
        div.style.borderRadius = '6px';
        div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.3)';
        div.style.fontSize = '12px';
        div.style.fontWeight = 'bold';
        div.style.marginBottom = '42px';
        this.update();
        return div;
    };
    scaleControl.update = function () {
        const center = map.getCenter();
        const zoom = map.getZoom();
        const metersPerPixel = 40075016.686 * Math.abs(Math.cos(center.lat * Math.PI / 180)) / Math.pow(2, zoom + 8);
        const dpi = 96;
        const scale = metersPerPixel * dpi / 0.0254;
        const rounded = Math.round(scale / 100) * 100;
        this._div.innerHTML = `比例尺 1:${rounded.toLocaleString()}`;
    };
    scaleControl.addTo(map);
    map.on('zoomend moveend', () => scaleControl.update());

    // 初始化標記層
    drawMarkers = L.layerGroup().addTo(map);
    
    // 設定原始位置
    origin = [25.012098, 121.465675];
    userMarker = L.marker(origin, {
        icon: L.divIcon({
            className: '',
            html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        }),
        interactive: false
    }).addTo(map);

    // 初始化繪製控制
    initializeDrawControl();

    // 地圖點擊事件
    map.on('click', handleMapClick);
}

/* ========================================
   繪製控制初始化
   ======================================== */

function initializeDrawControl() {
    const drawControl = L.control({ position: 'topleft' });
    drawControl.onAdd = function() {
        const div = L.DomUtil.create('div', 'draw-control-bar');
        div.innerHTML = `
            <button id="btn-start-draw" class="draw-btn" onclick="toggleDrawMode(this)" aria-label="開始或停止繪製範圍">📐 繪製範圍</button>
            <button id="btn-end-draw" class="draw-btn" onclick="finishPolygon()" style="display:none; background:#10b981; color:white;" aria-label="完成多邊形">✓ 完成閉合</button>
            <button id="btn-export-shp" class="draw-btn shp-btn" onclick="exportPolygonSHP()" style="display:none;" aria-label="匯出為SHP格式">📥 匯出範圍 SHP</button>
            <label id="lbl-import-shp" class="shp-import-label" for="shp-file-input">📤 匯入範圍
                <input type="file" id="shp-file-input" accept=".zip,.geojson,.json" style="display:none;" onchange="importPolygonSHP(event)" aria-label="選擇SHP或GeoJSON檔案">
            </label>
            <button id="btn-clear-draw" class="draw-btn" onclick="clearPolygon()" style="display:none; background:#6b7280; color:white;" aria-label="清除繪製內容">✕ 清除範圍</button>
        `;
        L.DomEvent.disableClickPropagation(div);
        return div;
    };
    drawControl.addTo(map);

    // 防止 UI 面板事件冒泡
    const resPanel = document.getElementById("resultPanel");
    const sidePanel = document.getElementById("panel");
    L.DomEvent.disableClickPropagation(resPanel);
    L.DomEvent.disableClickPropagation(sidePanel);
}

/* ========================================
   繪製功能實現
   ======================================== */

function toggleDrawMode(btn) {
    isDrawingPolygon = !isDrawingPolygon;
    if (isDrawingPolygon) {
        btn.classList.add('active');
        btn.innerText = "🛑 停止點選";
        document.getElementById('btn-end-draw').style.display = 'block';
        document.getElementById('btn-clear-draw').style.display = 'block';
        clearPolygonData();
        showNotification('進入繪製模式，請在地圖上點擊以建立頂點', 'info');
    } else {
        btn.classList.remove('active');
        btn.innerText = "📐 繪製範圍";
        if (drawPoints.length === 0) {
            document.getElementById('btn-end-draw').style.display = 'none';
            document.getElementById('btn-clear-draw').style.display = 'none';
        }
    }
}

function clearPolygonData() {
    drawPoints = [];
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    if (finalPolygon) { map.removeLayer(finalPolygon); finalPolygon = null; }
    drawMarkers.clearLayers();
    document.getElementById('btn-export-shp').style.display = 'none';
}

function clearPolygon() {
    clearPolygonData();
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-clear-draw').style.display = 'none';
    showNotification('已清除繪製範圍', 'info');
}

function finishPolygon() {
    if (drawPoints.length < 3) {
        showNotification(i18n.zh.minVertices, 'warning');
        return;
    }
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    
    renderEditablePolygon();
    updateCentroidByPoints(drawPoints);
    
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-export-shp').style.display = 'block';
    showNotification('已完成多邊形，可進行查詢', 'success');
}

function renderEditablePolygon() {
    if (finalPolygon) { map.removeLayer(finalPolygon); }
    drawMarkers.clearLayers();

    finalPolygon = L.polygon(drawPoints, {
        color: '#dc2626',
        weight: 3,
        fillColor: '#dc2626',
        fillOpacity: 0.25
    }).addTo(map);

    drawPoints.forEach((pt, index) => {
        const marker = L.marker(pt, {
            icon: L.divIcon({
                className: '',
                html: '<div class="edit-handle"></div>',
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            }),
            draggable: true,
            title: `節點 ${index + 1}`
        });
        
        marker.on('drag', function(e) {
            const newLatLng = e.target.getLatLng();
            drawPoints[index] = [newLatLng.lat, newLatLng.lng];
            finalPolygon.setLatLngs(drawPoints);
        });
        
        marker.on('dragend', function() {
            updateCentroidByPoints(drawPoints);
            showNotification('節點已更新', 'info', 1500);
        });

        marker.addTo(drawMarkers);
    });
}

function updateCentroidByPoints(pts) {
    if (!pts || pts.length < 3) return;
    
    try {
        const coordinates = pts.map(p => [p[1], p[0]]);
        if (coordinates[0][0] !== coordinates[coordinates.length-1][0] || coordinates[0][1] !== coordinates[coordinates.length-1][1]) {
            coordinates.push([pts[0][1], pts[0][0]]);
        }
        
        const turfPoly = turf.polygon([coordinates]);
        const centroid = turf.centroid(turfPoly);
        
        const cLon = centroid.geometry.coordinates[0];
        const cLat = centroid.geometry.coordinates[1];

        document.getElementById("lat").value = cLat.toFixed(6);
        document.getElementById("lon").value = cLon.toFixed(6);
        origin = [cLat, cLon];

        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([cLat, cLon], {
            icon: L.divIcon({
                className: '',
                html: `<div style="width:18px; height:18px; background:#ef4444; border:3px solid #ffffff; border-radius:50%; box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            }),
            interactive: false
        }).addTo(map);

        finalPolygon.bindPopup(`
            <div style="font-size:12px; line-height:1.4;">
                <b style="color:#dc2626;">📐 範圍與節點更新完成</b><br>
                已動態重算幾何形心並帶入中心點。<br>您可直接拖曳邊界上的白色圓點再次微調範圍，或點擊左側面板「查詢」進行量距。
            </div>
        `).openPopup([cLat, cLon]);
    } catch (err) {
        console.error("圖形計算錯誤:", err);
        showNotification('圖形計算失敗', 'error');
    }
}

/* ========================================
   檔案匯入/匯出
   ======================================== */

function exportPolygonSHP() {
    if (!drawPoints || drawPoints.length < 3) {
        showNotification(i18n.zh.noPolygonExport, 'warning');
        return;
    }
    try {
        const ring = drawPoints.map(p => [Number(p[1]), Number(p[0])]);
        ring.push([Number(drawPoints[0][1]), Number(drawPoints[0][0])]);
        
        const tempPoly = turf.polygon([ring]);
        const areaSqm = Math.round(turf.area(tempPoly));

        const featureLayer = [{
            geometry: {
                type: 'Polygon',
                coordinates: [ring]
            },
            properties: {
                Name: "Zone_Area",
                Area_Sqm: areaSqm
            }
        }];

        shpwrite.download(featureLayer);
        showNotification('SHP 檔案已下載', 'success');
        
    } catch (err) {
        console.error("SHP Export Error:", err);
        
        // 備用：下載為 GeoJSON
        const ringBackup = drawPoints.map(p => [Number(p[1]), Number(p[0])]);
        ringBackup.push([Number(drawPoints[0][1]), Number(drawPoints[0][0])]);
        const geojsonObj = {
            type: "FeatureCollection",
            features: [{
                type: "Feature",
                geometry: { type: "Polygon", coordinates: [ringBackup] },
                properties: { Name: "Zone_Area", Area_Sqm: Math.round(turf.area(turf.polygon([ringBackup]))) }
            }]
        };
        
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(geojsonObj));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "Estimated_Boundary_Backup.geojson");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        
        showNotification(i18n.zh.shpExportError, 'warning');
    }
}

function importPolygonSHP(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    
    if (file.name.endsWith('.geojson') || file.name.endsWith('.json')) {
        reader.onload = function(e) {
            try {
                const geojson = JSON.parse(e.target.result);
                processImportedGeoJSON(geojson);
            } catch (err) {
                showNotification(i18n.zh.shpImportFailed, 'error');
            }
        };
        reader.readAsText(file);
    } else if (file.name.endsWith('.zip')) {
        reader.onload = function(e) {
            shp(e.target.result).then(function(geojson) {
                processImportedGeoJSON(geojson);
            }).catch(function(err) {
                console.error(err);
                showNotification('SHP 解壓縮解碼失敗，請確保該 .zip 內含有同名的 .shp, .shx, .dbf 檔案', 'error');
            });
        };
        reader.readAsArrayBuffer(file);
    }
}

function processImportedGeoJSON(geojson) {
    try {
        let feature = null;
        if (geojson.type === "FeatureCollection" && geojson.features.length > 0) {
            feature = geojson.features[0];
        } else if (geojson.type === "Feature") {
            feature = geojson;
        } else if (geojson.geometry && geojson.geometry.type === "Polygon") {
            feature = geojson;
        }

        if (!feature || !feature.geometry) {
            showNotification('無法辨識 GeoJSON 幾何結構', 'error');
            return;
        }

        let rings = null;

        if (feature.geometry.type === "Polygon") {
            rings = feature.geometry.coordinates[0];
        } else if (feature.geometry.type === "MultiPolygon") {
            rings = feature.geometry.coordinates[0][0];
        } else if (feature.geometry.type === "GeometryCollection") {
            const poly = feature.geometry.geometries.find(g =>
                g.type === "Polygon" || g.type === "MultiPolygon"
            );

            if (!poly) {
                showNotification('GeometryCollection 中找不到 Polygon', 'error');
                return;
            }

            if (poly.type === "Polygon") {
                rings = poly.coordinates[0];
            } else {
                rings = poly.coordinates[0][0];
            }
        }

        if (!rings || rings.length < 3) {
            showNotification('Polygon 節點不足', 'error');
            return;
        }

        if (rings.length > 1 && rings[0][0] === rings[rings.length-1][0] && rings[0][1] === rings[rings.length-1][1]) {
            rings.pop();
        }

        const invalidCoord = rings.some(coord =>
            Math.abs(coord[1]) > 90 || Math.abs(coord[0]) > 180
        );

        if (invalidCoord) {
            showNotification('此 SHP 可能不是 WGS84(EPSG:4326) 座標系統，請先轉換座標', 'error');
            return;
        }

        drawPoints = rings.map(coord => [coord[1], coord[0]]);

        renderEditablePolygon();
        updateCentroidByPoints(drawPoints);
        
        if (drawPoints.length > 0) {
            map.panTo(drawPoints[0]);
        }

        document.getElementById('btn-export-shp').style.display = 'block';
        document.getElementById('btn-clear-draw').style.display = 'block';
        showNotification(i18n.zh.shpImportSuccess, 'success');
    } catch (err) {
        console.error("GeoJSON 處理錯誤:", err);
        showNotification(i18n.zh.shpImportFailed, 'error');
    }
}

/* ========================================
   地圖互動事件
   ======================================== */

function handleMapClick(e) {
    const lat = e.latlng.lat;
    const lon = e.latlng.lng;

    if (isDrawingPolygon) {
        drawPoints.push([lat, lon]);
        
        L.circleMarker([lat, lon], {
            radius: 5,
            color: '#dc2626',
            fillColor: '#fff',
            fillOpacity: 1,
            weight: 2
        }).addTo(drawMarkers);

        if (previewPolyline) {
            previewPolyline.setLatLngs(drawPoints);
        } else {
            previewPolyline = L.polyline(drawPoints, { color: '#dc2626', weight: 2, dashArray: '5, 8' }).addTo(map);
        }
        return; 
    }

    document.getElementById("lat").value = lat.toFixed(6);
    document.getElementById("lon").value = lon.toFixed(6);
    origin = [lat, lon];

    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([lat, lon], {
        icon: L.divIcon({
            className: '',
            html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        }),
        interactive: false
    }).addTo(map);

    showNotification('位置已更新', 'info', 1500);
}

/* ========================================
   位置與GPS功能
   ======================================== */

function getCurrentLocation() {
    if (!navigator.geolocation) {
        showNotification(i18n.zh.noGeolocation, 'error');
        return;
    }

    showNotification('正在定位...', 'info');

    navigator.geolocation.getCurrentPosition(
        (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            document.getElementById("lat").value = lat.toFixed(6);
            document.getElementById("lon").value = lon.toFixed(6);
            origin = [lat, lon];

            map.flyTo([lat, lon], 17, { duration: 1.2 });

            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker([lat, lon], {
                icon: L.divIcon({
                    className: '',
                    html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
                    iconSize: [18, 18],
                    iconAnchor: [9, 9]
                }),
                interactive: false
            }).addTo(map);

            showNotification(`已定位至 ${lat.toFixed(4)}, ${lon.toFixed(4)}`, 'success');
        },
        (err) => {
            showNotification(i18n.zh.geolocationFailed, 'error');
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
}
