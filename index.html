let markerLayer = L.layerGroup().addTo(map);
let circleLayer = L.layerGroup().addTo(map);

// ===================== 工具 =====================
function groupBySchool(list){
  const g = {};
  list.forEach(d=>{
    if(!g[d.name]) g[d.name]=[];
    g[d.name].push(d);
  });
  return g;
}

function drawCircle(lat,lng){
  circleLayer.clearLayers();
  L.circle([lat,lng],{
    radius:2000,
    color:"#3b82f6",
    fillOpacity:0.2
  }).addTo(circleLayer);
}

// ===================== 點學校 =====================
function go(lat,lng){
  drawCircle(lat,lng);
  map.fitBounds(L.circle([lat,lng],{radius:2000}).getBounds());
}

// ===================== render =====================
function render(list){

  markerLayer.clearLayers();

  const el = document.getElementById("list");
  el.innerHTML = "";

  const grouped = groupBySchool(list);

  Object.keys(grouped).forEach(name=>{
    const items = grouped[name];
    const first = items[0];

    L.marker([first.lat, first.lng])
      .addTo(markerLayer)
      .on("click",()=>go(first.lat, first.lng));

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <b>${name}</b><br/>
      ${first.district}
    `;

    card.onclick = ()=>go(first.lat, first.lng);

    el.appendChild(card);
  });
}

// ===================== updateView（核心修正） =====================
function updateView(){

  const d = document.getElementById("districtFilter").value;
  const s = document.getElementById("seasonFilter").value;

  markerLayer.clearLayers();
  circleLayer.clearLayers();

  if(d==="all" || s==="all"){
    document.getElementById("list").innerHTML = "請選擇行政區與季別";
    return;
  }

  const result = data.filter(x =>
    x.district === d && x.season === s
  );

  if(result.length===0){
    document.getElementById("list").innerHTML = "查無資料";
    return;
  }

  render(result);
}

// ===================== events =====================
document.getElementById("districtFilter").addEventListener("change",updateView);
document.getElementById("seasonFilter").addEventListener("change",updateView);

updateView();
