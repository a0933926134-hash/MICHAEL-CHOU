L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',{
maxZoom:19
}).addTo(map);

/* 比例尺 */
/* 分母比例尺 */
const scaleControl = L.control({ position: 'bottomleft' });

scaleControl.onAdd = function () {

this._div = L.DomUtil.create('div', 'scale-denominator');

this._div.style.background = 'rgba(255,255,255,0.9)';
this._div.style.padding = '4px 8px';
this._div.style.borderRadius = '6px';
this._div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.3)';
this._div.style.fontSize = '12px';
this._div.style.fontWeight = 'bold';
this._div.style.marginBottom = '42px';

this.update();

return this._div;

};

scaleControl.update = function () {

const center = map.getCenter();
const zoom = map.getZoom();

/* 取得目前緯度每像素實際距離 */
const metersPerPixel =
40075016.686 * Math.abs(Math.cos(center.lat * Math.PI / 180))
/ Math.pow(2, zoom + 8);

/* 假設螢幕 DPI=96 */
const dpi = 96;

/* 1 inch = 0.0254 m */
const scale =
metersPerPixel * dpi / 0.0254;

/* 取整 */
const rounded = Math.round(scale / 100) * 100;

this._div.innerHTML = `比例尺 1:${rounded.toLocaleString()}`;

};

scaleControl.addTo(map);

map.on('zoomend moveend', () => {
scaleControl.update();
});

let markerLayer=L.layerGroup().addTo(map);
/* 地籍圖 */

'https://wmts.nlsc.gov.tw/wmts/CADASTRAL/default/EPSG:3857/{z}/{y}/{x}',{

{

/* 距離 */
function haversine(lat1, lon1, lat2, lon2){

const R=6371000;
const toRad=x=>x*Math.PI/180;

const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);

const a=
Math.sin(dLat/2)**2 +
Math.cos(toRad(lat1)) *
Math.cos(toRad(lat2)) *
Math.sin(dLon/2)**2;

return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));

}

/* 路線 */
async function getRouteDistance(to){

try{

if(!origin) return null;

/* ✔ 只對交流道做入口 snap */
const snappedTo = await snapToRoad(to[0], to[1]);

const url =
`https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${snappedTo[1]},${snappedTo[0]}?overview=false`;

const res = await fetch(url);
const data = await res.json();

if(!data.routes?.length) return null;

return Math.round(data.routes[0].distance);

}catch(err){
console.error(err);
return null;
}

}
async function snapToRoad(lat, lon){

try{

const url =
`https://router.project-osrm.org/nearest/v1/driving/${lon},${lat}?number=3`;

const res = await fetch(url);
const data = await res.json();

if(!data.waypoints?.length) return [lat, lon];

/* ✔ 過濾：優先選 road class（避免出口匝道終點） */
const best = data.waypoints.find(w =>
!w.name?.toLowerCase().includes("exit") &&
!w.name?.includes("出口")
) || data.waypoints[0];

const p = best.location;

/* OSRM: [lon, lat] */
return [p[1], p[0]];

}catch(e){
console.error(e);
return [lat, lon];
}

}
async function drawRoute(to){

try{

if(!origin) return;

/* ✔ 入口 snap */
const snappedTo = await snapToRoad(to[0], to[1]);

const url =
`https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${snappedTo[1]},${snappedTo[0]}?overview=full&geometries=geojson`;

const res = await fetch(url);
const data = await res.json();

if(!data.routes?.length){

routeInfo.innerText="查無可通行入口路線";

if(routeLayer){
map.removeLayer(routeLayer);
routeLayer=null;
}

return;
}

const route = data.routes[0];

routeInfo.innerText =
"入口路線距離：" + Math.round(route.distance) + " m";

if(routeLayer) map.removeLayer(routeLayer);

routeLayer = L.geoJSON(route.geometry,{
style:{color:"blue",weight:5}
}).addTo(map);

}catch(err){
console.error(err);
routeInfo.innerText="路線服務異常";
}

}

row.scrollIntoView({
behavior:"smooth",
block:"center"
});

}

}

body:"data="+encodeURIComponent(query),
headers:{
"Content-Type":"application/x-www-form-urlencoded"
}
}
);

const data=await res.json();

if(!data.elements) return;

const dedup = new Set();

data.elements.forEach(e=>{

const lat2=e.center?.lat ?? e.lat;
const lon2=e.center?.lon ?? e.lon;

if(lat2 == null || lon2 == null) return;

const key = `${e.type}-${e.id}`;

if(dedup.has(key)) return;

dedup.add(key);

const idx=results.length;

const item={

id:idx,

名稱:e.tags?.name || "未命名",

類型:
e.tags?.amenity ||
e.tags?.tourism ||
e.tags?.shop ||
e.tags?.railway ||
e.tags?.highway ||
e.tags?.office ||
e.tags?.power ||
e.tags?.landuse ||
e.tags?.man_made ||
"未知",

座標:[lat2,lon2],

距離:Math.round(
haversine(lat,lon,lat2,lon2)
),

路線距離:"計算中..."

};

results.push(item);

const m=L.marker(item.座標)
.addTo(markerLayer)
.bindTooltip(item.名稱,{
direction:"top"
});

m.on("click",()=>{

map.flyTo(item.座標,17,{
duration:0.8
});

selectItem(item);

});

});

results.sort((a,b)=>a.距離-b.距離);

/* 表格 */
results.forEach(item=>{

const tr=document.createElement("tr");

tr.dataset.id=item.id;

tr.innerHTML=`
<td onclick='selectItemById(${item.id})'
style="cursor:pointer;color:blue">
${item.名稱}
</td>

<td>${item.類型}</td>

<td>${item.距離}</td>

<td id="route-${item.id}">
${item.路線距離}
</td>
`;

tbody.appendChild(tr);
getRouteDistance(item.座標)
.then(routeDistance=>{

item.路線距離 =
routeDistance != null
? routeDistance + " m"
: "無法到達";

const cell =
document.getElementById(`route-${item.id}`);

if(cell){

cell.innerText = item.路線距離;

}

});  

});

}

/* 清除路線 */
function clearRoute(){

if(routeLayer){
map.removeLayer(routeLayer);
routeLayer=null;
}

routeInfo.innerText="路線距離：尚未計算";

}

/* Excel */
function exportExcel(){

if(!results.length){

alert("無資料");

return;

}

const ws = XLSX.utils.json_to_sheet(

results.map(r=>({

名稱:r.名稱,

類型:r.類型,

直線距離:r.距離,

路線距離:r.路線距離 || "",

緯度:r.座標[0],

經度:r.座標[1]

}))

);
const wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb, ws, "GIS");

XLSX.writeFile(wb, "GIS查詢結果.xlsx");

}

/* 拖曳結果視窗 */

let isDragging = false;

let offsetX = 0;
let offsetY = 0;

const panel = document.getElementById("resultPanel");

const header = document.getElementById("resultHeader");

header.addEventListener("mousedown", function(e){

isDragging = true;

const rect = panel.getBoundingClientRect();

offsetX = e.clientX - rect.left;

offsetY = e.clientY - rect.top;

panel.style.position = "absolute";

panel.style.zIndex = 9999;

});

document.addEventListener("mousemove", function(e){

if(!isDragging) return;

panel.style.left = (e.clientX - offsetX) + "px";

panel.style.top = (e.clientY - offsetY) + "px";

panel.style.right = "auto";

});

document.addEventListener("mouseup", function(){

isDragging = false;

});

</script>

</body>
</html>
