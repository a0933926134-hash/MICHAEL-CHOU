<script>
let map = L.map('map').setView([25.012098, 121.465675], 15);

// ✅ ★★★ 一定要在 loadDEM 之前 ★★★
 
/* =========================================================
   GIS 多底圖架構（合法替代 Google Maps）
   ========================================================= */


/* =========================================================
   1. NLSC 電子地圖（預設）
   ========================================================= */
const nlscEMAP = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:19,
    attribution:'© NLSC'
});

/* =========================================================
   2. NLSC 正射影像
   ========================================================= */
const nlscPHOTO = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:20,
    attribution:'© NLSC 正射影像'
});

/* =========================================================
   3. OpenStreetMap
   ========================================================= */
const osmLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19,
    attribution:'© OpenStreetMap contributors'
});

/* =========================================================
   4. ESRI World Imagery（合法衛星圖）
   ========================================================= */
const esriWorldImagery = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
    maxZoom:19,
    attribution:'© Esri World Imagery'
});

/* =========================================================
   預設底圖
   ========================================================= */
nlscEMAP.addTo(map);

/* =========================================================
   地籍圖（獨立 overlay）
   ========================================================= */
const cadastralLayer = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/CADASTRAL/default/GoogleMapsCompatible/{z}/{y}/{x}',
{
    maxZoom:20,
    opacity:0.75,
    attribution:'© NLSC 地籍圖'
}
);

cadastralLayer.addTo(map);

/* =========================================================
   底圖切換
   ========================================================= */
const baseMaps = {
    "NLSC 電子地圖": nlscEMAP,
    "NLSC 正射影像": nlscPHOTO,
    "OpenStreetMap": osmLayer,
    "ESRI 衛星影像": esriWorldImagery
};

/* =========================================================
   GIS Overlay
   ========================================================= */
/* =========================================================
   NLSC DEM 地形暈渲圖（Hillshade）
   ========================================================= */

const nlscDEM = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP5_OPENDATA/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:18,
    opacity:0.45,
    attribution:'© NLSC DEM'
});

/* =========================================================
   GIS Overlay
   ========================================================= */

const overlayMaps = {
    "地籍圖": cadastralLayer,
    "DEM 地形": nlscDEM
};

/* =========================================================
   圖層控制器
   ========================================================= */
L.control.layers(baseMaps, overlayMaps,{
    collapsed:false,
    position:'topright'
}).addTo(map);

/* 比例尺 */
const scaleControl = L.control({ position: 'bottomleft' });

scaleControl.onAdd = function () {
this._div = L.DomUtil.create('div', 'scale-denominator');
this._div.style.background = 'rgba(255,255,255,0.9)';
this._div.style.padding = '4px 8px';
this._div.style.borderRadius = '6px';
this._div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.3)';
this._div.style.fontSize = '12px';
this._div.style.fontWeight = 'bold';
this._div.style.marginBottom = '42px';
this.update();
return this._div;
};

scaleControl.update = function () {
const center = map.getCenter();
const zoom = map.getZoom();
const metersPerPixel = 40075016.686 * Math.abs(Math.cos(center.lat * Math.PI / 180)) / Math.pow(2, zoom + 8);
const dpi = 96;
const scale = metersPerPixel * dpi / 0.0254;
const rounded = Math.round(scale / 100) * 100;
this._div.innerHTML = `比例尺 1:${rounded.toLocaleString()}`;
};

scaleControl.addTo(map);
map.on('zoomend moveend', () => {
    scaleControl.update();
});

let markerLayer=L.layerGroup().addTo(map);
  
const latInput=document.getElementById("lat");
const lonInput=document.getElementById("lon");
const radiusInput=document.getElementById("radius");
const tbody=document.getElementById("tbody");
const routeInfo=document.getElementById("routeInfo");
const queryBtn=document.getElementById("query-btn");

let userMarker=null;
let origin=null;
let results=[];

let sortState = { distance:true, route:true };
let routeLayer=null;
/* ===========================
   DEM Raster
   =========================== */

origin=[25.012098,121.465675];

userMarker=L.marker(origin,{
icon:L.divIcon({
className:'',
html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
iconSize:[18,18],
iconAnchor:[9,9]
}),
interactive:false
}).addTo(map);


/* ====================================================================
    ★ 多邊形繪製與二次編輯核心 - 支援多邊形數組
   ==================================================================== */
let isDrawingPolygon = false;
let drawPoints = [];
let previewPolyline = null;
let polygonArray = [];
let selectedPolygonIndex = -1;
let drawMarkers = L.layerGroup().addTo(map);

const drawControl = L.control({ position: 'topleft' });
drawControl.onAdd = function() {
    const div = L.DomUtil.create('div', 'draw-control-bar');
    div.innerHTML = `
        <button id="btn-start-draw" class="draw-btn" onclick="toggleDrawMode(this)">📐 繪製範圍</button>
        <button id="btn-end-draw" class="draw-btn" onclick="finishPolygon()" style="display:none; background:#10b981; color:white;">✓ 完成閉合</button>
        <button id="btn-export-shp" class="draw-btn shp-btn" onclick="exportPolygonSHP()" style="display:none;">📥 匯出範圍 SHP</button>
        <label id="lbl-import-shp" class="shp-import-label">📤 匯入範圍 (支援 SHP.zip 或 GeoJSON)
            <input type="file" id="shp-file-input" accept=".zip,.geojson,.json" style="display:none;" onchange="importPolygonSHP(event)">
        </label>
        <button id="btn-clear-draw" class="draw-btn" onclick="clearAllPolygons()" style="display:none; background:#6b7280; color:white;">✕ 清除所有範圍</button>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
};
drawControl.addTo(map);

const resPanel = document.getElementById("resultPanel");
const sidePanel = document.getElementById("panel");
L.DomEvent.disableClickPropagation(resPanel);
L.DomEvent.disableClickPropagation(sidePanel);

function toggleDrawMode(btn) {
    isDrawingPolygon = !isDrawingPolygon;
    if (isDrawingPolygon) {
        btn.classList.add('active');
        btn.innerText = "🛑 停止點選";
        document.getElementById('btn-end-draw').style.display = 'block';
        document.getElementById('btn-clear-draw').style.display = 'block';
        clearCurrentDrawing();
    } else {
        btn.classList.remove('active');
        btn.innerText = "📐 繪製範圍";
        if (drawPoints.length === 0) {
            document.getElementById('btn-end-draw').style.display = 'none';
        }
    }
}

function clearCurrentDrawing() {
    drawPoints = [];
    selectedPolygonIndex = -1;
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    drawMarkers.clearLayers();
}

function clearAllPolygons() {
    polygonArray = [];
    selectedPolygonIndex = -1;
    clearCurrentDrawing();
    document.getElementById('btn-export-shp').style.display = 'none';
    console.log("已清除所有多邊形範圍");
}

function finishPolygon() {
    if (drawPoints.length < 3) {
        alert("請至少點選 3 個以上的頂點才能閉合範圍！");
        return;
    }
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    
    // 將當前繪製的多邊形加入陣列
    const newPolygon = {
        points: [...drawPoints],
        polygon: null,
        markers: L.layerGroup()
    };
    
    polygonArray.push(newPolygon);
    selectedPolygonIndex = polygonArray.length - 1;
    
    renderAllPolygons();
    
    clearCurrentDrawing();
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-export-shp').style.display = 'block';
}

function renderAllPolygons() {
    // 清除所有舊的多邊形和標記
    polygonArray.forEach(p => {
        if (p.polygon && map.hasLayer(p.polygon)) {
            map.removeLayer(p.polygon);
        }
        if (p.markers) {
            p.markers.clearLayers();
        }
    });

    // 重新繪製所有多邊形
    polygonArray.forEach((polygonData, index) => {
        const pts = polygonData.points;
        
        const color = selectedPolygonIndex === index ? '#3b82f6' : '#dc2626';
        const weight = selectedPolygonIndex === index ? 4 : 3;
        
        const polygon = L.polygon(pts, {
            color: color,
            weight: weight,
            fillColor: color,
            fillOpacity: 0.25
        }).addTo(map);
        
        // 添加多邊形點擊事件
        polygon.on('click', function() {
            selectPolygon(index);
        });
        
        polygonData.polygon = polygon;
        
        // 添加可拖曳的控制點
        pts.forEach((pt, pointIndex) => {
            let marker = L.marker(pt, {
                icon: L.divIcon({
                    className: '',
                    html: '<div class="edit-handle"></div>',
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                }),
                draggable: selectedPolygonIndex === index
            });
            
            marker.on('drag', function(e) {
                let newLatLng = e.target.getLatLng();
                polygonArray[index].points[pointIndex] = [newLatLng.lat, newLatLng.lng];
                polygon.setLatLngs(polygonArray[index].points);
            });
            
            marker.on('dragend', function() {
                updateCentroidByPoints(polygonArray[index].points);
            });

            marker.addTo(polygonData.markers).addTo(map);
        });
    });
}

function selectPolygon(index) {
    selectedPolygonIndex = index;
    renderAllPolygons();
    updateCentroidByPoints(polygonArray[index].points);
    console.log("已選擇第 " + (index + 1) + " 個多邊形");
}

function updateCentroidByPoints(pts) {
    if (!pts || pts.length < 3) return;
    
    let coordinates = pts.map(p => [p[1], p[0]]);
    if (coordinates[0][0] !== coordinates[coordinates.length-1][0] || coordinates[0][1] !== coordinates[coordinates.length-1][1]) {
        coordinates.push([pts[0][1], pts[0][0]]);
    }
    
    let turfPoly = turf.polygon([coordinates]);
    let centroid = turf.centroid(turfPoly);
    
    const cLon = centroid.geometry.coordinates[0];
    const cLat = centroid.geometry.coordinates[1];

    latInput.value = cLat.toFixed(6);
    lonInput.value = cLon.toFixed(6);
    origin = [cLat, cLon];

    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([cLat, cLon], {
        icon: L.divIcon({
            className: '',
            html: `<div style="width:18px; height:18px; background:#ef4444; border:3px solid #ffffff; border-radius:50%; box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        }),
        interactive: false
    }).addTo(map);
}

function exportPolygonSHP() {
    if (!polygonArray || polygonArray.length === 0) {
        alert("目前沒有完整的繪製範圍可供匯出！");
        return;
    }
    try {
        let features = [];
        
        polygonArray.forEach((polygonData, index) => {
            let ring = polygonData.points.map(p => [Number(p[1]), Number(p[0])]);
            ring.push([Number(polygonData.points[0][1]), Number(polygonData.points[0][0])]);
            
            let tempPoly = turf.polygon([ring]);
            let areaSqm = Math.round(turf.area(tempPoly));

            features.push({
                geometry: {
                    type: 'Polygon',
                    coordinates: [ring]
                },
                properties: {
                    Name: "Zone_Area_" + (index + 1),
                    Area_Sqm: areaSqm
                }
            });
        });

        shpwrite.download(features);
        
    } catch (err) {
        console.error("SHP Export Error:", err);
        
        let geojsonObj = {
            type: "FeatureCollection",
            features: []
        };
        
        polygonArray.forEach((polygonData, index) => {
            let ringBackup = polygonData.points.map(p => [Number(p[1]), Number(p[0])]);
            ringBackup.push([Number(polygonData.points[0][1]), Number(polygonData.points[0][0])]);
            
            geojsonObj.features.push({
                type: "Feature",
                geometry: { type: "Polygon", coordinates: [ringBackup] },
                properties: { Name: "Zone_Area_" + (index + 1), Area_Sqm: Math.round(turf.area(turf.polygon([ringBackup]))) }
            });
        });
        
        let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(geojsonObj));
        let downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "Estimated_Boundary_Backup.geojson");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        
        alert("提示：由於網頁快取防護阻擋，系統已為您自動下載為高相容性的 .geojson 向量格式圖資。");
    }
}

function importPolygonSHP(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    
    if (file.name.endsWith('.geojson') || file.name.endsWith('.json')) {
        reader.onload = function(e) {
            try {
                const geojson = JSON.parse(e.target.result);
                processImportedGeoJSON(geojson);
            } catch (err) {
                alert("GeoJSON 解析失敗，請確認檔案格式正確。");
            }
        };
        reader.readAsText(file);
    } else if (file.name.endsWith('.zip')) {
        reader.onload = function(e) {
            shp(e.target.result).then(function(geojson) {
                processImportedGeoJSON(geojson);
            }).catch(function(err) {
                console.error(err);
                alert("SHP 解壓縮解碼失敗，請確保該 .zip 內含有同名的 .shp, .shx, .dbf 檔案。");
            });
        };
        reader.readAsArrayBuffer(file);
    }
}

function processImportedGeoJSON(geojson) {
    let features = [];
    
    if (geojson.type === "FeatureCollection" && geojson.features.length > 0) {
        features = geojson.features;
    } else if (geojson.type === "Feature") {
        features = [geojson];
    } else if (geojson.geometry && (geojson.geometry.type === "Polygon" || geojson.geometry.type === "MultiPolygon")) {
        features = [geojson];
    }

    if (features.length === 0) {
        alert("無法辨識 GeoJSON 幾何結構");
        return;
    }

    polygonArray = [];
    
    features.forEach(feature => {
        if (!feature.geometry) return;
        
        let rings = null;

        if (feature.geometry.type === "Polygon") {
            rings = feature.geometry.coordinates[0];
        } else if (feature.geometry.type === "MultiPolygon") {
            rings = feature.geometry.coordinates[0][0];
        } else if (feature.geometry.type === "GeometryCollection") {
            const poly = feature.geometry.geometries.find(g => g.type === "Polygon" || g.type === "MultiPolygon");
            if (!poly) return;
            rings = poly.type === "Polygon" ? poly.coordinates[0] : poly.coordinates[0][0];
        }

        if (!rings || rings.length < 3) return;
        
        if (rings.length > 1 && rings[0][0] === rings[rings.length-1][0] && rings[0][1] === rings[rings.length-1][1]) {
            rings.pop();
        }
        
        const invalidCoord = rings.some(coord => Math.abs(coord[1]) > 90 || Math.abs(coord[0]) > 180);
        if (invalidCoord) {
            alert("此 SHP 可能不是 WGS84(EPSG:4326) 座標系統，請先轉換座標。");
            return;
        }
        
        const pts = rings.map(coord => [coord[1], coord[0]]);
        polygonArray.push({
            points: pts,
            polygon: null,
            markers: L.layerGroup()
        });
    });

    if (polygonArray.length > 0) {
        selectedPolygonIndex = 0;
        renderAllPolygons();
        updateCentroidByPoints(polygonArray[0].points);
        map.panTo(polygonArray[0].points[0]);
        document.getElementById('btn-export-shp').style.display = 'block';
        document.getElementById('btn-clear-draw').style.display = 'block';
        alert("🎉 成功！已實時解壓縮讀取檔案內容，並完美還原您繪製的 " + polygonArray.length + " 個範圍形狀。");
    }
}

/* ==================================
   DEM 高程查詢
   ================================== */
const elevationCache = {};
async function getElevation(lat, lon){

    const cacheKey =
        lat.toFixed(5)+","+lon.toFixed(5);

    if(elevationCache[cacheKey] !== undefined){
        return elevationCache[cacheKey];
    }

    try{

        const controller = new AbortController();

        const timeout = setTimeout(()=>{
            controller.abort();
        },10000);

        const url =
        `https://api.opentopodata.org/v1/srtm90m?locations=${lat},${lon}`;

        const res = await fetch(url,{
    signal:controller.signal
});

console.log(
    "DEM HTTP:",
    res.status,
    url
);

        clearTimeout(timeout);

        if(!res.ok){
            console.error(
                "DEM HTTP Error:",
                res.status
            );
            return null;
        }

        const text = await res.text();

console.log("DEM RAW:", text);

const data = JSON.parse(text);

        if(
            data &&
            data.results &&
            data.results.length &&
            data.results[0].elevation !== null
        ){

            elevationCache[cacheKey] =
                Number(data.results[0].elevation);

            return elevationCache[cacheKey];
        }

        return null;

    }catch(err){

        console.error(
            "DEM API Error:",
            err
        );

        return null;
    }
}

/* 哈弗辛直線距離 */
function haversine(lat1, lon1, lat2, lon2){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);
const a= Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* OSRM 路由服務 */
async function getRouteDistance(lat1, lon1, lat2, lon2) {
    const url = `https://router.project-osrm.org/route/v1/driving/${lon1},${lat1};${lon2},${lat2}?overview=false`;
    try {
        const response = await fetch(url);
        const data = await response.json();
        if (data.routes && data.routes.length > 0) {
            return data.routes[0].distance;
        }
        return null;
    } catch (error) {
        console.error("OSRM Error:", error);
        return null;
    }
}

async function runQuery() {
    if (!origin) {
        alert("請先選擇或繪製一個範圍！");
        return;
    }

    const lat = origin[0];
    const lon = origin[1];
    const radius = parseInt(radiusInput.value) || 1000;
    
    const checkboxes = document.querySelectorAll('#panel input[type="checkbox"]:checked');
    const types = Array.from(checkboxes).map(cb => cb.value);

    if (types.length === 0) {
        alert("請至少選擇一個類型！");
        return;
    }

    queryBtn.disabled = true;
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;">查詢中...</td></tr>';

    try {
        const response = await fetch(`https://overpass-api.de/api/interpreter`, {
            method: 'POST',
            body: buildOverpassQuery(lat, lon, radius, types)
        });
        
        const text = await response.text();
        const data = new DOMParser().parseFromString(text, 'text/xml');
        
        results = [];
        const nodes = data.getElementsByTagName('node');

        for (let node of nodes) {
            const name = node.getElementsByTagName('tag')[0]?.getAttribute('v') || '無名稱';
            const nodeLat = parseFloat(node.getAttribute('lat'));
            const nodeLon = parseFloat(node.getAttribute('lon'));
            const distance = haversine(lat, lon, nodeLat, nodeLon);

            let type = '其他';
            for (let tag of node.getElementsByTagName('tag')) {
                const key = tag.getAttribute('k');
                if (types.includes(key)) {
                    type = key;
                    break;
                }
            }

            const route = await getRouteDistance(lat, lon, nodeLat, nodeLon);

            results.push({
                name: name,
                type: type,
                distance: distance,
                route: route || distance,
                lat: nodeLat,
                lon: nodeLon
            });
        }

        displayResults();

    } catch (error) {
        console.error('Query Error:', error);
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:red;">查詢失敗，請稍後重試</td></tr>';
    } finally {
        queryBtn.disabled = false;
    }
}

function buildOverpassQuery(lat, lon, radius, types) {
    const bbox = [lat - 0.05, lon - 0.05, lat + 0.05, lon + 0.05];
    let query = `[bbox:${bbox[0]},${bbox[2]},${bbox[1]},${bbox[3]}];(`;
    
    types.forEach(type => {
        query += `node[${type}];`;
    });
    
    query += `);out center;`;
    return query;
}

function displayResults() {
    tbody.innerHTML = '';
    results.forEach((result, index) => {
        const row = tbody.insertRow();
        row.innerHTML = `
            <td>${result.name}</td>
            <td>${result.type}</td>
            <td>${(result.distance / 1000).toFixed(2)} km</td>
            <td>${(result.route / 1000).toFixed(2)} km</td>
        `;
        row.style.cursor = 'pointer';
        row.on('click', () => highlightResult(index));
    });
}

function sortResults(key) {
    const ascending = sortState[key];
    results.sort((a, b) => {
        const valA = a[key];
        const valB = b[key];
        return ascending ? valA - valB : valB - valA;
    });
    sortState[key] = !ascending;
    displayResults();
}

function exportExcel() {
    if (results.length === 0) {
        alert("沒有查詢結果可匯出！");
        return;
    }

    const data = results.map(r => ({
        '名稱': r.name,
        '類型': r.type,
        '直線距離(km)': (r.distance / 1000).toFixed(2),
        '路線距離(km)': (r.route / 1000).toFixed(2)
    }));

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "查詢結果");
    XLSX.writeFile(wb, "查詢結果.xlsx");
}

function clearRoute() {
    routeInfo.innerHTML = '路線距離：尚未計算';
    if (routeLayer) {
        map.removeLayer(routeLayer);
        routeLayer = null;
    }
}

function highlightResult(index) {
    const result = results[index];
    const rows = tbody.getElementsByTagName('tr');
    Array.from(rows).forEach(r => r.classList.remove('highlight'));
    if (rows[index]) rows[index].classList.add('highlight');
}

}
