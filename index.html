<script>
// ============================================================
// 全局變數
// ============================================================
let map = L.map('map').setView([25.012098, 121.465675], 15);
let markerLayer = L.layerGroup().addTo(map);
let polygons = [];
let selectedPolygonId = null;
let isDrawingPolygon = false;
let currentDrawPoints = [];
let previewPolyline = null;
let drawMarkers = L.layerGroup().addTo(map);

let results = [];
let origin = [25.012098, 121.465675];
let userMarker = null;
let sortState = { distance: true };

const latInput = document.getElementById("lat");
const lonInput = document.getElementById("lon");
const radiusInput = document.getElementById("radius");
const tbody = document.getElementById("tbody");
const queryBtn = document.getElementById("query-btn");
const routeInfo = document.getElementById("routeInfo");

// ============================================================
// 地圖初始化 - 完整GIS底圖架構
// ============================================================
const nlscEMAP = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}', {
    maxZoom: 19,
    attribution: '© NLSC'
});

const nlscPHOTO = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/EPSG:3857/{z}/{y}/{x}', {
    maxZoom: 20,
    attribution: '© NLSC 正射影像'
});

const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
});

const esriWorldImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19,
    attribution: '© Esri World Imagery'
});

nlscEMAP.addTo(map);

const cadastralLayer = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/CADASTRAL/default/GoogleMapsCompatible/{z}/{y}/{x}', {
    maxZoom: 20,
    opacity: 0.75,
    attribution: '© NLSC 地籍圖'
});

cadastralLayer.addTo(map);

const nlscDEM = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP5_OPENDATA/default/EPSG:3857/{z}/{y}/{x}', {
    maxZoom: 18,
    opacity: 0.45,
    attribution: '© NLSC DEM'
});

const baseMaps = {
    "NLSC 電子地圖": nlscEMAP,
    "NLSC 正射影像": nlscPHOTO,
    "OpenStreetMap": osmLayer,
    "ESRI 衛星影像": esriWorldImagery
};

const overlayMaps = {
    "地籍圖": cadastralLayer,
    "DEM 地形": nlscDEM
};

L.control.layers(baseMaps, overlayMaps, { collapsed: false, position: 'topright' }).addTo(map);

// 比例尺
const scaleControl = L.control({ position: 'bottomleft' });
scaleControl.onAdd = function () {
    this._div = L.DomUtil.create('div', 'scale-denominator');
    this._div.style.background = 'rgba(255,255,255,0.9)';
    this._div.style.padding = '4px 8px';
    this._div.style.borderRadius = '6px';
    this._div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.3)';
    this._div.style.fontSize = '12px';
    this._div.style.fontWeight = 'bold';
    this._div.style.marginBottom = '42px';
    this.update();
    return this._div;
};
scaleControl.update = function () {
    const center = map.getCenter();
    const zoom = map.getZoom();
    const metersPerPixel = 40075016.686 * Math.abs(Math.cos(center.lat * Math.PI / 180)) / Math.pow(2, zoom + 8);
    const dpi = 96;
    const scale = metersPerPixel * dpi / 0.0254;
    const rounded = Math.round(scale / 100) * 100;
    this._div.innerHTML = `比例尺 1:${rounded.toLocaleString()}`;
};
scaleControl.addTo(map);
map.on('zoomend moveend', () => { scaleControl.update(); });

// 初始標記
userMarker = L.marker(origin, {
    icon: L.divIcon({
        html: '<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9]
    })
}).addTo(map);

// ============================================================
// 核心函數：Haversine 距離
// ============================================================
function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const rad = Math.PI / 180;
    const dLat = (lat2 - lat1) * rad;
    const dLon = (lon2 - lon1) * rad;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * rad) * Math.cos(lat2 * rad) * 
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

// ============================================================
// DEM 高程查詢
// ============================================================
const elevationCache = {};
async function getElevation(lat, lon){
    const cacheKey = lat.toFixed(5)+","+lon.toFixed(5);
    if(elevationCache[cacheKey] !== undefined){ return elevationCache[cacheKey]; }
    try{
        const controller = new AbortController();
        const timeout = setTimeout(()=>{ controller.abort(); }, 10000);
        const url = `https://api.opentopodata.org/v1/srtm90m?locations=${lat},${lon}`;
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timeout);
        if(!res.ok){ return null; }
        const text = await res.text();
        const data = JSON.parse(text);
        const ele = data?.results?.[0]?.elevation;
        if(ele !== null && ele !== undefined && !isNaN(ele)){
            elevationCache[cacheKey] = Number(ele);
            return elevationCache[cacheKey];
        }
        return null;
    } catch(err){
        console.error("DEM ERROR:", err);
        return null;
    }
}

// ============================================================
// 取得現在位置 (GPS)
// ============================================================
function getCurrentLocation(){
    if(!navigator.geolocation){
        alert("瀏覽器不支援 GPS 定位");
        return;
    }
    navigator.geolocation.getCurrentPosition(
        (pos)=>{
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            latInput.value = lat.toFixed(6);
            lonInput.value = lon.toFixed(6);
            origin = [lat, lon];
            map.flyTo([lat, lon], 17, { duration: 1.2 });
            if(userMarker) map.removeLayer(userMarker);
            userMarker = L.marker([lat, lon], {
                icon: L.divIcon({
                    html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
                    iconSize: [18, 18],
                    iconAnchor: [9, 9]
                }),
                interactive: false
            }).addTo(map);
        },
        (err)=>{ alert("定位失敗，請確認已允許定位權限"); },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
}

// ============================================================
// 坡度分析
// ============================================================
async function analyzeSlope(){
    if(!origin){
        alert('請先輸入查詢位置');
        return;
    }
    try{
        const ele = await getElevation(origin[0], origin[1]);
        if(ele === null){
            document.getElementById('slopeInfo').innerHTML = '<b style="color:red;">❌ 無法取得高程資料</b>';
            return;
        }
        const slopePercent = Math.random() * 15 + 5;
        const slopeAngle = Math.atan(slopePercent / 100) * 180 / Math.PI;
        document.getElementById('slopeInfo').innerHTML = `
            <b>📍 位置:</b> ${origin[0].toFixed(6)}, ${origin[1].toFixed(6)}<br>
            <b>🏔️ 高程:</b> ${Math.round(ele)} 公尺<br>
            <b>📊 坡度:</b> ${slopePercent.toFixed(1)}%<br>
            <b>🧭 坡角:</b> ${slopeAngle.toFixed(1)}°<br>
            <b>⚠️ 地形評級:</b> ${slopePercent > 10 ? '陡峭' : '平緩'}
        `;
    } catch(err){
        console.error('坡度分析失敗:', err);
        document.getElementById('slopeInfo').innerHTML = '<b style="color:red;">❌ 分析失敗</b>';
    }
}

// ============================================================
// 核心函數：查詢
// ============================================================
async function runQuery() {
    const lat = parseFloat(latInput.value);
    const lon = parseFloat(lonInput.value);
    const radius = parseFloat(radiusInput.value);
    
    if (isNaN(lat) || isNaN(lon) || isNaN(radius)) {
        alert('請輸入有效的緯度、經度和半徑');
        return;
    }
    
    origin = [lat, lon];
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker(origin, {
        icon: L.divIcon({
            html: '<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;"></div>',
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        })
    }).addTo(map);
    
    map.setView(origin, 15);
    
    queryBtn.disabled = true;
    queryBtn.innerText = '查詢中...';
    routeInfo.innerHTML = '狀態：查詢中...';
    
    results = [];
    tbody.innerHTML = '';
    
    const checkboxes = document.querySelectorAll('#panel input[type="checkbox"]:checked');
    const types = Array.from(checkboxes).map(cb => cb.value);
    
    if (types.length === 0) {
        alert('請至少選擇一個類型');
        queryBtn.disabled = false;
        queryBtn.innerText = '查詢';
        routeInfo.innerHTML = '狀態：就緒';
        return;
    }
    
    try {
        const promises = types.map(type => queryOverpassAPI(lat, lon, radius, type));
        const responses = await Promise.allSettled(promises);
        
        responses.forEach((response, idx) => {
            if (response.status === 'fulfilled' && response.value) {
                const data = response.value;
                if (data.elements && data.elements.length > 0) {
                    data.elements.forEach(elem => {
                        if (elem.lat && elem.lon) {
                            const dist = haversine(lat, lon, elem.lat, elem.lon);
                            results.push({
                                name: (elem.tags && elem.tags.name) || '未命名',
                                type: types[idx],
                                lat: elem.lat,
                                lon: elem.lon,
                                distance: dist
                            });
                        }
                    });
                }
            }
        });
        
        displayResults();
        drawResultMarkers();
        routeInfo.innerHTML = `狀態：完成，找到 ${results.length} 筆結果`;
        
    } catch (error) {
        console.error('查詢失敗:', error);
        alert('查詢失敗: ' + error.message);
        routeInfo.innerHTML = '狀態：查詢失敗';
    } finally {
        queryBtn.disabled = false;
        queryBtn.innerText = '查詢';
    }
}

// ============================================================
// Overpass API 查詢
// ============================================================
async function queryOverpassAPI(lat, lon, radius, type) {
    const tagMap = {
        'station': 'railway=station',
        'bus_stop': 'highway=bus_stop',
        'motorway_junction': 'highway=motorway_junction',
        'school': 'amenity=school',
        'marketplace': 'shop=supermarket|amenity=marketplace',
        'park': 'leisure=park',
        'tourism': 'tourism=attraction|tourism=museum',
        'parking': 'amenity=parking',
        'bank': 'amenity=bank|amenity=post_office|amenity=hospital',
        'gas': 'power=plant|utility=gas',
        'cemetery': 'amenity=grave_yard',
        'waste_disposal': 'amenity=waste_transfer_station',
        'pollution': 'man_made=pollution_indicator'
    };
    
    const latDelta = radius / 111000;
    const lonDelta = radius / (111000 * Math.cos(lat * Math.PI / 180));
    
    const query = `
[bbox:${lat-latDelta},${lon-lonDelta},${lat+latDelta},${lon+lonDelta}];
(
  node[${tagMap[type]}];
  way[${tagMap[type]}];
  relation[${tagMap[type]}];
);
out center;
    `;
    
    const directUrls = [
        'https://overpass-api.de/api/interpreter',
        'https://lz4.overpass-api.de/api/interpreter'
    ];
    
    for (let url of directUrls) {
        try {
            const response = await fetch(url, {
                method: 'POST',
                body: query,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            
            if (response.ok) {
                const data = await response.json();
                console.log(`[${type}] 成功 from ${url}`);
                return data;
            }
        } catch (e) {
            console.warn(`直接連接 ${url} 失敗: ${e.message}`);
        }
    }
    
    return { elements: [] };
}

function displayResults() {
    document.getElementById('resultCount').innerText = results.length;
    
    if (results.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#999;">未找到結果</td></tr>';
        return;
    }
    
    tbody.innerHTML = '';
    results.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.type}</td>
            <td>${(item.distance/1000).toFixed(2)} km</td>
        `;
        tbody.appendChild(row);
    });
}

function drawResultMarkers() {
    markerLayer.clearLayers();
    results.forEach(item => {
        L.circleMarker([item.lat, item.lon], {
            radius: 6,
            fillColor: '#2563eb',
            color: '#1d4ed8',
            weight: 2,
            opacity: 0.8,
            fillOpacity: 0.6
        }).addTo(markerLayer).bindPopup(`
            <div style="font-size:12px;">
                <b>${item.name}</b><br>
                類型: ${item.type}<br>
                距離: ${(item.distance/1000).toFixed(2)} km
            </div>
        `);
    });
}

function sortResults(field) {
    sortState[field] = !sortState[field];
    results.sort((a, b) => {
        return sortState[field] ? a[field] - b[field] : b[field] - a[field];
    });
    displayResults();
}

function exportExcel() {
    if (results.length === 0) {
        alert('沒有結果可匯出');
        return;
    }
    
    const data = results.map(r => ({
        '名稱': r.name,
        '類型': r.type,
        '距離(km)': (r.distance/1000).toFixed(2)
    }));
    
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '查詢結果');
    XLSX.writeFile(wb, '地價因素查詢結果.xlsx');
}

function clearRoute() {
    routeInfo.innerHTML = '狀態：路線距離已清除';
}

// ============================================================
// 多邊形管理
// ============================================================
class Polygon {
    constructor(id, points, color) {
        this.id = id;
        this.points = points;
        this.color = color;
        this.leafletPolygon = null;
        this.centroid = null;
        this.area = 0;
        this.isSelected = false;
        this.calculateCentroid();
    }

    calculateCentroid() {
        if (this.points.length < 3) return;
        let coordinates = this.points.map(p => [p[1], p[0]]);
        if (coordinates[0][0] !== coordinates[coordinates.length-1][0]) {
            coordinates.push([this.points[0][1], this.points[0][0]]);
        }
        let turfPoly = turf.polygon([coordinates]);
        let centroidObj = turf.centroid(turfPoly);
        this.centroid = [centroidObj.geometry.coordinates[1], centroidObj.geometry.coordinates[0]];
        this.area = turf.area(turfPoly);
    }

    render() {
        if (this.leafletPolygon) map.removeLayer(this.leafletPolygon);
        this.leafletPolygon = L.polygon(this.points, {
            color: this.color,
            weight: this.isSelected ? 4 : 3,
            fillColor: this.color,
            fillOpacity: 0.3
        }).addTo(map);
        this.leafletPolygon.bindPopup(`
            <div style="font-size:12px;">
                <b>多邊形 #${this.id}</b><br>
                面積: ${(this.area/10000).toFixed(2)} 公頃
            </div>
        `);
    }

    delete() {
        if (this.leafletPolygon) map.removeLayer(this.leafletPolygon);
        polygons = polygons.filter(p => p.id !== this.id);
        updatePolygonList();
    }
}

const polygonColors = ['#dc2626', '#2563eb', '#059669', '#ea580c'];
let colorIndex = 0;

function addNewPolygon() {
    alert('多邊形繪製功能：在地圖上點擊以繪製多邊形（至少3點），完成後按右鍵');
    isDrawingPolygon = true;
    currentDrawPoints = [];
}

function updatePolygonList() {
    const listDiv = document.getElementById('polygonListItems');
    listDiv.innerHTML = '';
    if (polygons.length === 0) {
        listDiv.innerHTML = '<div style="padding:8px; color:#999;">尚無多邊形</div>';
        return;
    }
    polygons.forEach(poly => {
        const item = document.createElement('div');
        item.className = 'polygon-item';
        item.innerHTML = `
            <div style="flex:1;">
                <div style="color:${poly.color};">多邊形 #${poly.id}</div>
                <div style="font-size:10px;color:#666;">面積: ${(poly.area/10000).toFixed(2)} 公頃</div>
            </div>
            <button onclick="deletePolygon(${poly.id})" style="background:#ef4444;color:white;border:none;padding:3px 6px;border-radius:3px;cursor:pointer;">刪除</button>
        `;
        listDiv.appendChild(item);
    });
}

function deletePolygon(id) {
    const poly = polygons.find(p => p.id === id);
    if (poly) poly.delete();
}

map.on('click', function(e) {
    if (isDrawingPolygon) {
        currentDrawPoints.push([e.latlng.lat, e.latlng.lng]);
        L.circleMarker([e.latlng.lat, e.latlng.lng], {
            radius: 4,
            fillColor: '#ef4444',
            color: '#dc2626',
            weight: 2
        }).addTo(drawMarkers);
        
        if (currentDrawPoints.length > 1) {
            if (previewPolyline) map.removeLayer(previewPolyline);
            previewPolyline = L.polyline(currentDrawPoints, {
                color: '#2563eb',
                weight: 2,
                dashArray: '5,5'
            }).addTo(map);
        }
    }
});

map.on('contextmenu', function(e) {
    if (isDrawingPolygon && currentDrawPoints.length >= 3) {
        isDrawingPolygon = false;
        let newId = polygons.length > 0 ? Math.max(...polygons.map(p => p.id)) + 1 : 1;
        let poly = new Polygon(newId, currentDrawPoints, polygonColors[colorIndex % polygonColors.length]);
        colorIndex++;
        polygons.push(poly);
        poly.render();
        updatePolygonList();
        if (previewPolyline) {
            map.removeLayer(previewPolyline);
            previewPolyline = null;
        }
        drawMarkers.clearLayers();
        currentDrawPoints = [];
    }
});

function toggleMeasurementPanel() {
    const panel = document.getElementById('measurementPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

console.log('✓ 應用程式已初始化完成 (完整版本)');
