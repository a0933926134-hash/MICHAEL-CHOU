<script>
/* 請將您目前 HTML 中的 <script> 區塊替換為以下程式碼 */

// 1. 初始化地圖與基礎變數 (請確保這段在原本的初始化區塊中)
let map = L.map('map').setView([25.012098, 121.465675], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: '© OpenStreetMap'}).addTo(map);
let results = [];
let origin = [25.012098, 121.465675]; // 您原本設定的起始點

// 2. 修正後的交流道專用路徑計算邏輯
async function getRouteDistance(to, straightDist, isJunction = false, isInZone = false){
    if(isInZone) return { value: 0, isFallback: false, msg: "" };
    try{
        // 若是交流道 (isJunction 為 true)，執行反向規劃以繞過單行道問題
        let url = `https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=false`;
        if(isJunction) {
            url = `https://router.project-osrm.org/route/v1/driving/${to[1]},${to[0]};${origin[1]},${origin[0]}?overview=false&radiuses=50;unlimited`;
        }
        const res = await fetch(url);
        const data = await res.json();
        if(data.routes && data.routes.length > 0) return { value: Math.round(data.routes[0].distance), isFallback: false, msg: "" };
        return { value: straightDist, isFallback: true, msg: " (直線備援)" };
    } catch(err) { return { value: straightDist, isFallback: true, msg: " (直線備援)" }; }
}

// 3. 修正後的查詢邏輯 (僅抓取 node 類型，排除 ramp 線段)
async function runQuery(){
    const lat = parseFloat(document.getElementById("lat").value);
    const lon = parseFloat(document.getElementById("lon").value);
    const radius = parseFloat(document.getElementById("radius").value);
    const checkedBoxes = document.querySelectorAll("input[type=checkbox]:checked");
    
    let parts = [];
    checkedBoxes.forEach(e => {
        // 關鍵修改：只抓 node，不抓 ramp
        if(e.value === "motorway_junction"){
            parts.push(`node["highway"="motorway_junction"](around:${radius},${lat},${lon});`);
        } else {
            parts.push(`nwr["${e.value}"](around:${radius},${lat},${lon});`);
        }
    });

    const query = `[out:json][timeout:60];(${parts.join("\n")});out center;`;
    const res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST", body: "data=" + encodeURIComponent(query)
    });
    const data = await res.json();
    
    results = [];
    data.elements.forEach(e => {
        let lat2 = e.center?.lat ?? e.lat;
        let lon2 = e.center?.lon ?? e.lon;
        let rawType = e.tags?.highway || "未知";
        
        results.push({
            名稱: e.tags?.name || "交流道節點",
            類型: rawType === "motorway_junction" ? "交流道主路口" : rawType,
            原始類型: rawType,
            座標: [lat2, lon2],
            距離: Math.round(111000 * Math.sqrt(Math.pow(lat - lat2, 2) + Math.pow(lon - lon2, 2)))
        });
    });

    renderTable();

    for (const item of results) {
        let isJunc = (item.原始類型 === "motorway_junction");
        const routeRes = await getRouteDistance(item.座標, item.距離, isJunc, false);
        item.路線距離 = routeRes.value + " m" + routeRes.msg;
        renderTable();
    }
}
    // 預先檢查是否有繪製好的多邊形，用來判定「設施是否在範圍內」
   let turfZonePolygon = null;

if (drawPoints && drawPoints.length >= 3) {

    let ring = drawPoints
    .filter(p => Array.isArray(p) && p.length === 2)
    .map(p => {
        const lat = Number(p[0]);
        const lon = Number(p[1]);
        return [lon, lat];
    });

    if (
        ring.length > 2 &&
        (
            ring[0][0] !== ring[ring.length - 1][0] ||
            ring[0][1] !== ring[ring.length - 1][1]
        )
    ) {
        ring.push(ring[0]);
    }

    if (ring.length < 4) {
        alert("範圍點不足或資料錯誤");
        return;
    }

    turfZonePolygon = turf.polygon([ring]);

    console.log("polygon:", turfZonePolygon);
}

    const checkedBoxes = document.querySelectorAll("input[type=checkbox]:checked");
    if(checkedBoxes.length === 0) {
        alert("請至少勾選一個分析類型！");
        queryBtn.disabled = false;
        queryBtn.innerText = "查詢";
        return;
    }

    checkedBoxes.forEach(e=>{
    let t=e.value;
    if(t==="station"){
    parts.push(`
    nwr["railway"="station"](around:${radius},${lat},${lon});
    nwr["railway"="station"]["station"="train"](around:${radius},${lat},${lon});
    nwr["railway"="station"]["train"="yes"](around:${radius},${lat},${lon});
    nwr["railway"="halt"](around:${radius},${lat},${lon});
    nwr["railway"="subway_entrance"](around:${radius},${lat},${lon});
    nwr["amenity"="bus_station"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="bus_stop"){
    parts.push(`nwr["highway"="bus_stop"](around:${radius},${lat},${lon});`);
    }
    else if(t==="motorway_junction"){
    parts.push(`
    node["highway"="motorway_junction"](around:${radius},${lat},${lon});
    `);
}
    else if(t==="parking"){
    parts.push(`
    nwr["amenity"="parking"](around:${radius},${lat},${lon});
    nwr["amenity"="parking_entrance"](around:${radius},${lat},${lon});
    nwr["parking"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="marketplace"){
    parts.push(`
    nwr["amenity"="marketplace"](around:${radius},${lat},${lon});
    nwr["shop"="supermarket"](around:${radius},${lat},${lon});
    nwr["name"~"costco|好市多|家樂福|大潤發|愛買",i](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="waste_disposal"){
    parts.push(`
    nwr["amenity"="waste_transfer_station"](around:${radius},${lat},${lon});
    nwr["name"~"焚化|垃圾|廢棄物|資源回收|處理場"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="park"){
    parts.push(`nwr["leisure"="park"](around:${radius},${lat},${lon});`);
    }
    else if(t==="tourism"){
    parts.push(`nwr["tourism"](around:${radius},${lat},${lon})["leisure"!="park"];`);
    }
    else if(t==="bank"){
parts.push(`
/* 銀行 */
nwr["amenity"="bank"](around:${radius},${lat},${lon});

/* 郵局（標準 OSM 標記） */
nwr["amenity"="post_office"](around:${radius},${lat},${lon});

/* 台灣常見：中華郵政被標成 bank */
nwr["operator"~"中華郵政|Chunghwa Post",i](around:${radius},${lat},${lon});

/* 台灣常見：品牌欄位 */
nwr["brand"~"中華郵政|Chunghwa Post",i](around:${radius},${lat},${lon});

/* 名稱包含郵局 */
nwr["name"~"郵局|Post Office",i](around:${radius},${lat},${lon});

/* 醫院 */
nwr["amenity"="hospital"](around:${radius},${lat},${lon});

/* 政府機關 */
nwr["office"="government"](around:${radius},${lat},${lon});
`);
}
    else if(t==="cemetery"){
    parts.push(`
    nwr["landuse"="cemetery"](around:${radius},${lat},${lon});
    nwr["name"~"親儀|生命紀念|納骨|火化"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="school"){
    parts.push(`
    nwr["amenity"="school"](around:${radius},${lat},${lon});
    nwr["amenity"="university"](around:${radius},${lat},${lon});
    node["entrance"="main"](around:${radius},${lat},${lon});
    node["amenity"="school_entrance"](around:${radius},${lat},${lon});
    node["barrier"="gate"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="gas"){
    parts.push(`
    nwr["power"="substation"](around:${radius},${lat},${lon});
    nwr["amenity"="fuel"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="pollution"){
    parts.push(`
    nwr["man_made"="wastewater_treatment_plant"](around:${radius},${lat},${lon});
    nwr["landuse"="industrial"](around:${radius},${lat},${lon});
    `);
    }
    });

    const query=`[out:json][timeout:60];(${parts.join("\n")});out center;`;
    const res=await fetch("https://overpass-api.de/api/interpreter",{
    method:"POST",
    body:"data="+encodeURIComponent(query),
    headers:{"Content-Type":"application/x-www-form-urlencoded"}
    });
    const data=await res.json();
    if(!data.elements) {
        queryBtn.disabled = false;
        queryBtn.innerText = "查詢";
        return;
    }

    let rawSchools = [];
    let gates = [];
    const dedup = new Set();

    data.elements.forEach(e=>{
        let lat2=e.center?.lat ?? e.lat;
        let lon2=e.center?.lon ?? e.lon;
        if(lat2 == null || lon2 == null) return;
        
        const key = `${e.type}-${e.id}`;
        if(dedup.has(key)) return;
        dedup.add(key);

        let rawType = e.tags?.highway || e.tags?.amenity || e.tags?.tourism || e.tags?.shop || e.tags?.railway || e.tags?.entrance || e.tags?.barrier || "未知";
        /* 郵局特徵強制修正 */
if(
e.tags?.amenity === "post_office" ||
/郵局/i.test(e.tags?.name || "") ||
/中華郵政/i.test(e.tags?.operator || "") ||
/中華郵政/i.test(e.tags?.brand || "")
){
    rawType = "post_office";
}
        let name = e.tags?.name || "";

        if(rawType === "school" || rawType === "university") {
            rawSchools.push({ id: e.id, name: name, lat: lat2, lon: lon2, rawType: rawType });
        } else if(rawType === "main" || rawType === "school_entrance" || rawType === "gate" || e.tags?.entrance === "main") {
            gates.push({ lat: lat2, lon: lon2 });
        } else {
            // 修正前
let typeName = rawType;
if(rawType === "motorway_junction" || rawType === "ramp") typeName = "交流道入口(平面路口)";

// 修正後
let typeName = rawType;
if(rawType === "motorway_junction") typeName = "交流道主路口";
            if(rawType === "post_office"){
    typeName = "郵局";
}
            // ★核心空間拓撲判定：利用 Turf.js 計算設施點是否落在編輯範圍內
            let inside = false;
            if(turfZonePolygon) {
                let pt = turf.point([lon2, lat2]);
                inside = turf.booleanPointInPolygon(pt, turfZonePolygon);
            }

            results.push({
                id: results.length,
                名稱: name || (rawType === "ramp" ? "交流道平面路口/匝道端" : "周邊設施"),
                類型: typeName,
                原始類型: rawType,
                座標: [lat2, lon2],
                在範圍內: inside,
                距離: inside ? 0 : Math.round(haversine(lat, lon, lat2, lon2)),
                直線距離顯示: inside ? "0 (位於區段範圍內)" : Math.round(haversine(lat, lon, lat2, lon2)),
                路線距離: inside ? "0 (位於區段範圍內)" : "計算中...",
                路線距離數值: inside ? 0 : null
            });
        }
    });

    rawSchools.forEach(sch => {
        let finalLat = sch.lat;
        let finalLon = sch.lon;
        let hasMainGate = false;
        let minGateDist = 250; 

        gates.forEach(gate => {
            let d = haversine(sch.lat, sch.lon, gate.lat, gate.lon);
            if(d < minGateDist) {
                minGateDist = d;
                finalLat = gate.lat;
                finalLon = gate.lon;
                hasMainGate = true;
            }
        });

        // 學校部分同樣進行多邊形相交檢查
        let inside = false;
        if(turfZonePolygon) {
            let pt = turf.point([finalLon, finalLat]);
            inside = turf.booleanPointInPolygon(pt, turfZonePolygon);
        }

        results.push({
            id: results.length,
            名稱: sch.name || "未命名學校",
            類型: hasMainGate ? "學校(已精準定位大門門牌)" : "學校區域(採用形心估算)",
            原始類型: sch.rawType,
            座標: [finalLat, finalLon],
            在範圍內: inside,
            距離: inside ? 0 : Math.round(haversine(lat, lon, finalLat, finalLon)),
            直線距離顯示: inside ? "0 (位於區段範圍內)" : Math.round(haversine(lat, lon, finalLat, finalLon)),
            路線距離: inside ? "0 (位於區段範圍內)" : "計算中...",
            路線距離數值: inside ? 0 : null
        });
    });

    // 排序：0公尺（在範圍內）的設施會自動排在表格最上方
    results.sort((a,b)=>a.距離-b.距離);
    renderTable();

    results.forEach(item => {
        const m=L.marker(item.座標).addTo(markerLayer).bindTooltip(item.名稱,{direction:"top"});
        m.on("click",()=>{
            map.flyTo(item.座標,17,{duration:0.8});
            selectItem(item);
        });
    });

    queryBtn.innerText = "🚗 計算路網距離中...";

    /* 背景非同步更新路網距離 */
    for (const item of results.slice(0,80)) {
        if (item.在範圍內) continue; // 如果在範圍內，直接跳過不打 API，保留 0 值的顯示
        
        let isJunc = item.原始類型 === "motorway_junction"; 
const routeRes = await getRouteDistance(item.座標, item.距離, isJunc, item.在範圍內);

        item.路線距離數值 = routeRes.value;
        item.路線距離 = routeRes.value + " m" + routeRes.msg;

        const cell = document.getElementById(`route-${item.id}`);
        if(cell) cell.innerText = item.路線距離;
    }

} catch(err) {
    console.error(err);
    alert("查詢發生異常，請稍後再試。");
} finally {
    queryBtn.disabled = false;
    queryBtn.innerText = "查詢";
}
}

/* 點擊欄位排序 */
function sortResults(type){
if(type==="distance"){
results.sort((a,b)=>{ return sortState.distance ? a.距離 - b.距離 : b.距離 - a.距離; });
sortState.distance = !sortState.distance;
}
else if(type==="route"){
results.sort((a,b)=>{
const ra = a.路線距離數值 ?? 99999999;
const rb = b.路線距離數值 ?? 99999999;
return sortState.route ? ra - rb : rb - ra;
});
sortState.route = !sortState.route;
}
renderTable();
}

/* 重新渲染表格 */
function renderTable(){
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";
        results.forEach(item => {
            tbody.innerHTML += `<tr><td>${item.名稱}</td><td>${item.類型}</td><td>${item.距離}m</td><td>${item.路線距離 || "計算中..."}</td></tr>`;
        });
    }

/* 清除路網藍線 */
function clearRoute(){
if(routeLayer){ map.removeLayer(routeLayer); routeLayer=null; }
routeInfo.innerText="路線距離：尚未計算";
}
/* =========================================================
   DEM 坡度分析
   ========================================================= */
    async function analyzeSlope() {

    const slopeInfo = document.getElementById("slopeInfo");

    if (!drawPoints || drawPoints.length < 3) {
        alert("請先繪製分析範圍");
        return;
    }

    slopeInfo.innerHTML = "🌄 DEM 坡度分析中...";

    try {

        markerLayer.clearLayers();

        // =========================
        // 1. 建立 polygon（安全版）
        // =========================
        let ring = drawPoints.map(p => [Number(p[1]), Number(p[0])]);

        if (ring.length < 3) {
            alert("範圍點不足");
            return;
        }

        if (
            ring[0][0] !== ring[ring.length - 1][0] ||
            ring[0][1] !== ring[ring.length - 1][1]
        ) {
            ring.push(ring[0]);
        }

        const polygon = turf.polygon([ring]);
        const bbox = turf.bbox(polygon);

        const [minLon, minLat, maxLon, maxLat] = bbox;

        // =========================
        // 2. 自動決定取樣解析度
        // =========================
        const step = Math.max(
            Math.max(maxLon - minLon, maxLat - minLat) / 30,
            0.00005
        );

        let elevations = [];
        let insideCount = 0;

        // =========================
        // 3. DEM 採樣（有節流避免卡死）
        // =========================
        for (let lat = minLat; lat <= maxLat; lat += step) {
            for (let lon = minLon; lon <= maxLon; lon += step) {

                const pt = turf.point([lon, lat]);

                if (!turf.booleanPointInPolygon(pt, polygon)) continue;

                insideCount++;

                const ele = await getElevation(lat, lon);

                if (ele === null || isNaN(ele)) continue;

                elevations.push({ lat, lon, ele });

                // 防止 API 過快
                await new Promise(r => setTimeout(r, 8));
            }
        }

        // =========================
        // 4. fallback（避免點太少）
        // =========================
        if (elevations.length < 5) {

            const centroid = turf.centroid(polygon).geometry.coordinates;

            const ele = await getElevation(centroid[1], centroid[0]);

            if (ele !== null) {
                elevations = [{
                    lat: centroid[1],
                    lon: centroid[0],
                    ele
                }];
            } else {
                slopeInfo.innerHTML = "⚠ DEM 無資料";
                return;
            }
        }

        // =========================
        // 5. 坡度計算（只做一次）
        // =========================
        let slopes = [];

        for (let i = 1; i < elevations.length; i++) {

            const p1 = elevations[i - 1];
            const p2 = elevations[i];

            const dist = haversine(p1.lat, p1.lon, p2.lat, p2.lon);
            if (dist < 1) continue;

            const rise = Math.abs(p2.ele - p1.ele);

            slopes.push((rise / dist) * 100);
        }

        if (!slopes.length) {
            slopeInfo.innerHTML = "⚠ 無法計算坡度";
            return;
        }

        // =========================
        // 6. 統計
        // =========================
        const elevs = elevations.map(e => e.ele);

        const minElev = Math.min(...elevs);
        const maxElev = Math.max(...elevs);
        const avgElev = elevs.reduce((a, b) => a + b, 0) / elevs.length;

        const avgSlope = slopes.reduce((a, b) => a + b, 0) / slopes.length;
        const maxSlope = Math.max(...slopes);
        const minSlope = Math.min(...slopes);

        let terrainType = "平坦";
        if (avgSlope > 30) terrainType = "陡坡";
        else if (avgSlope > 15) terrainType = "中坡";
        else if (avgSlope > 5) terrainType = "緩坡";

        // =========================
        // 7. UI 顯示
        // =========================
        slopeInfo.innerHTML = `
<b>🌄 DEM 坡度分析完成</b><br>
採樣點數：${elevations.length}<br><br>

平均高程：${avgElev.toFixed(1)} m<br>
最低高程：${minElev.toFixed(1)} m<br>
最高高程：${maxElev.toFixed(1)} m<br><br>

平均坡度：${avgSlope.toFixed(2)} %<br>
最大坡度：${maxSlope.toFixed(2)} %<br>
最小坡度：${minSlope.toFixed(2)} %<br><br>

地形分類：<b>${terrainType}</b>
        `;

        // =========================
        // 8. 視覺化
        // =========================
        elevations.forEach(p => {

            let color = "#22c55e";
            if (avgSlope > 30) color = "#dc2626";
            else if (avgSlope > 15) color = "#f97316";
            else if (avgSlope > 5) color = "#eab308";

            L.circleMarker([p.lat, p.lon], {
                radius: 4,
                color,
                fillColor: color,
                fillOpacity: 0.9,
                weight: 1
            })
            .addTo(markerLayer)
            .bindTooltip(`高程: ${p.ele.toFixed(1)} m`);
        });

    } catch (err) {
        console.error(err);
        slopeInfo.innerHTML = "❌ DEM 坡度分析失敗";
    }
}

/* 表格視窗拖曳 */
let isDragging = false;
let offsetX = 0; let offsetY = 0;
const panel = document.getElementById("resultPanel");
const header = document.getElementById("resultHeader");

header.addEventListener("mousedown", function(e){
if(e.target.tagName === "BUTTON") return; 
isDragging = true;
const rect = panel.getBoundingClientRect();
offsetX = e.clientX - rect.left;
offsetY = e.clientY - rect.top;
panel.style.position = "absolute";
panel.style.zIndex = 9999;
});

document.addEventListener("mousemove", function(e){
if(!isDragging) return;
panel.style.left = (e.clientX - offsetX) + "px";
panel.style.top = (e.clientY - offsetY) + "px";
panel.style.right = "auto";
});

document.addEventListener("mouseup", function(){ isDragging = false; });
/* ==========================
   坡度面板拖曳
   ========================== */

let slopeDragging = false;
let slopeOffsetX = 0;
let slopeOffsetY = 0;

const slopePanel = document.getElementById("slopePanel");
const slopeHeader = document.getElementById("slopeHeader");

slopeHeader.addEventListener("mousedown", function(e){

    if(e.target.tagName === "BUTTON") return;

    slopeDragging = true;

    const rect = slopePanel.getBoundingClientRect();

    slopeOffsetX = e.clientX - rect.left;
    slopeOffsetY = e.clientY - rect.top;

    slopePanel.style.position = "absolute";
    slopePanel.style.zIndex = 99999;
});

document.addEventListener("mousemove", function(e){

    if(!slopeDragging) return;

    slopePanel.style.left =
        (e.clientX - slopeOffsetX) + "px";

    slopePanel.style.top =
        (e.clientY - slopeOffsetY) + "px";
});

document.addEventListener("mouseup", function(){

    slopeDragging = false;

});    
</script>
