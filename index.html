<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>GIS 查詢升級版（距離排序版）</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height: 100vh; }

#panel {
    position:absolute;
    top:10px;
    right:10px;
    width:280px;
    background:white;
    padding:12px;
    z-index:1000;
    border-radius:10px;
    box-shadow:0 0 12px rgba(0,0,0,0.3);
    font-size:13px;
}

table {
    width:100%;
    margin-top:10px;
    border-collapse: collapse;
    font-size:12px;
}
td,th {
    border:1px solid #ccc;
    padding:4px;
}
</style>
</head>

<body>

<div id="panel">
<h3>GIS 查詢</h3>

緯度:<input id="lat" value="25.04024"><br>
經度:<input id="lon" value="121.43148"><br>
半徑(m):<input id="radius" value="2000"><br>

<h4>類型</h4>

<label><input type="checkbox" value="station">大型車站</label><br>
<label><input type="checkbox" value="bus_stop">公車站牌</label><br>
<label><input type="checkbox" value="motorway_junction">交流道</label><br>

<label><input type="checkbox" value="school" checked>學校</label><br>
<label><input type="checkbox" value="hospital" checked>醫院</label><br>
<label><input type="checkbox" value="marketplace">市場</label><br>
<label><input type="checkbox" value="park">公園</label><br>
<label><input type="checkbox" value="parking">停車場</label><br>
<label><input type="checkbox" value="bank">銀行</label><br>

<button onclick="runQuery()">查詢</button>
<button onclick="exportData()">匯出</button>

<hr>

<div id="distanceLabel">路線距離: 0 m</div>

<button onclick="clearRoute()">清除量取路線</button>

<table>
<thead>
<tr><th>名稱</th><th>類型</th><th>距離(m)</th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<div id="map"></div>

<script>

// ===== map =====
let map=L.map('map',{zoomControl:false}).setView([25.04024,121.43148],15);
L.control.zoom({position:'topright'}).addTo(map);
L.control.scale({position:'bottomright',imperial:false}).addTo(map);

L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',{
    maxZoom:19
}).addTo(map);

// ===== UI =====
const latInput=document.getElementById("lat");
const lonInput=document.getElementById("lon");
const radiusInput=document.getElementById("radius");
const tbody=document.getElementById("tbody");
const distanceLabel=document.getElementById("distanceLabel");

// ===== data =====
let markerLayer=L.layerGroup().addTo(map);
let circleLayer,userMarker,routeLayer;
let results=[];
let origin=null;

// ===== icon =====
const redIcon = new L.Icon({
    iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
});

// ===== Haversine =====
function haversine(lat1, lon1, lat2, lon2){
    const R=6371000;
    const toRad=x=>x*Math.PI/180;
    const dLat=toRad(lat2-lat1);
    const dLon=toRad(lon2-lon1);
    const a=Math.sin(dLat/2)**2 +
        Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
        Math.sin(dLon/2)**2;
    return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

// ===== update =====
function updateLatLng(lat,lng){

    const fixLat=parseFloat(lat.toFixed(6));
    const fixLng=parseFloat(lng.toFixed(6));

    latInput.value=fixLat;
    lonInput.value=fixLng;

    origin=[fixLat,fixLng];

    return [fixLat,fixLng];
}

// ===== route =====
async function drawRoute(dest){

    if(!origin || !dest) return;

    const url=`https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${dest[1]},${dest[0]}?overview=full&geometries=geojson`;

    const res=await fetch(url);
    const data=await res.json();

    if(!data.routes?.[0]) return;

    const route=data.routes[0];

    if(routeLayer) map.removeLayer(routeLayer);

    routeLayer=L.geoJSON(route.geometry,{
        style:{color:'blue',weight:5}
    }).addTo(map);

    distanceLabel.innerText="路線距離: "+Math.round(route.distance)+" m";
}

// ===== 清除 =====
function clearRoute(){

    if(routeLayer){
        map.removeLayer(routeLayer);
        routeLayer=null;
    }

    distanceLabel.innerText="路線距離: 0 m";
    origin=null;
}

// ===== click =====
map.on('click',function(e){
    updateLatLng(e.latlng.lat,e.latlng.lng);
});

// ===== query =====
async function runQuery(){

    let lat=parseFloat(latInput.value);
    let lon=parseFloat(lonInput.value);
    const radius=parseFloat(radiusInput.value);

    [lat,lon]=updateLatLng(lat,lon);

    if(circleLayer) map.removeLayer(circleLayer);
    markerLayer.clearLayers();

    if(userMarker) map.removeLayer(userMarker);
    userMarker=L.marker([lat,lon],{icon:redIcon}).addTo(map);

    circleLayer=L.circle([lat,lon],{radius}).addTo(map);

    let parts=[];

    document.querySelectorAll("input[type=checkbox]:checked").forEach(e=>{
        let t=e.value;

        if(t==="park"){
            parts.push(`node["leisure"="park"](around:${radius},${lat},${lon});
            way["leisure"="park"](around:${radius},${lat},${lon});
            relation["leisure"="park"](around:${radius},${lat},${lon});`);
        }

        else if(t==="station"){
            parts.push(`
            node["railway"="station"](around:${radius},${lat},${lon});
            node["railway"="subway_entrance"](around:${radius},${lat},${lon});
            node["amenity"="bus_station"](around:${radius},${lat},${lon});
            `);
        }

        else{
            parts.push(`node["amenity"="${t}"](around:${radius},${lat},${lon});
            way["amenity"="${t}"](around:${radius},${lat},${lon});
            relation["amenity"="${t}"](around:${radius},${lat},${lon});`);
        }
    });

    const query=`[out:json][timeout:25];(${parts.join("")});out center;`;

    const res=await fetch("https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query));
    const data=await res.json();

    results=[];

    data.elements.forEach(e=>{
        const lat2=e.lat||e.center?.lat;
        const lon2=e.lon||e.center?.lon;
        if(!lat2) return;

        const dist=haversine(lat,lon,lat2,lon2);

        results.push({
            名稱:e.tags?.name||"未命名",
            類型:e.tags?.railway||e.tags?.amenity||"",
            距離:Math.round(dist),
            緯度:parseFloat(lat2.toFixed(6)),
            經度:parseFloat(lon2.toFixed(6))
        });
    });

    // ⭐⭐⭐ 關鍵修正：距離排序 ⭐⭐⭐
    results.sort((a,b)=>a.距離-b.距離);

    render();
}

// ===== render =====
function render(){

    tbody.innerHTML="";
    markerLayer.clearLayers();

    results.forEach(r=>{

        const marker=L.marker([r.緯度,r.經度]).addTo(markerLayer);

        marker.on("click",()=>{
            drawRoute([r.緯度,r.經度]);
        });

        tbody.innerHTML+=`
        <tr onclick="drawRoute([${r.緯度},${r.經度}])">
            <td style="cursor:pointer;color:blue">${r.名稱}</td>
            <td>${r.類型}</td>
            <td>${r.距離}</td>
        </tr>`;
    });
}

// ===== export =====
function exportData(){
    alert("維持原功能");
}

</script>

</body>
</html>
