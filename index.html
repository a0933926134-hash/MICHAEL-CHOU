<body>

<div style="position:absolute;bottom:8px;left:12px;font-size:11px;color:#666;background:rgba(255,255,255,0.8);padding:4px 8px;border-radius:6px;z-index:1000;">
圖資來源 © OpenStreetMap contributors ／ 國土測繪中心(NLSC)
</div>

<div id="panel">
<h3>影響地價區域因素明細表(住宅用地)</h3>

緯度:<input id="lat" value="25.012098"><br>

半徑(m):<input id="radius" value="1000"><br>

<label><input type="checkbox" value="station">交通運輸-接近大型車站</label>

<label><input type="checkbox" value="school" checked>公共建設-接近學校</label>
<label><input type="checkbox" value="marketplace">公共建設-接近市場</label>
<label><input type="checkbox" value="park">公共建設-接近公園</label>
<label><input type="checkbox" value="parking">公共建設-停車場</label>
<label><input type="checkbox" value="bank">公共建設-服務性設施</label>

</div>

查詢結果 <span id="resultCount">0</span>

</div>

<thead>
<tr>

</table>

        🗺️ 多邊形管理

    </div>
</div>

<div id="measurementPanel" style="display:none;">
    <div id="measurementHeader" style="background:#1e40af;color:white;padding:8px;font-weight:bold;">
        📏 形心距離量測
        <span style="cursor:pointer;" onclick="toggleMeasurementPanel()">✕</span>
    </div>
    <div id="measurementContent">
        <div id="measurementInfo">請選擇多邊形進行量測</div>
    </div>
</div>

<div id="map"></div>

<script>
// ============================================================
// 全局變數
// ============================================================
let map = L.map('map').setView([25.012098, 121.465675], 15);
let markerLayer = L.layerGroup().addTo(map);
let polygons = [];
let selectedPolygonId = null;
let isDrawingPolygon = false;
let currentDrawPoints = [];
let previewPolyline = null;
let drawMarkers = L.layerGroup().addTo(map);

let results = [];
let origin = [25.012098, 121.465675];
let userMarker = null;
let sortState = { distance: true };

const latInput = document.getElementById("lat");
const lonInput = document.getElementById("lon");
const radiusInput = document.getElementById("radius");
const tbody = document.getElementById("tbody");
const queryBtn = document.getElementById("query-btn");
const routeInfo = document.getElementById("routeInfo");

// ============================================================
// 地圖初始化
// ============================================================
const nlscEMAP = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}', {
    maxZoom: 19,
    attribution: '© NLSC'
});

const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
});

nlscEMAP.addTo(map);

L.control.layers({
    "NLSC 電子地圖": nlscEMAP,
    "OpenStreetMap": osmLayer
}, {}, { collapsed: false, position: 'topright' }).addTo(map);

// 初始標記
userMarker = L.marker(origin, {
    icon: L.divIcon({
        html: '<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9]
    })
}).addTo(map);

// ============================================================
// 核心函數：Haversine 距離
// ============================================================
function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const rad = Math.PI / 180;
    const dLat = (lat2 - lat1) * rad;
    const dLon = (lon2 - lon1) * rad;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * rad) * Math.cos(lat2 * rad) * 
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

// ============================================================
// 核心函數：查詢 (使用多個 CORS 代理)
// ============================================================
async function runQuery() {
    const lat = parseFloat(latInput.value);
    const lon = parseFloat(lonInput.value);
    const radius = parseFloat(radiusInput.value);
    
    if (isNaN(lat) || isNaN(lon) || isNaN(radius)) {
        alert('請輸入有效的緯度、經度和半徑');
        return;
    }
    
    origin = [lat, lon];
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker(origin, {
        icon: L.divIcon({
            html: '<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;"></div>',
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        })
    }).addTo(map);
    
    map.setView(origin, 15);
    
    queryBtn.disabled = true;
    queryBtn.innerText = '查詢中...';
    routeInfo.innerHTML = '狀態：查詢中...';
    
    results = [];
    tbody.innerHTML = '';
    
    const checkboxes = document.querySelectorAll('#panel input[type="checkbox"]:checked');
    const types = Array.from(checkboxes).map(cb => cb.value);
    
    if (types.length === 0) {
        alert('請至少選擇一個類型');
        queryBtn.disabled = false;
        queryBtn.innerText = '查詢';
        routeInfo.innerHTML = '狀態：就緒';
        return;
    }
    
    try {
        // 使用 Promise.allSettled 防止單個失敗導致整體失敗
        const promises = types.map(type => queryOverpassAPI(lat, lon, radius, type));
        const responses = await Promise.allSettled(promises);
        
        responses.forEach((response, idx) => {
            if (response.status === 'fulfilled' && response.value) {
                const data = response.value;
                if (data.elements && data.elements.length > 0) {
                    data.elements.forEach(elem => {
                        if (elem.lat && elem.lon) {
                            const dist = haversine(lat, lon, elem.lat, elem.lon);
                            results.push({
                                name: (elem.tags && elem.tags.name) || '未命名',
                                type: types[idx],
                                lat: elem.lat,
                                lon: elem.lon,
                                distance: dist
                            });
                        }
                    });
                }
            }
        });
        
        displayResults();
        drawResultMarkers();
        routeInfo.innerHTML = `狀態：完成，找到 ${results.length} 筆結果`;
        
    } catch (error) {
        console.error('查詢失敗:', error);
        alert('查詢失敗: ' + error.message);
        routeInfo.innerHTML = '狀態：查詢失敗';
    } finally {
        queryBtn.disabled = false;
        queryBtn.innerText = '查詢';
    }
}

// ============================================================
// Overpass API 查詢 (多個 CORS 代理支援)
// ============================================================
async function queryOverpassAPI(lat, lon, radius, type) {
    const tagMap = {
        'station': 'railway=station',
        'bus_stop': 'highway=bus_stop',
        'school': 'amenity=school',
        'marketplace': 'shop=supermarket|amenity=marketplace',
        'park': 'leisure=park',
        'parking': 'amenity=parking',
        'bank': 'amenity=bank|amenity=bank'
    };
    
    // 轉換為邊界框
    const latDelta = radius / 111000;
    const lonDelta = radius / (111000 * Math.cos(lat * Math.PI / 180));
    
    const query = `
[bbox:${lat-latDelta},${lon-lonDelta},${lat+latDelta},${lon+lonDelta}];
(
  node[${tagMap[type]}];
  way[${tagMap[type]}];
  relation[${tagMap[type]}];
);
out center;
    `;
    
    // 多個 CORS 代理
    const corsProxies = [
        'https://cors.bridged.cc/https://overpass-api.de/api/interpreter',
        'https://api.allorigins.win/raw?url=https://overpass-api.de/api/interpreter'
    ];
    
    // 嘗試直接連接 (現代瀏覽器可能支援)
    const directUrls = [
        'https://overpass-api.de/api/interpreter',
        'https://lz4.overpass-api.de/api/interpreter'
    ];
    
    // 先嘗試直接連接
    for (let url of directUrls) {
        try {
            const response = await fetch(url, {
                method: 'POST',
                body: query,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            
            if (response.ok) {
                const data = await response.json();
                console.log(`[${type}] 成功 from ${url}`);
                return data;
            }
        } catch (e) {
            console.warn(`直接連接 ${url} 失敗: ${e.message}`);
        }
    }
    
    // 返回空結果而不是拋出錯誤
    console.warn(`查詢 ${type} 未獲得結果`);
    return { elements: [] };
}

function displayResults() {
    document.getElementById('resultCount').innerText = results.length;
    
    if (results.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#999;">未找到結果</td></tr>';
        return;
    }
    
    tbody.innerHTML = '';
    results.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.type}</td>
            <td>${(item.distance/1000).toFixed(2)} km</td>
        `;
        tbody.appendChild(row);
    });
}

function drawResultMarkers() {
    markerLayer.clearLayers();
    results.forEach(item => {
        L.circleMarker([item.lat, item.lon], {
            radius: 6,
            fillColor: '#2563eb',
            color: '#1d4ed8',
            weight: 2,
            opacity: 0.8,
            fillOpacity: 0.6
        }).addTo(markerLayer).bindPopup(`
            <div style="font-size:12px;">
                <b>${item.name}</b><br>
                類型: ${item.type}<br>
                距離: ${(item.distance/1000).toFixed(2)} km
            </div>
        `);
    });
}

function sortResults(field) {
    sortState[field] = !sortState[field];
    results.sort((a, b) => {
        return sortState[field] ? a[field] - b[field] : b[field] - a[field];
    });
    displayResults();
}

function exportExcel() {
    if (results.length === 0) {
        alert('沒有結果可匯出');
        return;
    }
    
    const data = results.map(r => ({
        '名稱': r.name,
        '類型': r.type,
        '距離(km)': (r.distance/1000).toFixed(2)
    }));
    
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '查詢結果');
    XLSX.writeFile(wb, '地價因素查詢結果.xlsx');
}

// ============================================================
// 多邊形管理
// ============================================================
class Polygon {
    constructor(id, points, color) {
        this.id = id;
        this.points = points;
        this.color = color;
        this.leafletPolygon = null;
        this.centroid = null;
        this.area = 0;
        this.isSelected = false;
        this.calculateCentroid();
    }

    calculateCentroid() {
        if (this.points.length < 3) return;
        let coordinates = this.points.map(p => [p[1], p[0]]);
        if (coordinates[0][0] !== coordinates[coordinates.length-1][0]) {
            coordinates.push([this.points[0][1], this.points[0][0]]);
        }
        let turfPoly = turf.polygon([coordinates]);
        let centroidObj = turf.centroid(turfPoly);
        this.centroid = [centroidObj.geometry.coordinates[1], centroidObj.geometry.coordinates[0]];
        this.area = turf.area(turfPoly);
    }

    render() {
        if (this.leafletPolygon) map.removeLayer(this.leafletPolygon);
        this.leafletPolygon = L.polygon(this.points, {
            color: this.color,
            weight: this.isSelected ? 4 : 3,
            fillColor: this.color,
            fillOpacity: 0.3
        }).addTo(map);
        this.leafletPolygon.bindPopup(`
            <div style="font-size:12px;">
                <b>多邊形 #${this.id}</b><br>
                面積: ${(this.area/10000).toFixed(2)} 公頃
            </div>
        `);
    }

    delete() {
        if (this.leafletPolygon) map.removeLayer(this.leafletPolygon);
        polygons = polygons.filter(p => p.id !== this.id);
        updatePolygonList();
    }
}

const polygonColors = ['#dc2626', '#2563eb', '#059669', '#ea580c'];
let colorIndex = 0;

function addNewPolygon() {
    alert('多邊形繪製功能：在地圖上點擊以繪製多邊形（至少3點），完成後按右鍵');
    isDrawingPolygon = true;
    currentDrawPoints = [];
}

function updatePolygonList() {
    const listDiv = document.getElementById('polygonListItems');
    listDiv.innerHTML = '';
    if (polygons.length === 0) {
        listDiv.innerHTML = '<div style="padding:8px; color:#999;">尚無多邊形</div>';
        return;
    }
    polygons.forEach(poly => {
        const item = document.createElement('div');
        item.className = 'polygon-item';
        item.innerHTML = `
            <div style="flex:1;">
                <div style="color:${poly.color};">多邊形 #${poly.id}</div>
                <div style="font-size:10px;color:#666;">面積: ${(poly.area/10000).toFixed(2)} 公頃</div>
            </div>
            <button onclick="deletePolygon(${poly.id})" style="background:#ef4444;color:white;border:none;padding:3px 6px;border-radius:3px;cursor:pointer;">刪除</button>
        `;
        listDiv.appendChild(item);
    });
}

function deletePolygon(id) {
    const poly = polygons.find(p => p.id === id);
    if (poly) poly.delete();
}

map.on('click', function(e) {
    if (isDrawingPolygon) {
        currentDrawPoints.push([e.latlng.lat, e.latlng.lng]);
        L.circleMarker([e.latlng.lat, e.latlng.lng], {
            radius: 4,
            fillColor: '#ef4444',
            color: '#dc2626',
            weight: 2
        }).addTo(drawMarkers);
        
        if (currentDrawPoints.length > 1) {
            if (previewPolyline) map.removeLayer(previewPolyline);
            previewPolyline = L.polyline(currentDrawPoints, {
                color: '#2563eb',
                weight: 2,
                dashArray: '5,5'
            }).addTo(map);
        }
    }
});

map.on('contextmenu', function(e) {
    if (isDrawingPolygon && currentDrawPoints.length >= 3) {
        isDrawingPolygon = false;
        let newId = polygons.length > 0 ? Math.max(...polygons.map(p => p.id)) + 1 : 1;
        let poly = new Polygon(newId, currentDrawPoints, polygonColors[colorIndex % polygonColors.length]);
        colorIndex++;
        polygons.push(poly);
        poly.render();
        updatePolygonList();
        if (previewPolyline) {
            map.removeLayer(previewPolyline);
            previewPolyline = null;
        }
        drawMarkers.clearLayers();
        currentDrawPoints = [];
    }
});

function toggleMeasurementPanel() {
    const panel = document.getElementById('measurementPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

console.log('✓ 應用程式已初始化完成');
</script>
