<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>市價徵收查估作業-地標距離</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }

#panel{
position:absolute;
top:12px;
right:12px;
width:320px;
background: linear-gradient(135deg,#ffffff,#f3f7ff);
padding:14px;
z-index:1000;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
font-size:13px;
border:1px solid #e6e9ff;
}

#panel h3{margin:0 0 8px 0;color:#1e3a8a;}
#panel h4{margin:10px 0 6px;color:#2563eb;border-left:4px solid #2563eb;padding-left:6px;}

#panel input{
width:95%;
padding:6px;
margin:3px 0;
border-radius:8px;
border:1px solid #cbd5e1;
}

#panel label{
display:grid;
grid-template-columns: 18px 1fr;
align-items:center;
column-gap:8px;
padding:4px 6px;
border-radius:8px;
cursor:pointer;
}

#panel label:hover{background:#e0ecff;}

#panel button{
width:100%;
margin-top:6px;
padding:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

#panel button:nth-of-type(1){background:#2563eb;color:white;}
#panel button:nth-of-type(2){background:#10b981;color:white;}
#getLocationBtn{background:#f59e0b;color:white;}
#panel button:last-of-type{background:#ef4444;color:white;}

#distanceLabel{
margin-top:8px;
padding:6px;
background:#eff6ff;
border-radius:8px;
font-weight:bold;
color:#1d4ed8;
}

table{
width:100%;
margin-top:10px;
border-collapse: collapse;
font-size:12px;
background:white;
border-radius:8px;
overflow:hidden;
}

td,th{
border:1px solid #e5e7eb;
padding:4px;
}

th{background:#dbeafe;}
tr:hover{background:#f1f5f9;}
</style>
</head>

<body>

<div id="panel">

<h3>GIS 查詢</h3>

緯度:<input id="lat" value="25.04024"><br>
經度:<input id="lon" value="121.43148"><br>
半徑(m):<input id="radius" value="2000"><br>

<button id="getLocationBtn" onclick="getCurrentLocation()">📍取得現在位置</button>

<h4>類型</h4>

<label><input type="checkbox" value="station">大型車站</label>
<label><input type="checkbox" value="bus_stop">公車站牌</label>
<label><input type="checkbox" value="motorway_junction">交流道</label>

<label><input type="checkbox" value="school" checked>學校</label>
<label><input type="checkbox" value="hospital" checked>醫院</label>

<label><input type="checkbox" value="marketplace">市場 / 超市</label>

<label><input type="checkbox" value="park">公園</label>
<label><input type="checkbox" value="parking">停車場</label>
<label><input type="checkbox" value="bank">銀行</label>

<button onclick="runQuery()">查詢</button>
<button onclick="exportData()">匯出</button>

<hr>

<div id="distanceLabel">路線距離: 0 m</div>
<button onclick="clearRoute()">清除量取路線</button>

<table>
<thead>
<tr><th>名稱</th><th>類型</th><th>距離(m)</th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<div id="map"></div>

<script>

let map=L.map('map').setView([25.04024,121.43148],15);

L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',{
maxZoom:19
}).addTo(map);

const latInput=document.getElementById("lat");
const lonInput=document.getElementById("lon");
const radiusInput=document.getElementById("radius");
const tbody=document.getElementById("tbody");
const distanceLabel=document.getElementById("distanceLabel");

let markerLayer=L.layerGroup().addTo(map);
let circleLayer=null;
let routeLayer=null;
let userMarker=null;
let origin=null;
let results=[];

const redIcon = new L.Icon({
iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
iconSize:[25,41],
iconAnchor:[12,41]
});

function updateCircle(lat,lon,radius){
if(circleLayer) map.removeLayer(circleLayer);
circleLayer=L.circle([lat,lon],{
radius,
color:'blue',
fillColor:'#3b82f6',
fillOpacity:0.15
}).addTo(map);
}

/* ===== 正確定位（不影響查詢） ===== */
function getCurrentLocation(){

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

latInput.value=lat.toFixed(6);
lonInput.value=lon.toFixed(6);
origin=[lat,lon];

if(userMarker) map.removeLayer(userMarker);
userMarker=L.marker([lat,lon],{icon:redIcon}).addTo(map);

map.setView([lat,lon],16);
updateCircle(lat,lon,parseFloat(radiusInput.value));

},{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
});

}

map.on('click',e=>{
const lat=e.latlng.lat;
const lon=e.latlng.lng;

latInput.value=lat.toFixed(6);
lonInput.value=lon.toFixed(6);
origin=[lat,lon];

if(userMarker) map.removeLayer(userMarker);
userMarker=L.marker([lat,lon],{icon:redIcon}).addTo(map);

updateCircle(lat,lon,parseFloat(radiusInput.value));
});

/* ===== ⭐ 已修正查詢（重點） ===== */
async function runQuery(){

const lat=parseFloat(latInput.value);
const lon=parseFloat(lonInput.value);
const radius=parseFloat(radiusInput.value);

origin=[lat,lon];

markerLayer.clearLayers();
tbody.innerHTML="";
results=[];

updateCircle(lat,lon,radius);

let parts=[];

document.querySelectorAll("input[type=checkbox]:checked").forEach(e=>{
let t=e.value;

/* ✔ 正確還原三大類型 */

if(t==="station"){
parts.push(`node["railway"="station"](around:${radius},${lat},${lon});`);
}

else if(t==="bus_stop"){
parts.push(`node["highway"="bus_stop"](around:${radius},${lat},${lon});`);
}

else if(t==="motorway_junction"){
parts.push(`node["highway"="motorway_junction"](around:${radius},${lat},${lon});`);
}

else if(t==="park"){
parts.push(`
node["leisure"~"park|garden|recreation_ground"](around:${radius},${lat},${lon});
way["leisure"~"park|garden|recreation_ground"](around:${radius},${lat},${lon});
relation["leisure"~"park|garden|recreation_ground"](around:${radius},${lat},${lon});
`);
}

else{
parts.push(`
node["amenity"="${t}"](around:${radius},${lat},${lon});
way["amenity"="${t}"](around:${radius},${lat},${lon});
`);
}

});

const query=`[out:json][timeout:25];(${parts.join("\n")});out center;`;

try{

const res=await fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:"data="+encodeURIComponent(query),
headers:{"Content-Type":"application/x-www-form-urlencoded"}
});

const data=await res.json();

data.elements.forEach(e=>{
const lat2=e.lat||e.center?.lat;
const lon2=e.lon||e.center?.lon;
if(!lat2) return;

const dist=Math.round(haversine(lat,lon,lat2,lon2));

const item={
名稱:e.tags?.name||"未命名",
類型:e.tags?.railway||e.tags?.highway||e.tags?.amenity||"",
距離:dist,
緯度:lat2,
經度:lon2
};

results.push(item);

L.marker([lat2,lon2]).addTo(markerLayer)
.bindPopup(item.名稱);

tbody.innerHTML+=`
<tr>
<td>${item.名稱}</td>
<td>${item.類型}</td>
<td>${item.距離}</td>
</tr>`;
});

}catch(err){
alert("查詢失敗");
console.error(err);
}
}

/* ===== distance ===== */
function haversine(lat1, lon1, lat2, lon2){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);
const a=Math.sin(dLat/2)**2 +
Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function clearRoute(){
if(routeLayer){
map.removeLayer(routeLayer);
routeLayer=null;
}
distanceLabel.innerText="路線距離: 0 m";
}

function exportData(){
if(results.length===0){ alert("無資料"); return; }
const ws=XLSX.utils.json_to_sheet(results);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"GIS");
XLSX.writeFile(wb,"GIS結果.xlsx");
}

</script>

</body>
</html>
