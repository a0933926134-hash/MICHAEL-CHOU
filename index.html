<script>
let map = L.map('map').setView([25.012098, 121.465675], 15);

const nlscEMAP = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:19,
    attribution:'© NLSC'
});

const nlscPHOTO = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:20,
    attribution:'© NLSC 正射影像'
});

const osmLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19,
    attribution:'© OpenStreetMap contributors'
});

const esriWorldImagery = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
    maxZoom:19,
    attribution:'© Esri World Imagery'
});

nlscEMAP.addTo(map);

const cadastralLayer = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/CADASTRAL/default/GoogleMapsCompatible/{z}/{y}/{x}',
{
    maxZoom:20,
    opacity:0.75,
    attribution:'© NLSC 地籍圖'
}
);
cadastralLayer.addTo(map);

const baseMaps = {
    "NLSC 電子地圖": nlscEMAP,
    "NLSC 正射影像": nlscPHOTO,
    "OpenStreetMap": osmLayer,
    "ESRI 衛星影像": esriWorldImagery
};

const nlscDEM = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP5_OPENDATA/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:18,
    opacity:0.45,
    attribution:'© NLSC DEM'
});

const overlayMaps = {
    "地籍圖": cadastralLayer,
    "DEM 地形": nlscDEM
};

L.control.layers(baseMaps, overlayMaps,{
    collapsed:false,
    position:'topright'
}).addTo(map);

const scaleControl = L.control({ position: 'bottomleft' });

scaleControl.onAdd = function () {
this._div = L.DomUtil.create('div', 'scale-denominator');
this._div.style.background = 'rgba(255,255,255,0.9)';
this._div.style.padding = '4px 8px';
this._div.style.borderRadius = '6px';
this._div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.3)';
this._div.style.fontSize = '12px';
this._div.style.fontWeight = 'bold';
this._div.style.marginBottom = '42px';
this.update();
return this._div;
};

scaleControl.update = function () {
const center = map.getCenter();
const zoom = map.getZoom();
const metersPerPixel = 40075016.686 * Math.abs(Math.cos(center.lat * Math.PI / 180)) / Math.pow(2, zoom + 8);
const dpi = 96;
const scale = metersPerPixel * dpi / 0.0254;
const rounded = Math.round(scale / 100) * 100;
this._div.innerHTML = `比例尺 1:${rounded.toLocaleString()}`;
};

scaleControl.addTo(map);
map.on('zoomend moveend', () => {
    scaleControl.update();
});

let markerLayer=L.layerGroup().addTo(map);
  
const latInput=document.getElementById("lat");
const lonInput=document.getElementById("lon");
const radiusInput=document.getElementById("radius");
const tbody=document.getElementById("tbody");
const routeInfo=document.getElementById("routeInfo");
const queryBtn=document.getElementById("query-btn");

let userMarker=null;
let origin=null;
let results=[];

let sortState = { distance:true, route:true };
let routeLayer=null;

origin=[25.012098,121.465675];
userMarker=L.marker(origin,{
icon:L.divIcon({
className:'',
html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
iconSize:[18,18],
iconAnchor:[9,9]
}),
interactive:false
}).addTo(map);


let isDrawingPolygon = false;
let drawPoints = [];       
let previewPolyline = null;
let finalPolygon = null;
let drawMarkers = L.layerGroup().addTo(map);
const drawControl = L.control({ position: 'topleft' });
drawControl.onAdd = function() {
    const div = L.DomUtil.create('div', 'draw-control-bar');
    div.innerHTML = `
        <button id="btn-start-draw" class="draw-btn" onclick="toggleDrawMode(this)">📐 繪製範圍</button>
        <button id="btn-end-draw" class="draw-btn" onclick="finishPolygon()" style="display:none; background:#10b981; color:white;">✓ 完成閉合</button>
        <button id="btn-export-shp" class="draw-btn shp-btn" onclick="exportPolygonSHP()" style="display:none;">📥 匯出範圍 SHP</button>
        <label id="lbl-import-shp" class="shp-import-label">📤 匯入範圍 (支援 SHP.zip 或 GeoJSON)
            <input type="file" id="shp-file-input" accept=".zip,.geojson,.json" style="display:none;" onchange="importPolygonSHP(event)">
        </label>
        <button id="btn-clear-draw" class="draw-btn" onclick="clearPolygon()" style="display:none; background:#6b7280; color:white;">✕ 清除範圍</button>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
};
drawControl.addTo(map);

const resPanel = document.getElementById("resultPanel");
const sidePanel = document.getElementById("panel");
L.DomEvent.disableClickPropagation(resPanel);
L.DomEvent.disableClickPropagation(sidePanel);
function toggleDrawMode(btn) {
    isDrawingPolygon = !isDrawingPolygon;
    if (isDrawingPolygon) {
        btn.classList.add('active');
        btn.innerText = "🛑 停止點選";
        document.getElementById('btn-end-draw').style.display = 'block';
        document.getElementById('btn-clear-draw').style.display = 'block';
        clearPolygonData();
    } else {
        btn.classList.remove('active');
        btn.innerText = "📐 繪製範圍";
        if (drawPoints.length === 0) {
            document.getElementById('btn-end-draw').style.display = 'none';
            document.getElementById('btn-clear-draw').style.display = 'none';
        }
    }
}

function clearPolygonData() {
    drawPoints = [];
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    if (finalPolygon) { map.removeLayer(finalPolygon); finalPolygon = null; }
    drawMarkers.clearLayers();
    document.getElementById('btn-export-shp').style.display = 'none';
}

function clearPolygon() {
    clearPolygonData();
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-clear-draw').style.display = 'none';
}

function finishPolygon() {
    if (drawPoints.length < 3) {
        alert("請至少點選 3 個以上的頂點才能閉合範圍！");
        return;
    }
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    
    renderEditablePolygon();
    updateCentroidByPoints(drawPoints);
    
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製範圍";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-export-shp').style.display = 'block';
}

function renderEditablePolygon() {
    if (finalPolygon) { map.removeLayer(finalPolygon); }
    drawMarkers.clearLayers();

    finalPolygon = L.polygon(drawPoints, {
        color: '#dc2626',
        weight: 3,
        fillColor: '#dc2626',
        fillOpacity: 0.25
    }).addTo(map);
    drawPoints.forEach((pt, index) => {
        let marker = L.marker(pt, {
            icon: L.divIcon({
                className: '',
                html: '<div class="edit-handle"></div>',
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            }),
            draggable: true
        });
        
        marker.on('drag', function(e) {
            let newLatLng = e.target.getLatLng();
            drawPoints[index] = [newLatLng.lat, newLatLng.lng];
            finalPolygon.setLatLngs(drawPoints);
        });
        
        marker.on('dragend', function() {
            updateCentroidByPoints(drawPoints);
        });

        marker.addTo(drawMarkers);
    });
}

function updateCentroidByPoints(pts) {
    if (!pts || pts.length < 3) return;
    
    let coordinates = pts.map(p => [p[1], p[0]]);
    if (coordinates[0][0] !== coordinates[coordinates.length-1][0] || coordinates[0][1] !== coordinates[coordinates.length-1][1]) {
        coordinates.push([pts[0][1], pts[0][0]]);
    }
    
    let turfPoly = turf.polygon([coordinates]);
    let centroid = turf.centroid(turfPoly);
    
    const cLon = centroid.geometry.coordinates[0];
    const cLat = centroid.geometry.coordinates[1];

    latInput.value = cLat.toFixed(6);
    lonInput.value = cLon.toFixed(6);
    origin = [cLat, cLon];

    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([cLat, cLon], {
        icon: L.divIcon({
            className: '',
            html: `<div style="width:18px; height:18px; background:#ef4444; border:3px solid #ffffff; border-radius:50%; box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        }),
        interactive: false
    }).addTo(map);

    finalPolygon.bindPopup(`
        <div style="font-size:12px; line-height:1.4;">
            <b style="color:#dc2626;">📐 範圍與節點更新完成</b><br>
            已動態重算幾何形心並帶入中心點。<br>您可直接**拖曳邊界上的白色圓點**再次微調範圍，或點擊左側面板「查詢」進行量距。
        </div>
    `).openPopup([cLat, cLon]);
}

function exportPolygonSHP() {
    if (!drawPoints || drawPoints.length < 3) {
        alert("目前沒有完整的繪製範圍可供匯出！");
        return;
    }
    try {
        let ring = drawPoints.map(p => [Number(p[1]), Number(p[0])]);
        ring.push([Number(drawPoints[0][1]), Number(drawPoints[0][0])]);
        
        let tempPoly = turf.polygon([ring]);
        let areaSqm = Math.round(turf.area(tempPoly));
        let featureLayer = [
            {
                geometry: {
                    type: 'Polygon',
                    coordinates: [ring]
                },
                properties: {
                    Name: "Zone_Area",
                    Area_Sqm: areaSqm
                }
            }
        ];
        shpwrite.download(featureLayer);
        
    } catch (err) {
        console.error("SHP Export Error:", err);
        let ringBackup = drawPoints.map(p => [Number(p[1]), Number(p[0])]);
        ringBackup.push([Number(drawPoints[0][1]), Number(drawPoints[0][0])]);
        let geojsonObj = {
            type: "FeatureCollection",
            features: [{
                type: "Feature",
                geometry: { type: "Polygon", coordinates: [ringBackup] },
                properties: { Name: "Zone_Area", Area_Sqm: Math.round(turf.area(turf.polygon([ringBackup]))) }
            }]
        };
        let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(geojsonObj));
        let downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "Estimated_Boundary_Backup.geojson");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        
        alert("提示：由於網頁快取防護阻擋，系統已為您自動下載為高相容性的 .geojson 向量格式圖資。");
    }
}

function importPolygonSHP(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    if (file.name.endsWith('.geojson') || file.name.endsWith('.json')) {
        reader.onload = function(e) {
            try {
                const geojson = JSON.parse(e.target.result);
                processImportedGeoJSON(geojson);
            } catch (err) {
                alert("GeoJSON 解析失敗，請確認檔案格式正確。");
            }
        };
        reader.readAsText(file);
    } else if (file.name.endsWith('.zip')) {
        reader.onload = function(e) {
            shp(e.target.result).then(function(geojson) {
                processImportedGeoJSON(geojson);
            }).catch(function(err) {
                console.error(err);
                alert("SHP 解壓縮解碼失敗，請確保該 .zip 內含有同名的 .shp, .shx, .dbf 檔案。");
            });
        };
        reader.readAsArrayBuffer(file);
    }
}

function processImportedGeoJSON(geojson) {
    let feature = null;
    if (geojson.type === "FeatureCollection" && geojson.features.length > 0) {
        feature = geojson.features[0];
    } else if (geojson.type === "Feature") {
        feature = geojson;
    } else if (geojson.geometry && geojson.geometry.type === "Polygon") {
        feature = geojson;
    }

    if (!feature || !feature.geometry) {
    alert("無法辨識 GeoJSON 幾何結構");
    return;
}

let rings = null;
if (feature.geometry.type === "Polygon") {
    rings = feature.geometry.coordinates[0];
} else if (feature.geometry.type === "MultiPolygon") {
    rings = feature.geometry.coordinates[0][0];
} else if (feature.geometry.type === "GeometryCollection") {
    const poly = feature.geometry.geometries.find(g =>
        g.type === "Polygon" || g.type === "MultiPolygon"
    );
    if (!poly) {

const elevationCache = {};
async function getElevation(lat, lon){

    const cacheKey =
        lat.toFixed(5)+","+lon.toFixed(5);
    if(elevationCache[cacheKey] !== undefined){
        return elevationCache[cacheKey];
    }

    try{

        const controller = new AbortController();
        const timeout = setTimeout(()=>{
            controller.abort();
        },10000);
        const url =
        `https://michael-chou.pages.dev/?lat=${lat}&lon=${lon}`;
        const res = await fetch(url,{
            signal:controller.signal
        });
        clearTimeout(timeout);

        console.log("DEM HTTP:", res.status, url);

        if(!res.ok){
            return null;
        }

        const text = await res.text();

        console.log("DEM RAW:", text);

        const data = JSON.parse(text);
        const ele =
            data?.results?.[0]?.elevation;
        if(ele !== null && ele !== undefined && !isNaN(ele)){

            elevationCache[cacheKey] = Number(ele);
            return elevationCache[cacheKey];

        }

        return null;
    } catch(err){

        console.error("DEM ERROR:", err);
        return null;
    }
}

function haversine(lat1, lon1, lat2, lon2){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);
const a= Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function calculateBearing(lat1,lon1,lat2,lon2){

    const toRad = d=>d*Math.PI/180;
    const toDeg = r=>r*180/Math.PI;

    const y =
        Math.sin(toRad(lon2-lon1))
        *
        Math.cos(toRad(lat2));
    const x =
        Math.cos(toRad(lat1))
        *
        Math.sin(toRad(lat2))
        -
        Math.sin(toRad(lat1))
        *
        Math.cos(toRad(lat2))
        *
        Math.cos(toRad(lon2-lon1));
    return (toDeg(Math.atan2(y,x))+360)%360;

}

/* ========================================================================
   ★ 修正：交流道入口評分函數 - 出口判定更嚴苛（-80分），入口優先（+30分）
   ======================================================================== */
function scoreEntrance(candidate){

    const tags = candidate.tags || {};

    let score = 0;

    /* motorway_link 基礎分 */
    if(tags.highway === "motorway_link"){
        score += 40;
    }else{
        return 0;
    }

    /* 單行道加分 */
    if(tags.oneway === "yes"){
        score += 20;
    }

    /* destination 相關 */
    if(tags.destination){
        score += 10;
    }

    if(tags["destination:ref"]){
        score += 8;
    }

    /* ref 加分 */
    if(tags.ref){
        score += 5;
    }

    /* motorroad */
    if(tags.motorroad === "yes"){
        score += 5;
    }

    /* lanes */
    if(tags.lanes){
        score += 3;
    }

    /* bridge */
    if(tags.bridge === "yes"){
        score += 2;
    }

    /* layer */
    if(tags.layer){
        score += 2;
    }

    /* access 限制 */
    if(tags.access === "private"){
        score -= 50;
    }

    if(tags.access === "no"){
        score -= 100;
    }

    /* service */
    if(tags.service){
        score -= 20;
    }

    /* area */
    if(tags.area === "yes"){
        score -= 100;
    }

    /* construction */
    if(tags.highway === "construction"){
        score -= 100;
    }

    /* name 加分 */
    if(tags.name){
        score += 3;
    }

    /* ★ 修正核心：destination 與 name 判定入口 vs 出口 */
    if(tags.destination || tags.name){
        const text = (tags.destination || "") + " " + (tags.name || "");
        
        /* ★ 出口判定：嚴苛扣分 */
        if(
            text.includes("出口") ||
            text.includes("Exit") ||
            text.includes("off-ramp") ||
            tags.exit_to  // ★ 重點：exit_to 標籤直接判定出口
        ){
            score -= 80; // ★ 嚴格排除出口匝道
        }
        
        /* ★ 入口判定：優先加分 */
        if(
            text.includes("國道") ||
            text.includes("Freeway") ||
            text.includes("高速公路") ||
            text.includes("入口") ||
            text.includes("Entrance") ||
            text.includes("on-ramp")
        ){
            score += 30;
        }
    }

    /* destination:ref */
    if(tags["destination:ref"]){
        score += 5;
    }

    /* 分數上限 100 */
    score = Math.max(0, Math.min(score, 100));
    return score;

}

/* ========================================================================
   ★ 修正：建立交流道入口候補項目 - 搜尋半徑 1000 m，最終只選評分最高的入口
   ======================================================================== */
async function buildEntranceCandidates(junction){

    const SEARCH_RADIUS = 1000; // 公尺

    const lat = junction[0];
    const lon = junction[1];

    const query = `
[out:json][timeout:25];

(
way
["highway"="motorway_link"]
(around:${SEARCH_RADIUS},${lat},${lon});
);

out body;
>;
out skel qt;
`;

    try{

        const res = await fetch(
            "https://overpass-api.de/api/interpreter",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/x-www-form-urlencoded"
                },
                body:"data="+encodeURIComponent(query)
            }
        );
        const data = await res.json();

        if(!data.elements)
            return [];

        const nodeMap = new Map();
        data.elements
        .filter(e=>e.type==="node")
        .forEach(n=>{

            nodeMap.set(n.id,{
                lat:n.lat,
                lon:n.lon
            });

        });

        const candidates = [];
        data.elements
        .filter(e=>e.type==="way")
        .forEach(w=>{

            if(!w.nodes || w.nodes.length<2)
                return;

            const firstNode = nodeMap.get(w.nodes[0]);

            if(!firstNode)
                return;

            const secondNode = nodeMap.get(w.nodes[1]);

            let bearing = null;

            if(secondNode){

                bearing =
                    calculateBearing(
                        firstNode.lat,
                        firstNode.lon,
                        secondNode.lat,
                        secondNode.lon
                    );

            }

            const score = scoreEntrance({ tags: w.tags || {} });

            candidates.push({

                wayId : w.id,

                coordinate : [
                    firstNode.lat,
                    firstNode.lon
                ],

                bearing,

                score,

                tags : w.tags || {}

            });
        });

        /* ★ 修正：按評分排序，出口會得到負分並排到末位，取最高分（必為入口）*/
        candidates.sort((a,b)=>
            b.score-a.score
        );
        return candidates;

    }catch(err){

        console.error(
            "Candidate Builder Error",
            err
        );
        return [];
    }

}

/* ========================================================================
   ★ 修正：OSRM 路由服務 - 單向正向計算，避免平面道路逆向
   ======================================================================== */
async function getRouteDistance(to, straightDist, isJunction = false, isInZone = false){
    if(isInZone) {
        return { value: 0, isFallback: false, msg: "" };
    }
    try{
        if(!origin) return null;

        /* ★ 修正：一律由 origin 正向計算至 to，保證順向行駛，無逆向段 */
        let url = `https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=false`;

        const res = await fetch(url);
        const data = await res.json();

        if(data.routes && data.routes.length > 0) {
            return { value: Math.round(data.routes[0].distance), isFallback: false, msg: "" };
        }

        return { value: straightDist, isFallback: true, msg: " (直線備援)" };
    }catch(err){
        console.error("OSRM 路由異常:", err);
        return { value: straightDist, isFallback: true, msg: " (直線備援)" };
    }
}  

/* ========================================================================
   ★ 修正：路線繪製函數 - 交流道路線用綠色，一般路線用藍色
   ======================================================================== */
async function drawRoute(to, item){
    try{
        if(!origin) return;
        if(item.在範圍內) {
            routeInfo.innerText = "路線距離：0 m (此設施位於您編輯的範圍區段內部)";
            if(routeLayer) map.removeLayer(routeLayer);
            return;
        }

        let isJunction = item.原始類型 === "motorway_junction" ||
                         item.原始類型 === "ramp";

        /* ★ 修正：一律由 origin 正向行駛至平面交流道入口，無逆向段 */
        let url=`https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=full&geometries=geojson`;

        const res=await fetch(url);
        const data=await res.json();
        if(!data.routes?.length){
            routeInfo.innerText = "路線距離：" + item.距離 + " m (採直線路徑示意)";
            if(routeLayer) map.removeLayer(routeLayer);
            routeLayer = L.polyline([origin, to], {color: "red", weight: 3, dashArray: "5, 10"}).addTo(map);
            return;
        }

        const route=data.routes[0];
        let routeDist = Math.round(route.distance);
        routeInfo.innerText="路線距離：" + routeDist + " m" + (isJunction ? " (至交流道平面匝道入口)" : "");

        if(routeLayer) map.removeLayer(routeLayer);
        /* ★ 修正：交流道用綠色 (#059669)，一般用藍色 */
        routeLayer=L.geoJSON(route.geometry,{ style:{color: isJunction ? "#059669" : "blue", weight:5} }).addTo(map);
    }catch(err){
        routeInfo.innerText="路線服務異常，改繪直線";
        if(routeLayer) map.removeLayer(routeLayer);
        routeLayer = L.polyline([origin, to], {color: "red", weight: 3, dashArray: "5, 10"}).addTo(map);
    }
}

            });

                minGateDist = d;
                finalLat = gate.lat;
                finalLon = gate.lon;
                hasMainGate = true;
            }
        });

        /* ★ 修正：學校多邊形相交判定 */
        let inside = false;
        if(turfZonePolygon) {
            let pt = turf.point([finalLon, finalLat]);
            inside = turf.booleanPointInPolygon(pt, turfZonePolygon);
        }

        results.push({
            id: results.length,
            名稱: sch.name || "未命名學校",
            類型: hasMainGate ? "學校(已精準定位大門門牌)" : "學校區域(採用形心估算)",
            原始類型: sch.rawType,
            座標: [finalLat, finalLon],
            在範圍內: inside,
            距離: inside ? 0 : Math.round(haversine(lat, lon, finalLat, finalLon)),
            直線距離顯示: inside ? "0 (位於區段範圍內)" : Math.round(haversine(lat, lon, finalLat, finalLon)),
            路線距離: inside ? "0 (位於區段範圍內)" : "計算中...",
            路線距離數值: inside ? 0 : null
        });
    });

    /* ★ 修正核心：針對交流道自動搜尋最佳「平面交流道入口」座標 */
    for (let item of results) {
        if (item.原始類型 === "motorway_junction" || item.原始類型 === "ramp") {
            try {
                const candidates = await buildEntranceCandidates(item.座標);
                if (candidates && candidates.length > 0) {
                    /* 取評分最高的（必為入口，出口被扣 80 分排末位）*/
                    const bestEntrance = candidates[0];
                    item.座標 = bestEntrance.coordinate;
                    if (!item.名稱.includes("入口")) {
                        item.名稱 = (item.名稱 ? item.名稱 + " " : "") + "(平面匝道入口)";
                    }
                    item.類型 = "交流道入口(平面匝道端)";
                    
                    /* 重新計算至真正入口之直線距離與相交狀態 */
                    let inside = false;
                    if (turfZonePolygon) {
                        let pt = turf.point([item.座標[1], item.座標[0]]);
                        inside = turf.booleanPointInPolygon(pt, turfZonePolygon);
                    }
                    item.在範圍內 = inside;
                    item.距離 = inside ? 0 : Math.round(haversine(lat, lon, item.座標[0], item.座標[1]));
                    item.直線距離顯示 = inside ? "0 (位於區段範圍內)" : item.距離;
                }
            } catch (err) {
                console.error("搜尋交流道平面入口失敗:", err);
            }
        }
    }

    results.sort((a,b)=>a.距離-b.距離);
    renderTable();
    results.forEach(item => {
        const m=L.marker(item.座標).addTo(markerLayer).bindTooltip(item.名稱,{direction:"top"});
        m.on("click",()=>{
            map.flyTo(item.座標,17,{duration:0.8});
            selectItem(item);
        });
    });
    queryBtn.innerText = "🚗 計算路網距離中...";

    /* ★ 背景非同步更新路網距離（跳過範圍內設施） */
    for (const item of results.slice(0,80)) {
        if (item.在範圍內) continue;
        
        let isJunc = item.原始類型 === "motorway_junction" ||
                     item.原始類型 === "ramp";
        const routeRes = await getRouteDistance(item.座標, item.距離, isJunc, item.在範圍內);

        item.路線距離數值 = routeRes.value;
        item.路線距離 = routeRes.value + " m" + routeRes.msg;

        const cell = document.getElementById(`route-${item.id}`);
        if(cell) cell.innerText = item.路線距離;
    }

} catch(err) {
    console.error(err);
    alert("查詢發生異常，請稍後再試。");
} finally {
    queryBtn.disabled = false;
    queryBtn.innerText = "查詢";
}
}

function sortResults(type){
if(type==="distance"){
results.sort((a,b)=>{ return sortState.distance ? a.距離 - b.距離 : b.距離 - a.距離; });
sortState.distance = !sortState.distance;
}
else if(type==="route"){
results.sort((a,b)=>{
const ra = a.路線距離數值 ?? 99999999;
const rb = b.路線距離數值 ?? 99999999;
return sortState.route ? ra - rb : rb - ra;
});
sortState.route = !sortState.route;
}
renderTable();
}

function renderTable(){
tbody.innerHTML="";
results.forEach(item=>{
const tr=document.createElement("tr");
tr.dataset.id=item.id;
tr.innerHTML=`
<td onclick='selectItemById(${item.id})' style="cursor:pointer;color:blue">${item.名稱}</td>
<td>${item.類型}</td>
<td>${item.直線距離顯示}</td>
<td id="route-${item.id}">${item.路線距離}</td>
`;
tbody.appendChild(tr);
});
}  

function clearRoute(){
if(routeLayer){ map.removeLayer(routeLayer); routeLayer=null; }
routeInfo.innerText="路線距離：尚未計算";
}

async function analyzeSlope() {
    const slopeInfo = document.getElementById("slopeInfo");
    if (!drawPoints || drawPoints.length < 3) {
        alert("請先繪製分析範圍");
        return;
    }

    slopeInfo.innerHTML = "🌄 DEM 坡度分析中...";

    try {

        markerLayer.clearLayers();
        let ring = drawPoints.map(p => [Number(p[1]), Number(p[0])]);
        if (ring.length < 3) {
            alert("範圍點不足");
            return;
        }

        if (
            ring[0][0] !== ring[ring.length - 1][0] ||
            ring[0][1] !== ring[ring.length - 1][1]
        ) {
            ring.push(ring[0]);
        }

        const polygon = turf.polygon([ring]);
        const bbox = turf.bbox(polygon);
        const [minLon, minLat, maxLon, maxLat] = bbox;

        const step = Math.max(
            Math.max(maxLon - minLon, maxLat - minLat) / 30,
            0.00005
        );
        let elevations = [];

        for (let lat = minLat; lat <= maxLat; lat += step) {
            for (let lon = minLon; lon <= maxLon; lon += step) {

                const pt = turf.point([lon, lat]);
                if (!turf.booleanPointInPolygon(pt, polygon)) continue;

                const ele = await getElevation(lat, lon);

                if(ele !== null && !isNaN(ele)){
                    elevations.push({ lat, lon, ele });
                }

                await new Promise(r => setTimeout(r,30));
            }
        }

        if (elevations.length < 5) {

            const centroid = turf.centroid(polygon).geometry.coordinates;
            const ele = await getElevation(centroid[1], centroid[0]);
            if(ele !== null && !isNaN(ele)){
                elevations = [{ lat: centroid[1], lon: centroid[0], ele }];
            } else {
                slopeInfo.innerHTML = `⚠ DEM 無資料`;
                return;
            }
        }

        let slopes = [];
        for (let i = 1; i < elevations.length; i++) {

            const p1 = elevations[i - 1];
            const p2 = elevations[i];

            const dist = haversine(p1.lat, p1.lon, p2.lat, p2.lon);
            if (dist < 1) continue;
            const rise = Math.abs(p2.ele - p1.ele);

            slopes.push((rise / dist) * 100);
        }

        if (!slopes.length) {
            slopeInfo.innerHTML = "⚠ 無法計算坡度";
            return;
        }

        const elevs = elevations.map(e => e.ele);
        const minElev = Math.min(...elevs);
        const maxElev = Math.max(...elevs);
        const avgElev = elevs.reduce((a, b) => a + b, 0) / elevs.length;
        const avgSlope = slopes.reduce((a, b) => a + b, 0) / slopes.length;
        const maxSlope = Math.max(...slopes);
        const minSlope = Math.min(...slopes);
        let terrainType = "平坦";
        if (avgSlope > 30) terrainType = "陡坡";
        else if (avgSlope > 15) terrainType = "中坡";
        else if (avgSlope > 5) terrainType = "緩坡";

        slopeInfo.innerHTML = `
<b>🌄 DEM 坡度分析完成</b><br>
採樣點數：${elevations.length}<br><br>

平均高程：${avgElev.toFixed(1)} m<br>
最低高程：${minElev.toFixed(1)} m<br>
最高高程：${maxElev.toFixed(1)} m<br><br>

平均坡度：${avgSlope.toFixed(2)} %<br>
最大坡度：${maxSlope.toFixed(2)} %<br>
最小坡度：${minSlope.toFixed(2)} %<br><br>

地形分類：<b>${terrainType}</b>
        `;

        elevations.forEach(p => {

            let color = "#22c55e";
            if (avgSlope > 30) color = "#dc2626";
            else if (avgSlope > 15) color = "#f97316";
            else if (avgSlope > 5) color = "#eab308";

            L.circleMarker([p.lat, p.lon], {
                radius: 4,
                color,
                fillColor: color,
                fillOpacity: 0.9,
                weight: 1
            })
            .addTo(markerLayer)
            .bindTooltip(`高程: ${p.ele.toFixed(1)} m`);
        });
    } catch (err) {

        console.error("DEM分析錯誤:", err);
        slopeInfo.innerHTML = `❌ DEM坡度分析失敗<br><br>${err.message}`;
    }
}

function exportExcel(){
if(!results.length){ alert("無資料"); return; }
const ws = XLSX.utils.json_to_sheet(results.map(r=>({
名稱:r.名稱, 類型:r.類型, 直線距離:r.直線距離顯示, 路線距離:r.路線距離 || "", 緯度:r.座標[0], 經度:r.座標[1]
})));
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "GIS");
XLSX.writeFile(wb, "GIS查詢結果.xlsx");
}

let isDragging = false;
let offsetX = 0;
let offsetY = 0;
const panel = document.getElementById("resultPanel");
const header = document.getElementById("resultHeader");
header.addEventListener("mousedown", function(e){
if(e.target.tagName === "BUTTON") return; 
isDragging = true;
const rect = panel.getBoundingClientRect();
offsetX = e.clientX - rect.left;
offsetY = e.clientY - rect.top;
panel.style.position = "absolute";
panel.style.zIndex = 9999;
});
document.addEventListener("mousemove", function(e){
if(!isDragging) return;
panel.style.left = (e.clientX - offsetX) + "px";
panel.style.top = (e.clientY - offsetY) + "px";
panel.style.right = "auto";
});
document.addEventListener("mouseup", function(){ isDragging = false; });

let slopeDragging = false;
let slopeOffsetX = 0;
let slopeOffsetY = 0;

const slopePanel = document.getElementById("slopePanel");
const slopeHeader = document.getElementById("slopeHeader");
slopeHeader.addEventListener("mousedown", function(e){

    if(e.target.tagName === "BUTTON") return;

    slopeDragging = true;

    const rect = slopePanel.getBoundingClientRect();

    slopeOffsetX = e.clientX - rect.left;
    slopeOffsetY = e.clientY - rect.top;

    slopePanel.style.position = "absolute";
    slopePanel.style.zIndex = 99999;
});
document.addEventListener("mousemove", function(e){

    if(!slopeDragging) return;

    slopePanel.style.left =
        (e.clientX - slopeOffsetX) + "px";

    slopePanel.style.top =
        (e.clientY - slopeOffsetY) + "px";
});
document.addEventListener("mouseup", function(){

    slopeDragging = false;

});    
</script>
