<script>
/* ================= MAP STATE ================= */
let map = L.map('map').setView([25.012098,121.465675], 15);

L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}', {
    maxZoom: 19
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);
let routeLayer = null;

/* ================= ORIGIN ================= */
let origin = [25.012098,121.465675];
let userMarker = null;

/* ================= RESULTS ================= */
let results = [];

/* ================= DRAW STATE (修正核心) ================= */
let polygons = [];
let activePolygonId = null;
let isDrawingPolygon = false;

/* ================= DRAW CONTROL ================= */
map.on('click', function (e) {
    if (!isDrawingPolygon) return;

    let poly = polygons.find(p => p.id === activePolygonId);

    if (!poly) {
        poly = {
            id: Date.now(),
            points: [],
            layer: null,
            markers: L.layerGroup().addTo(map),
            selected: true
        };
        polygons.push(poly);
        activePolygonId = poly.id;
    }

    poly.points.push([e.latlng.lat, e.latlng.lng]);

    L.circleMarker([e.latlng.lat, e.latlng.lng], {
        radius: 5,
        color: '#dc2626',
        fillColor: '#fff',
        fillOpacity: 1,
        weight: 2
    }).addTo(poly.markers);

    if (poly.layer) map.removeLayer(poly.layer);
    poly.layer = L.polygon(poly.points, { color: 'red' }).addTo(map);
});

/* ================= CLEAR DRAW ================= */
function clearAll() {
    polygons.forEach(p => {
        if (p.layer) map.removeLayer(p.layer);
        if (p.markers) map.removeLayer(p.markers);
    });

    polygons = [];
    activePolygonId = null;
}

/* ================= TOGGLE DRAW ================= */
function toggleDrawMode() {
    isDrawingPolygon = !isDrawingPolygon;
}

/* ================= CENTROID ================= */
function updateCentroid(poly) {
    if (!poly || poly.points.length < 3) return;

    let coords = poly.points.map(p => [p[1], p[0]]);
    coords.push(coords[0]);

    let turfPoly = turf.polygon([coords]);
    let centroid = turf.centroid(turfPoly);

    let cLon = centroid.geometry.coordinates[0];
    let cLat = centroid.geometry.coordinates[1];

    origin = [cLat, cLon];

    document.getElementById("lat").value = cLat.toFixed(6);
    document.getElementById("lon").value = cLon.toFixed(6);

    if (userMarker) map.removeLayer(userMarker);

    userMarker = L.marker([cLat, cLon]).addTo(map);
}

/* ================= Haversine ================= */
function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;

    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);

    const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) *
        Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* ================= OVERPASS QUERY ================= */
async function runQuery() {

    const lat = parseFloat(document.getElementById("lat").value);
    const lon = parseFloat(document.getElementById("lon").value);
    const radius = parseFloat(document.getElementById("radius").value);

    origin = [lat, lon];

    markerLayer.clearLayers();
    results = [];

    const query = `
    [out:json];
    node(around:${radius},${lat},${lon})["amenity"];
    out;
    `;

    const res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: "data=" + encodeURIComponent(query),
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
    });

    const data = await res.json();

    (data.elements || []).forEach((e, i) => {

        const lat2 = e.lat;
        const lon2 = e.lon;
        if (!lat2 || !lon2) return;

        const dist = haversine(lat, lon, lat2, lon2);

        results.push({
            id: i,
            name: e.tags?.name || "未命名",
            type: e.tags?.amenity || "unknown",
            dist: Math.round(dist),
            lat: lat2,
            lon: lon2
        });

        L.marker([lat2, lon2])
            .addTo(markerLayer)
            .bindPopup(e.tags?.name || "未命名");
    });

    renderTable();
}

/* ================= TABLE ================= */
function renderTable() {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    results.forEach(r => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
        <td>${r.name}</td>
        <td>${r.type}</td>
        <td>${r.dist} m</td>
        `;

        tbody.appendChild(tr);
    });
}

/* ================= ROUTE ================= */
async function drawRoute(to) {
    try {
        const url = `https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=full&geometries=geojson`;

        const res = await fetch(url);
        const data = await res.json();

        if (!data.routes?.length) return;

        if (routeLayer) map.removeLayer(routeLayer);

        routeLayer = L.geoJSON(data.routes[0].geometry, {
            style: { color: "blue", weight: 4 }
        }).addTo(map);

    } catch (err) {
        console.error(err);
    }
}
function processImportedGeoJSON(geojson) {
    let feature = null;
    if (geojson.type === "FeatureCollection" && geojson.features.length > 0) {
        feature = geojson.features[0];
    } else if (geojson.type === "Feature") {
        feature = geojson;
    } else if (geojson.geometry && geojson.geometry.type === "Polygon") {
        feature = geojson;
    }

    if (!feature || !feature.geometry || feature.geometry.type !== "Polygon") {
        alert("找不到有效的多邊形 (Polygon) 幾何結構！");
        return;
    }

    let rings = feature.geometry.coordinates[0];
    
    if (rings.length > 1 && rings[0][0] === rings[rings.length-1][0] && rings[0][1] === rings[rings.length-1][1]) {
        rings.pop();
    }

    drawPoints = rings.map(coord => [coord[1], coord[0]]);

    renderEditablePolygon();
    function updateCentroid(poly) {
    let coords = poly.points.map(p => [p[1], p[0]]);
    coords.push(coords[0]);

    let turfPoly = turf.polygon([coords]);
    let centroid = turf.centroid(turfPoly);

    const cLon = centroid.geometry.coordinates[0];
    const cLat = centroid.geometry.coordinates[1];

    origin = [cLat, cLon];
    latInput.value = cLat;
    lonInput.value = cLon;

    if (userMarker) map.removeLayer(userMarker);

    userMarker = L.marker([cLat, cLon], {...}).addTo(map);

    // ⚠️ 重新觸發查詢距離（關鍵）
    if (results.length > 0) {
        runQuery();
    }
}
    
    if (drawPoints.length > 0) {
        map.panTo(drawPoints[0]);
    }

    document.getElementById('btn-export-shp').style.display = 'block';
    document.getElementById('btn-clear-draw').style.display = 'block';
    alert("🎉 成功！已實時解壓縮讀取檔案內容，並 100% 完美還原您繪製的範圍形狀。");
}


/* 地圖點擊事件 */
map.on('click', e => {
    const lat = e.latlng.lat;
    const lon = e.latlng.lng;

    if (isDrawingPolygon) {

    // 沒有 active polygon → 新建一個面
    if (activePolygonId === null) {
        const newPoly = {
            id: Date.now(),
            points: [],
            polygonLayer: null,
            markers: L.layerGroup().addTo(map),
            selected: true
        };
        polygons.push(newPoly);
        activePolygonId = newPoly.id;
    }

    const poly = polygons.find(p => p.id === activePolygonId);
    poly.points.push([lat, lon]);

    L.circleMarker([lat, lon], {
        radius: 5,
        color: '#dc2626',
        fillColor: '#fff',
        fillOpacity: 1,

    }).addTo(poly.markers);

    if (previewPolyline) previewPolyline.setLatLngs(poly.points);
    else previewPolyline = L.polyline(poly.points, { color:'#dc2626', dashArray:'5,8' }).addTo(map);

    return;
}
        
        L.circleMarker([lat, lon], {
            radius: 5,
            color: '#dc2626',
            fillColor: '#fff',
            fillOpacity: 1,
            weight: 2
        }).addTo(drawMarkers);

        if (previewPolyline) {
            previewPolyline.setLatLngs(drawPoints);
        } else {
            previewPolyline = L.polyline(drawPoints, { color: '#dc2626', weight: 2, dashArray: '5, 8' }).addTo(map);
        }
        return; 
    }

    latInput.value = lat.toFixed(6);
    lonInput.value = lon.toFixed(6);
    origin = [lat, lon];

    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([lat, lon], {
        icon: L.divIcon({
            className: '',
            html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
            iconSize:[18,18],

        }),

});


/* 取得現在位置 */
function getCurrentLocation(){
if(!navigator.geolocation){
alert("瀏覽器不支援 GPS 定位");
return;
}
navigator.geolocation.getCurrentPosition(
(pos)=>{
const lat = pos.coords.latitude;
const lon = pos.coords.longitude;
latInput.value = lat.toFixed(6);
lonInput.value = lon.toFixed(6);
origin=[lat,lon];

map.flyTo([lat,lon],17,{ duration:1.2 });

if(userMarker) map.removeLayer(userMarker);
userMarker=L.marker([lat,lon],{
icon:L.divIcon({
className:'',
html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
iconSize:[18,18],
iconAnchor:[9,9]
}),
interactive:false
}).addTo(map);
},
(err)=>{
alert("定位失敗，請確認已允許定位權限");
},
{ enableHighAccuracy:true, timeout:10000, maximumAge:0 }
);
}

/* 哈弗辛直線距離 */
function haversine(lat1, lon1, lat2, lon2){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);
const a= Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* OSRM 路由服務 (整合交流道反向優化與區段內部直接歸零判定) */
async function getRouteDistance(to, straightDist, isJunction = false, isInZone = false){
if(isInZone) {
    return { value: 0, isFallback: false, msg: "" };
}
try{
if(!origin) return null;

let url = `https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=false`;

if(isJunction) {
    url = `https://router.project-osrm.org/route/v1/driving/${to[1]},${to[0]};${origin[1]},${origin[0]}?overview=false&radiuses=50;unlimited`;
}

const res = await fetch(url);
const data = await res.json();

if(data.routes && data.routes.length > 0) {
    return { value: Math.round(data.routes[0].distance), isFallback: false, msg: "" };
}

return { value: straightDist, isFallback: true, msg: " (直線備援)" };
}catch(err){
console.error("OSRM 路由異常:", err);
return { value: straightDist, isFallback: true, msg: " (直線備援)" };
}
}  

async function drawRoute(to, item){
try{
if(!origin) return;

if(item.在範圍內) {
    routeInfo.innerText = "路線距離：0 m (此設施位於您編輯的範圍區段內部)";
    if(routeLayer) map.removeLayer(routeLayer);
    return;
}

let isJunction = item.原始類型 === "motorway_junction" || item.原始類型 === "ramp";

let url=`https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=full&geometries=geojson`;

if(isJunction) {
    url = `https://router.project-osrm.org/route/v1/driving/${to[1]},${to[0]};${origin[1]},${origin[0]}?overview=full&geometries=geojson&radiuses=50;unlimited`;
}

const res=await fetch(url);
const data=await res.json();

if(!data.routes?.length){
    routeInfo.innerText = "路線距離：" + item.距離 + " m (採直線路徑示意)";
    if(routeLayer) map.removeLayer(routeLayer);
    routeLayer = L.polyline([origin, to], {color: "red", weight: 3, dashArray: "5, 10"}).addTo(map);
    return;
}

const route=data.routes[0];
let routeDist = Math.round(route.distance);
routeInfo.innerText="路線距離：" + routeDist + " m" + (isJunction ? " (平面路網逆向計算)" : "");

if(routeLayer) map.removeLayer(routeLayer);
routeLayer=L.geoJSON(route.geometry,{ style:{color: isJunction ? "#059669" : "blue", weight:5} }).addTo(map);
}catch(err){
routeInfo.innerText="路線服務異常，改繪直線";
if(routeLayer) map.removeLayer(routeLayer);
routeLayer = L.polyline([origin, to], {color: "red", weight: 3, dashArray: "5, 10"}).addTo(map);
}
}

/* 表格選取連動 */
function selectItemById(id){
const item = results.find(r => r.id === id);
if(!item) return;
selectItem(item);
}  

function selectItem(item){
drawRoute(item.座標, item);
document.querySelectorAll("#tbody tr").forEach(r=>{ r.classList.remove("highlight"); });
const row=document.querySelector(`#tbody tr[data-id="${item.id}"]`);
if(row){
row.classList.add("highlight");
row.scrollIntoView({ behavior:"smooth", block:"center" });
}
}

/* Overpass API 查詢與幾何相交拓撲核心 */
async function runQuery(){
const lat=parseFloat(latInput.value);
const lon=parseFloat(lonInput.value);
const radius=parseFloat(radiusInput.value);

if(radius > 3000){
alert("半徑超過3000m可能造成系統過慢");
return;
}

queryBtn.disabled = true;
queryBtn.innerText = "⌛ 檢索圖資中...";

try {
    markerLayer.clearLayers();
    if(routeLayer){ map.removeLayer(routeLayer); routeLayer=null; }
    routeInfo.innerText="路線距離：尚未計算";
    tbody.innerHTML="";
    results=[];
    let parts=[];

    // 預先檢查是否有繪製好的多邊形，用來判定「設施是否在範圍內」
    let turfZonePolygon = null;
    const activePoly = polygons.find(p => p.selected);

if (activePoly && activePoly.points.length >= 3) {
    let ring = activePoly.points.map(p => [p[1], p[0]]); {
        let ring = drawPoints.map(p => [Number(p[1]), Number(p[0])]);
        ring.push([Number(drawPoints[0][1]), Number(drawPoints[0][0])]);
        turfZonePolygon = turf.polygon([ring]);
    }

    const checkedBoxes = document.querySelectorAll("input[type=checkbox]:checked");
    if(checkedBoxes.length === 0) {
        alert("請至少勾選一個分析類型！");
        queryBtn.disabled = false;
        queryBtn.innerText = "查詢";
        return;
    }

    checkedBoxes.forEach(e=>{
    let t=e.value;
    if(t==="station"){
    parts.push(`
    nwr["railway"="station"](around:${radius},${lat},${lon});
    nwr["railway"="station"]["station"="train"](around:${radius},${lat},${lon});
    nwr["railway"="station"]["train"="yes"](around:${radius},${lat},${lon});
    nwr["railway"="halt"](around:${radius},${lat},${lon});
    nwr["railway"="subway_entrance"](around:${radius},${lat},${lon});
    nwr["amenity"="bus_station"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="bus_stop"){
    parts.push(`nwr["highway"="bus_stop"](around:${radius},${lat},${lon});`);
    }
    else if(t==="motorway_junction"){
    parts.push(`
    node["highway"="motorway_junction"](around:${radius},${lat},${lon});
    nwr["highway"="ramp"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="parking"){
    parts.push(`
    nwr["amenity"="parking"](around:${radius},${lat},${lon});
    nwr["amenity"="parking_entrance"](around:${radius},${lat},${lon});
    nwr["parking"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="marketplace"){
    parts.push(`
    nwr["amenity"="marketplace"](around:${radius},${lat},${lon});
    nwr["shop"="supermarket"](around:${radius},${lat},${lon});
    nwr["name"~"costco|好市多|家樂福|大潤發|愛買",i](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="waste_disposal"){
    parts.push(`
    nwr["amenity"="waste_transfer_station"](around:${radius},${lat},${lon});
    nwr["name"~"焚化|垃圾|廢棄物|資源回收|處理場"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="park"){
    parts.push(`nwr["leisure"="park"](around:${radius},${lat},${lon});`);
    }
    else if(t==="tourism"){
    parts.push(`nwr["tourism"](around:${radius},${lat},${lon})["leisure"!="park"];`);
    }
    else if(t==="bank"){
    parts.push(`
    nwr["amenity"="bank"](around:${radius},${lat},${lon});
    nwr["amenity"="post_office"](around:${radius},${lat},${lon});
    nwr["amenity"="hospital"](around:${radius},${lat},${lon});
    nwr["office"="government"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="cemetery"){
    parts.push(`
    nwr["landuse"="cemetery"](around:${radius},${lat},${lon});
    nwr["name"~"親儀|生命紀念|納骨|火化"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="school"){
    parts.push(`
    nwr["amenity"="school"](around:${radius},${lat},${lon});
    nwr["amenity"="university"](around:${radius},${lat},${lon});
    node["entrance"="main"](around:${radius},${lat},${lon});
    node["amenity"="school_entrance"](around:${radius},${lat},${lon});
    node["barrier"="gate"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="gas"){
    parts.push(`
    nwr["power"="substation"](around:${radius},${lat},${lon});
    nwr["amenity"="fuel"](around:${radius},${lat},${lon});
    `);
    }
    else if(t==="pollution"){
    parts.push(`
    nwr["man_made"="wastewater_treatment_plant"](around:${radius},${lat},${lon});
    nwr["landuse"="industrial"](around:${radius},${lat},${lon});
    `);
    }
    });

    const query=`[out:json][timeout:60];(${parts.join("\n")});out center;`;
    const res=await fetch("https://overpass-api.de/api/interpreter",{
    method:"POST",
    body:"data="+encodeURIComponent(query),
    headers:{"Content-Type":"application/x-www-form-urlencoded"}
    });
    const data=await res.json();
    if(!data.elements) {
        queryBtn.disabled = false;
        queryBtn.innerText = "查詢";
        return;
    }

    let rawSchools = [];
    let gates = [];
    const dedup = new Set();

    data.elements.forEach(e=>{
        let lat2=e.center?.lat ?? e.lat;
        let lon2=e.center?.lon ?? e.lon;
        if(lat2 == null || lon2 == null) return;
        
        const key = `${e.type}-${e.id}`;
        if(dedup.has(key)) return;
        dedup.add(key);

        let rawType = e.tags?.highway || e.tags?.amenity || e.tags?.tourism || e.tags?.shop || e.tags?.railway || e.tags?.entrance || e.tags?.barrier || "未知";
        let name = e.tags?.name || "";

        if(rawType === "school" || rawType === "university") {
            rawSchools.push({ id: e.id, name: name, lat: lat2, lon: lon2, rawType: rawType });
        } else if(rawType === "main" || rawType === "school_entrance" || rawType === "gate" || e.tags?.entrance === "main") {
            gates.push({ lat: lat2, lon: lon2 });
        } else {
            let typeName = rawType;
            if(rawType === "motorway_junction" || rawType === "ramp") typeName = "交流道入口(平面路口)";
            
            // ★核心空間拓撲判定：利用 Turf.js 計算設施點是否落在編輯範圍內
            let inside = false;
            if(turfZonePolygon) {
                let pt = turf.point([lon2, lat2]);
                inside = turf.booleanPointInPolygon(pt, turfZonePolygon);
            }

            results.push({
                id: results.length,
                名稱: name || (rawType === "ramp" ? "交流道平面路口/匝道端" : "周邊設施"),
                類型: typeName,
                原始類型: rawType,
                座標: [lat2, lon2],
                在範圍內: inside,
                距離: inside ? 0 : Math.round(haversine(lat, lon, lat2, lon2)),
                直線距離顯示: inside ? "0 (位於區段範圍內)" : Math.round(haversine(lat, lon, lat2, lon2)),
                路線距離: inside ? "0 (位於區段範圍內)" : "計算中...",
                路線距離數值: inside ? 0 : null
            });
        }
    });

    rawSchools.forEach(sch => {
        let finalLat = sch.lat;
        let finalLon = sch.lon;
        let hasMainGate = false;
        let minGateDist = 250; 

        gates.forEach(gate => {
            let d = haversine(sch.lat, sch.lon, gate.lat, gate.lon);
            if(d < minGateDist) {
                minGateDist = d;
                finalLat = gate.lat;
                finalLon = gate.lon;
                hasMainGate = true;
            }
        });

        // 學校部分同樣進行多邊形相交檢查
        let inside = false;
        if(turfZonePolygon) {
            let pt = turf.point([finalLon, finalLat]);
            inside = turf.booleanPointInPolygon(pt, turfZonePolygon);
        }

        results.push({
            id: results.length,
            名稱: sch.name || "未命名學校",
            類型: hasMainGate ? "學校(已精準定位大門門牌)" : "學校區域(採用形心估算)",
            原始類型: sch.rawType,
            座標: [finalLat, finalLon],
            在範圍內: inside,
            距離: inside ? 0 : Math.round(haversine(lat, lon, finalLat, finalLon)),
            直線距離顯示: inside ? "0 (位於區段範圍內)" : Math.round(haversine(lat, lon, finalLat, finalLon)),
            路線距離: inside ? "0 (位於區段範圍內)" : "計算中...",
            路線距離數值: inside ? 0 : null
        });
    });

    // 排序：0公尺（在範圍內）的設施會自動排在表格最上方
    results.sort((a,b)=>a.距離-b.距離);
    renderTable();

    results.forEach(item => {
        const m=L.marker(item.座標).addTo(markerLayer).bindTooltip(item.名稱,{direction:"top"});
        m.on("click",()=>{
            map.flyTo(item.座標,17,{duration:0.8});
            selectItem(item);
        });
    });

    queryBtn.innerText = "🚗 計算路網距離中...";

    /* 背景非同步更新路網距離 */
    for (const item of results.slice(0,80)) {
        if (item.在範圍內) continue; // 如果在範圍內，直接跳過不打 API，保留 0 值的顯示
        
        let isJunc = item.原始類型 === "motorway_junction" || item.原始類型 === "ramp";
        const routeRes = await getRouteDistance(item.座標, item.距離, isJunc, item.在範圍內);

        item.路線距離數值 = routeRes.value;
        item.路線距離 = routeRes.value + " m" + routeRes.msg;

        const cell = document.getElementById(`route-${item.id}`);
        if(cell) cell.innerText = item.路線距離;
    }

} catch(err) {
    console.error(err);
    alert("查詢發生異常，請稍後再試。");
} finally {
    queryBtn.disabled = false;
    queryBtn.innerText = "查詢";
}
}

/* 點擊欄位排序 */
function sortResults(type){
if(type==="distance"){
results.sort((a,b)=>{ return sortState.distance ? a.距離 - b.距離 : b.距離 - a.距離; });
sortState.distance = !sortState.distance;
}
else if(type==="route"){
results.sort((a,b)=>{
const ra = a.路線距離數值 ?? 99999999;
const rb = b.路線距離數值 ?? 99999999;
return sortState.route ? ra - rb : rb - ra;
});
sortState.route = !sortState.route;
}
renderTable();
}

/* 重新渲染表格 */
function renderTable(){
tbody.innerHTML="";
results.forEach(item=>{
const tr=document.createElement("tr");
tr.dataset.id=item.id;
tr.innerHTML=`
<td onclick='selectItemById(${item.id})' style="cursor:pointer;color:blue">${item.名稱}</td>
<td>${item.類型}</td>
<td>${item.直線距離顯示}</td>
<td id="route-${item.id}">${item.路線距離}</td>
`;
tbody.appendChild(tr);
});
}  

/* 清除路網藍線 */
function clearRoute(){
if(routeLayer){ map.removeLayer(routeLayer); routeLayer=null; }
routeInfo.innerText="路線距離：尚未計算";
}

/* 匯出 Excel */
function exportExcel(){
if(!results.length){ alert("無資料"); return; }
const ws = XLSX.utils.json_to_sheet(results.map(r=>({
名稱:r.名稱, 類型:r.類型, 直線距離:r.直線距離顯示, 路線距離:r.路線距離 || "", 緯度:r.座標[0], 經度:r.座標[1]
})));
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "GIS");
XLSX.writeFile(wb, "GIS查詢結果.xlsx");
}

/* 表格視窗拖曳 */
let isDragging = false;
let offsetX = 0; let offsetY = 0;
const panel = document.getElementById("resultPanel");
const header = document.getElementById("resultHeader");

header.addEventListener("mousedown", function(e){
if(e.target.tagName === "BUTTON") return; 
isDragging = true;
const rect = panel.getBoundingClientRect();
offsetX = e.clientX - rect.left;
offsetY = e.clientY - rect.top;
panel.style.position = "absolute";
panel.style.zIndex = 9999;
});

document.addEventListener("mousemove", function(e){
if(!isDragging) return;
panel.style.left = (e.clientX - offsetX) + "px";
panel.style.top = (e.clientY - offsetY) + "px";
panel.style.right = "auto";
});

document.addEventListener("mouseup", function(){ isDragging = false; });
</script>

</body>
</html>
