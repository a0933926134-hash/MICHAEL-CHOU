/* =========================================================
   LAYERS
========================================================= */

const markerLayer = L.layerGroup().addTo(map);
const poiLayer = L.layerGroup().addTo(map);
const circleLayer = L.layerGroup().addTo(map);

let center = null;

/* =========================================================
   STATUS
========================================================= */

function setStatus(t){
  document.getElementById("status").innerText = t;
}

/* =========================================================
   POI ENABLE
========================================================= */

function enabled(type){
  if(type==="便利商店") return c1.checked;
  if(type==="銀行") return c2.checked;
  if(type==="超市") return c3.checked;
  if(type==="傳統市場") return c4.checked;
  if(type==="自助洗衣店") return c5.checked;
}

/* =========================================================
   TYPE
========================================================= */

function getType(t){
  if(t.shop==="convenience") return "便利商店";
  if(t.amenity==="bank") return "銀行";
  if(t.shop==="supermarket" || t.shop==="mall") return "超市";
  if(t.amenity==="marketplace") return "傳統市場";
  if(t.shop==="laundry") return "自助洗衣店";
  return null;
}

/* =========================================================
   ICON
========================================================= */

function icon(color){
  return L.divIcon({
    className:"",
    html:`<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2px solid white;"></div>`
  });
}

/* =========================================================
   RADIUS
========================================================= */

function draw(lat,lng){
  circleLayer.clearLayers();
  L.circle([lat,lng],{
    radius:2000,
    color:"#60a5fa",
    fillOpacity:0.15
  }).addTo(circleLayer);
}

/* =========================================================
   POI FETCH (STABLE)
========================================================= */

async function fetchPOI(lat,lng){

  setStatus("POI 載入中...");

  poiLayer.clearLayers();

  const q = `
  [out:json][timeout:25];
  (
    node(around:2000,${lat},${lng})["shop"="convenience"];
    node(around:2000,${lat},${lng})["amenity"="bank"];
    node(around:2000,${lat},${lng})["shop"="supermarket"];
    node(around:2000,${lat},${lng})["shop"="mall"];
    node(around:2000,${lat},${lng})["amenity"="marketplace"];
    node(around:2000,${lat},${lng})["shop"="laundry"];
  );
  out body;
  `;

  try{

    const res = await fetch(
      "https://overpass-api.de/api/interpreter?data=" +
      encodeURIComponent(q)
    );

    if(!res.ok){
      setStatus("POI API錯誤 "+res.status);
      return;
    }

    const json = await res.json();

    let count = 0;

    json.elements.forEach(e=>{

      if(!e.lat || !e.lon) return;

      const t = getType(e.tags || {});
      if(!t) return;

      if(!enabled(t)) return;

      count++;

      const name = e.tags.name || t;

      /* marker */
      L.marker([e.lat,e.lon],{
        icon:icon(
          t==="便利商店"?"#22c55e":
          t==="銀行"?"#3b82f6":
          t==="超市"?"#f59e0b":
          t==="傳統市場"?"#ef4444":
          "#8b5cf6"
        )
      })
      .bindPopup(`<b>${name}</b><br>${t}`)
      .addTo(poiLayer);

      /* LABEL ONLY ZOOM >=16 (FIX BLACK ISSUE) */
      if(map.getZoom() >= 16){
        L.marker([e.lat,e.lon],{
          icon:L.divIcon({
            className:"",
            html:`<div class="poi-label">${name}</div>`
          }),
          interactive:false
        }).addTo(poiLayer);
      }

    });

    setStatus("POI完成 "+count);

  }catch(err){
    console.error(err);
    setStatus("POI載入失敗");
  }
}

/* =========================================================
   GO (FIX BLACK TILE ISSUE)
========================================================= */

function go(lat,lng){

  center = [lat,lng];

  map.setView([lat,lng],15); // FIX flyTo black tile issue

  draw(lat,lng);

  fetchPOI(lat,lng);
}

/* =========================================================
   RENDER
========================================================= */

function render(){

  markerLayer.clearLayers();

  document.getElementById("list").innerHTML="";

  data.forEach(d=>{

    L.marker([d.lat,d.lng])
      .addTo(markerLayer)
      .on("click",()=>go(d.lat,d.lng));

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=d.name+"<br>"+d.district;
    div.onclick=()=>go(d.lat,d.lng);

    document.getElementById("list").appendChild(div);

  });

}

/* =========================================================
   INIT
========================================================= */

render();

/* checkbox refresh */
["c1","c2","c3","c4","c5"].forEach(id=>{
  document.getElementById(id).onchange=()=>{
    if(center) fetchPOI(center[0],center[1]);
  };
});
