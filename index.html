<script>
let map = L.map('map').setView([25.012098, 121.465675], 15);

// ✅ ★★★ 一定要在 loadDEM 之前 ★★★
 
/* =========================================================
   GIS 多底圖架構（合法替代 Google Maps）
   ========================================================= */


/* =========================================================
   1. NLSC 電子地圖（預設）
   ========================================================= */
const nlscEMAP = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:19,
    attribution:'© NLSC'
});

/* =========================================================
   2. NLSC 正射影像
   ========================================================= */
const nlscPHOTO = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:20,
    attribution:'© NLSC 正射影像'
});

/* =========================================================
   3. OpenStreetMap
   ========================================================= */
const osmLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19,
    attribution:'© OpenStreetMap contributors'
});

/* =========================================================
   4. ESRI World Imagery（合法衛星圖）
   ========================================================= */
const esriWorldImagery = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
    maxZoom:19,
    attribution:'© Esri World Imagery'
});

/* =========================================================
   預設底圖
   ========================================================= */
nlscEMAP.addTo(map);

/* =========================================================
   地籍圖（獨立 overlay）
   ========================================================= */
const cadastralLayer = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/CADASTRAL/default/GoogleMapsCompatible/{z}/{y}/{x}',
{
    maxZoom:20,
    opacity:0.75,
    attribution:'© NLSC 地籍圖'
}
);

cadastralLayer.addTo(map);

/* =========================================================
   底圖切換
   ========================================================= */
const baseMaps = {
    "NLSC 電子地圖": nlscEMAP,
    "NLSC 正射影像": nlscPHOTO,
    "OpenStreetMap": osmLayer,
    "ESRI 衛星影像": esriWorldImagery
};

/* =========================================================
   GIS Overlay
   ========================================================= */
/* =========================================================
   NLSC DEM 地形暈渲圖（Hillshade）
   ========================================================= */

const nlscDEM = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP5_OPENDATA/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:18,
    opacity:0.45,
    attribution:'© NLSC DEM'
});

/* =========================================================
   GIS Overlay
   ========================================================= */

const overlayMaps = {
    "地籍圖": cadastralLayer,
    "DEM 地形": nlscDEM
};

/* =========================================================
   圖層控制器
   ========================================================= */
L.control.layers(baseMaps, overlayMaps,{
    collapsed:false,
    position:'topright'
}).addTo(map);

/* 比例尺 */
const scaleControl = L.control({ position: 'bottomleft' });

scaleControl.onAdd = function () {
this._div = L.DomUtil.create('div', 'scale-denominator');
this._div.style.background = 'rgba(255,255,255,0.9)';
this._div.style.padding = '4px 8px';
this._div.style.borderRadius = '6px';
this._div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.3)';
this._div.style.fontSize = '12px';
this._div.style.fontWeight = 'bold';
this._div.style.marginBottom = '42px';
this.update();
return this._div;
};

scaleControl.update = function () {
const center = map.getCenter();
const zoom = map.getZoom();
const metersPerPixel = 40075016.686 * Math.abs(Math.cos(center.lat * Math.PI / 180)) / Math.pow(2, zoom + 8);
const dpi = 96;
const scale = metersPerPixel * dpi / 0.0254;
const rounded = Math.round(scale / 100) * 100;
this._div.innerHTML = `比例尺 1:${rounded.toLocaleString()}`;
};

scaleControl.addTo(map);
map.on('zoomend moveend', () => {
    scaleControl.update();
});

let markerLayer=L.layerGroup().addTo(map);
// 新增這段變數定義，確保程式後續能讀取到 UI 元素
const tbody = document.getElementById("tbody"); 
const resPanel = document.getElementById("resultPanel"); // 修正 resPanel 的來源    
  
const latInput=document.getElementById("lat");
const lonInput=document.getElementById("lon");
const radiusInput=document.getElementById("radius");
const routeInfo=document.getElementById("routeInfo");
const queryBtn=document.getElementById("query-btn");

let userMarker=null;
let origin=null;
let results=[];

let sortState = { distance:true, route:true };
let routeLayer=null;
/* ===========================
   DEM Raster
   =========================== */

origin=[25.012098,121.465675];

userMarker=L.marker(origin,{
icon:L.divIcon({
className:'',
html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
iconSize:[18,18],
iconAnchor:[9,9]
}),
interactive:false
}).addTo(map);


/* ====================================================================
   ★ 多邊形集合管理與分析核心
   ==================================================================== */
let isDrawingPolygon = false;
let currentDrawingPoints = [];     // 當前正在繪製的點
let previewPolyline = null;
let allPolygons = [];              // 儲存所有多邊形物件: { id, latlngs, layer }
let activePolygonId = null;        // 當前選中的多邊形 ID
let drawMarkers = L.layerGroup().addTo(map);

// 初始化控制項
const drawControl = L.control({ position: 'topleft' });
drawControl.onAdd = function() {
    const div = L.DomUtil.create('div', 'draw-control-bar');
    div.innerHTML = `
        <button id="btn-start-draw" class="draw-btn" onclick="toggleDrawMode(this)">📐 開始繪製</button>
        <button id="btn-end-draw" class="draw-btn" onclick="finishCurrentPolygon()" style="display:none; background:#10b981; color:white;">✓ 建立此範圍</button>
        <button id="btn-clear-all" class="draw-btn" onclick="clearAllPolygons()" style="display:none; background:#ef4444; color:white;">✕ 清除全部</button>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
};
drawControl.addTo(map);

// --- 繪製控制 ---
function toggleDrawMode(btn) {
    isDrawingPolygon = !isDrawingPolygon;
    if (isDrawingPolygon) {
        btn.classList.add('active');
        btn.innerText = "🛑 停止繪製";
        document.getElementById('btn-end-draw').style.display = 'block';
        document.getElementById('btn-clear-all').style.display = 'block';
    } else {
        btn.classList.remove('active');
        btn.innerText = "📐 開始繪製";
        document.getElementById('btn-end-draw').style.display = 'none';
    }
}

// --- 建立多邊形 ---
function finishCurrentPolygon() {
    if (currentDrawingPoints.length < 3) return alert("請至少點選 3 個點！");
    
    const polyId = Date.now();
    const newLayer = L.polygon(currentDrawingPoints, {
        color: '#3b82f6',
        weight: 3,
        fillColor: '#3b82f6',
        fillOpacity: 0.3
    }).addTo(map);

    const polyObj = { id: polyId, latlngs: [...currentDrawingPoints], layer: newLayer };
    allPolygons.push(polyObj);

    // 綁定點擊選取事件
    newLayer.on('click', (e) => {
        L.DomEvent.stopPropagation(e);
        selectPolygon(polyId);
    });

    // 清理繪製狀態
    currentDrawingPoints = [];
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    drawMarkers.clearLayers();
    
    // 自動選取剛建立的
    selectPolygon(polyId);
    toggleDrawMode(document.getElementById('btn-start-draw'));
}

function selectPolygon(id) {
    activePolygonId = id;
    
    // 1. 重置樣式
    allPolygons.forEach(p => p.layer.setStyle({ color: '#3b82f6', fillOpacity: 0.3 }));
    const target = allPolygons.find(p => p.id === id);
    if (!target) return;
    target.layer.setStyle({ color: '#dc2626', fillOpacity: 0.5 });

    // 2. 獲取座標並確保閉合
    const latlngs = target.layer.getLatLngs()[0];
    const coords = latlngs.map(p => [p.lng, p.lat]);
    const closedCoords = [...coords, coords[0]]; 

    // 3. 建立 GeoJSON 對象
    const polyGeo = turf.polygon([closedCoords]);
    const lineGeo = turf.lineString(closedCoords);
    const centroid = turf.centroid(polyGeo);
    const [cLon, cLat] = centroid.geometry.coordinates;

    // 4. 計算測量數值
    // 路線距離 (即周長)
    const perimeter = turf.length(lineGeo, { units: 'kilometers' });
    
    // 直線距離 (至 origin)
    let distToOrigin = 0;
    // 確保 origin 是 [lat, lon] 陣列且已定義
    if (typeof origin !== 'undefined' && Array.isArray(origin) && origin.length === 2) {
        // turf.distance 需要 [lon, lat]
        const originPoint = turf.point([origin[1], origin[0]]);
        distToOrigin = turf.distance(originPoint, centroid, { units: 'kilometers' });
    } else {
        console.warn("Origin 未設定或格式錯誤");
    }

    // 5. 更新形心標記
    if (typeof userMarker !== 'undefined') {
        if (map.hasLayer(userMarker)) map.removeLayer(userMarker);
        userMarker = L.marker([cLat, cLon], {
            icon: L.divIcon({
                className: '',
                html: `<div style="width:18px; height:18px; background:#ef4444; border:3px solid #ffffff; border-radius:50%; box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            })
        }).addTo(map);
    }

    // 6. 更新 UI 面板
    if (typeof resPanel !== 'undefined' && resPanel) {
        resPanel.innerHTML = `
            <div id="resultHeader">
                查詢結果
                <button onclick="exportExcel()">Excel</button>
            </div>
            <div id="resultTableWrapper">
                <div style="padding:10px; background:#f9fafb; border-radius:8px; border:1px solid #e5e7eb;">
                    <h4 style="margin:0 0 8px;">📍 範圍分析</h4>
                    <div style="font-size:13px; line-height:1.6;">
                        <div>路線距離 (周長): <b>${perimeter.toFixed(3)} km</b></div>
                        <div>直線距離 (至原點): <b>${distToOrigin.toFixed(3)} km</b></div>
                        <div>形心位置: <b>${cLat.toFixed(5)}, ${cLon.toFixed(5)}</b></div>
                    </div>
                    <button onclick="removeSelectedPolygon()" style="margin-top:10px; background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:4px; width:100%; cursor:pointer;">刪除此範圍</button>
                </div>
            </div>
        `;
    }
}
// --- 輔助功能 ---
function removeSelectedPolygon() {
    if (!activePolygonId) return;
    const idx = allPolygons.findIndex(p => p.id === activePolygonId);
    if (idx > -1) {
        map.removeLayer(allPolygons[idx].layer);
        allPolygons.splice(idx, 1);
        activePolygonId = null;
        if(resPanel) resPanel.innerHTML = "";
    }
}

function clearAllPolygons() {
    allPolygons.forEach(p => map.removeLayer(p.layer));
    allPolygons = [];
    currentDrawingPoints = [];
    drawMarkers.clearLayers();
    if(resPanel) resPanel.innerHTML = "";
    alert("已清除所有範圍");
}

// --- 地圖點擊 (繪製邏輯) ---
map.on('click', e => {
    if (isDrawingPolygon) {
        currentDrawingPoints.push([e.latlng.lat, e.latlng.lng]);
        L.circleMarker([e.latlng.lat, e.latlng.lng], { radius: 4, color: '#3b82f6' }).addTo(drawMarkers);
        
        if (previewPolyline) {
            previewPolyline.setLatLngs(currentDrawingPoints);
        } else {
            previewPolyline = L.polyline(currentDrawingPoints, { color: '#3b82f6', dashArray: '5, 5' }).addTo(map);
        }
    } else {
        // 非繪製模式下點擊空白處，取消選取
        activePolygonId = null;
        allPolygons.forEach(p => p.layer.setStyle({ color: '#3b82f6', fillOpacity: 0.3 }));
    }
});


/* 取得現在位置 */
function getCurrentLocation(){
if(!navigator.geolocation){
alert("瀏覽器不支援 GPS 定位");
return;
}

/* ==================================
   DEM 高程查詢
   ================================== */
const elevationCache = {};
async function getElevation(lat, lon){

    const cacheKey =
        lat.toFixed(5)+","+lon.toFixed(5);

    if(elevationCache[cacheKey] !== undefined){
        return elevationCache[cacheKey];
    }

    try{

        const controller = new AbortController();

        const timeout = setTimeout(()=>{
            controller.abort();
        },10000);

        const url =
        `https://api.opentopodata.org/v1/srtm90m?locations=${lat},${lon}`;

        const res = await fetch(url,{
    signal:controller.signal
});

console.log(
    "DEM HTTP:",
    res.status,
    url
);

        clearTimeout(timeout);

        if(!res.ok){
            console.error(
                "DEM HTTP Error:",
                res.status
            );
            return null;
        }

        const text = await res.text();

console.log("DEM RAW:", text);

const data = JSON.parse(text);

        if(
            data &&
            data.results &&
            data.results.length &&
            data.results[0].elevation !== null
        ){

            elevationCache[cacheKey] =
                Number(data.results[0].elevation);

            return elevationCache[cacheKey];
        }

        return null;

    }catch(err){

        console.error(
            "DEM API Error:",
            err
        );

        return null;
    }
}

/* 哈弗辛直線距離 */
function haversine(lat1, lon1, lat2, lon2){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);
const a= Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* OSRM 路由服務 (整合交流道反向優化與區段內部直接歸零判定) */
async function getRouteDistance(to, straightDist, isJunction = false, isInZone = false){
if(isInZone) {
    return { value: 0, isFallback: false, msg: "" };
}
try{
if(!origin) return null;

let url = `https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=false`;

if(isJunction) {
    url = `https://router.project-osrm.org/route/v1/driving/${to[1]},${to[0]};${origin[1]},${origin[0]}?overview=false&radiuses=50;unlimited`;
}

const res = await fetch(url);
const data = await res.json();

if(data.routes && data.routes.length > 0) {
    return { value: Math.round(data.routes[0].distance), isFallback: false, msg: "" };
}

return { value: straightDist, isFallback: true, msg: " (直線備援)" };
}catch(err){
console.error("OSRM 路由異常:", err);
return { value: straightDist, isFallback: true, msg: " (直線備援)" };
}
}

/* =========================================================
   DEM 坡度分析
   ========================================================= */
    async function analyzeSlope() {

    const slopeInfo = document.getElementById("slopeInfo");

    if (!drawPoints || drawPoints.length < 3) {
        alert("請先繪製分析範圍");
        return;
    }

    slopeInfo.innerHTML = "🌄 DEM 坡度分析中...";

    try {

        markerLayer.clearLayers();

        // =========================
        // 1. 建立 polygon（安全版）
        // =========================
        let ring = drawPoints.map(p => [Number(p[1]), Number(p[0])]);

        if (ring.length < 3) {
            alert("範圍點不足");
            return;
        }

        if (
            ring[0][0] !== ring[ring.length - 1][0] ||
            ring[0][1] !== ring[ring.length - 1][1]
        ) {
            ring.push(ring[0]);
        }

        const polygon = turf.polygon([ring]);
        const bbox = turf.bbox(polygon);

        const [minLon, minLat, maxLon, maxLat] = bbox;

        // =========================
        // 2. 自動決定取樣解析度
        // =========================
        const step = Math.max(
            Math.max(maxLon - minLon, maxLat - minLat) / 30,
            0.00005
        );

        let elevations = [];
let insideCount = 0;
let failedCount = 0;

        // =========================
        // 3. DEM 採樣（有節流避免卡死）
        // =========================
        for (let lat = minLat; lat <= maxLat; lat += step) {
            for (let lon = minLon; lon <= maxLon; lon += step) {

                const pt = turf.point([lon, lat]);

                if (!turf.booleanPointInPolygon(pt, polygon)) continue;

                insideCount++;

                const ele = await getElevation(lat, lon);

               if (ele === null || isNaN(ele)) {

    failedCount++;

    continue;
}

                elevations.push({ lat, lon, ele });

                // 防止 API 過快
                await new Promise(
    r => setTimeout(r,30)
);
            }
        }

        // =========================
        // 4. fallback（避免點太少）
        // =========================
        if (elevations.length < 5) {

    console.warn(
        "DEM有效點不足:",
        elevations.length,
        "Polygon內點數:",
        insideCount,
        "失敗次數:",
        failedCount
    );

    const centroid =
        turf.centroid(polygon)
        .geometry.coordinates;

    const ele =
        await getElevation(
            centroid[1],
            centroid[0]
        );

    if (
        ele !== null &&
        !isNaN(ele)
    ){

        elevations = [{
            lat: centroid[1],
            lon: centroid[0],
            ele
        }];

    } else {

        slopeInfo.innerHTML = `
        ⚠ DEM 無資料<br><br>

        Polygon內採樣點：
        ${insideCount}<br>

        成功高程點：
        ${elevations.length}<br>

        DEM失敗次數：
        ${failedCount}<br><br>

        可能原因：<br>
        1. OpenTopoData服務異常<br>
        2. 網路阻擋API<br>
        3. DEM資料缺漏
        `;

        return;
    }
}

        // =========================
        // 5. 坡度計算（只做一次）
        // =========================
        let slopes = [];

        for (let i = 1; i < elevations.length; i++) {

            const p1 = elevations[i - 1];
            const p2 = elevations[i];

            const dist = haversine(p1.lat, p1.lon, p2.lat, p2.lon);
            if (dist < 1) continue;

            const rise = Math.abs(p2.ele - p1.ele);

            slopes.push((rise / dist) * 100);
        }

        if (!slopes.length) {
            slopeInfo.innerHTML = "⚠ 無法計算坡度";
            return;
        }

        // =========================
        // 6. 統計
        // =========================
        const elevs = elevations.map(e => e.ele);

        const minElev = Math.min(...elevs);
        const maxElev = Math.max(...elevs);
        const avgElev = elevs.reduce((a, b) => a + b, 0) / elevs.length;

        const avgSlope = slopes.reduce((a, b) => a + b, 0) / slopes.length;
        const maxSlope = Math.max(...slopes);
        const minSlope = Math.min(...slopes);

        let terrainType = "平坦";
        if (avgSlope > 30) terrainType = "陡坡";
        else if (avgSlope > 15) terrainType = "中坡";
        else if (avgSlope > 5) terrainType = "緩坡";

        // =========================
        // 7. UI 顯示
        // =========================
        slopeInfo.innerHTML = `
<b>🌄 DEM 坡度分析完成</b><br>
採樣點數：${elevations.length}<br><br>

平均高程：${avgElev.toFixed(1)} m<br>
最低高程：${minElev.toFixed(1)} m<br>
最高高程：${maxElev.toFixed(1)} m<br><br>

平均坡度：${avgSlope.toFixed(2)} %<br>
最大坡度：${maxSlope.toFixed(2)} %<br>
最小坡度：${minSlope.toFixed(2)} %<br><br>

地形分類：<b>${terrainType}</b>
        `;

        // =========================
        // 8. 視覺化
        // =========================
        elevations.forEach(p => {

            let color = "#22c55e";
            if (avgSlope > 30) color = "#dc2626";
            else if (avgSlope > 15) color = "#f97316";
            else if (avgSlope > 5) color = "#eab308";

            L.circleMarker([p.lat, p.lon], {
                radius: 4,
                color,
                fillColor: color,
                fillOpacity: 0.9,
                weight: 1
            })
            .addTo(markerLayer)
            .bindTooltip(`高程: ${p.ele.toFixed(1)} m`);
        });

    } catch (err) {
        console.error(err);
        slopeInfo.innerHTML = "❌ DEM 坡度分析失敗";
    }
}
/* 匯出 Excel */
function exportExcel(){
if(!results.length){ alert("無資料"); return; }
const ws = XLSX.utils.json_to_sheet(results.map(r=>({
名稱:r.名稱, 類型:r.類型, 直線距離:r.直線距離顯示, 路線距離:r.路線距離 || "", 緯度:r.座標[0], 經度:r.座標[1]
})));
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "GIS");
XLSX.writeFile(wb, "GIS查詢結果.xlsx");
}

/* 表格視窗拖曳 */
let isDragging = false;
let offsetX = 0; let offsetY = 0;
const panel = document.getElementById("resultPanel");
const header = document.getElementById("resultHeader");

header.addEventListener("mousedown", function(e){
if(e.target.tagName === "BUTTON") return; 
isDragging = true;
const rect = panel.getBoundingClientRect();
offsetX = e.clientX - rect.left;
offsetY = e.clientY - rect.top;
panel.style.position = "absolute";
panel.style.zIndex = 9999;
});

document.addEventListener("mousemove", function(e){
if(!isDragging) return;
panel.style.left = (e.clientX - offsetX) + "px";
panel.style.top = (e.clientY - offsetY) + "px";
panel.style.right = "auto";
});

document.addEventListener("mouseup", function(){ isDragging = false; });
/* ==========================
   坡度面板拖曳
   ========================== */

let slopeDragging = false;
let slopeOffsetX = 0;
let slopeOffsetY = 0;

const slopePanel = document.getElementById("slopePanel");
const slopeHeader = document.getElementById("slopeHeader");

slopeHeader.addEventListener("mousedown", function(e){

    if(e.target.tagName === "BUTTON") return;

    slopeDragging = true;

    const rect = slopePanel.getBoundingClientRect();

    slopeOffsetX = e.clientX - rect.left;
    slopeOffsetY = e.clientY - rect.top;

    slopePanel.style.position = "absolute";
    slopePanel.style.zIndex = 99999;
});

document.addEventListener("mousemove", function(e){

    if(!slopeDragging) return;

    slopePanel.style.left =
        (e.clientX - slopeOffsetX) + "px";

    slopePanel.style.top =
        (e.clientY - slopeOffsetY) + "px";
});

document.addEventListener("mouseup", function(){

    slopeDragging = false;

});    
</script>
