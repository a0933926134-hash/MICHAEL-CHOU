/* =========================================================

   LAYERS

========================================================= */



let markerLayer = L.layerGroup().addTo(map);

let circleLayer = L.layerGroup().addTo(map);



let poiLayers = {

  park:L.layerGroup().addTo(map),

  mall:L.layerGroup().addTo(map),

  convenience:L.layerGroup().addTo(map),

  laundry:L.layerGroup().addTo(map),

  police:L.layerGroup().addTo(map)

};



let labelPositions = [];



/* =========================================================

   CURRENT SCHOOL

========================================================= */



let currentSchool = null;



/* =========================================================

   LABEL COLLISION

========================================================= */



function shouldShowLabel(latlng, zoom){



  if(zoom < 12) return false;



  const p = map.latLngToContainerPoint(latlng);



  for(let q of labelPositions){



    if(Math.hypot(p.x-q.x,p.y-q.y) < 80){

      return false;

    }

  }



  labelPositions.push(p);



  return true;

}



/* =========================================================

   FILTER

========================================================= */



function getFilteredData(){



  const d = document.getElementById("districtFilter").value;

  const s = document.getElementById("seasonFilter").value;



  return data.filter(x=>

    (d==="all" || x.district===d) &&

    (s==="all" || x.season===s)

  );

}



/* =========================================================

   QUANTILE

========================================================= */



function quantile(arr,q){



  arr = arr.slice().sort((a,b)=>a-b);



  const p = (arr.length-1)*q;

  const b = Math.floor(p);

  const r = p-b;



  return arr[b+1] !== undefined

    ? arr[b] + r*(arr[b+1]-arr[b])

    : arr[b];

}



/* =========================================================

   DRAW RADIUS

========================================================= */



function drawRadius(lat,lng){



  circleLayer.clearLayers();



  L.circle([lat,lng],{

    radius:2000,

    color:"#2563eb",

    weight:2,

    fillColor:"#93c5fd",

    fillOpacity:0.18

  }).addTo(circleLayer);

}



/* =========================================================

   GO

========================================================= */



function go(lat,lng,name){



  currentSchool = {

    lat,

    lng,

    name

  };



  map.flyTo([lat,lng],15,{

    duration:1.2

  });



  drawRadius(lat,lng);



  updatePOI();

}



/* =========================================================

   RENDER

========================================================= */



function render(list){



  markerLayer.clearLayers();



  labelPositions = [];



  const el = document.getElementById("list");



  el.innerHTML = "";



  const grouped = {};



  list.forEach(d=>{



    if(!grouped[d.name]){

      grouped[d.name] = [];

    }



    grouped[d.name].push(d);



  });



  Object.keys(grouped).forEach(name=>{



    const items = grouped[name];

    const first = items[0];



    const types = {

      雅房:[],

      套房:[],

      整層:[]

    };



    items.forEach(i=>{



      types.雅房.push(i.rents.雅房);

      types.套房.push(i.rents.套房);

      types.整層.push(i.rents.整層);



    });



    const icon = L.divIcon({

      className:"",

      html:`

      <div style="text-align:center;">



        <div style="

          width:22px;

          height:22px;

          background:#ea4335;

          border-radius:50% 50% 50% 0;

          transform:rotate(-45deg);

          margin:auto;

          box-shadow:0 2px 8px rgba(0,0,0,0.25);

        "></div>



        ${

          shouldShowLabel(

            L.latLng(first.lat,first.lng),

            map.getZoom()

          )

          ?

          `<div class="gis-label">

             <div class="label">${name}</div>

           </div>`

          :""

        }



      </div>

      `,

      iconSize:[120,50],

      iconAnchor:[60,25]

    });



    L.marker([first.lat,first.lng],{icon})

      .addTo(markerLayer)

      .on("click",()=>{

        go(first.lat,first.lng,name);

      });



    const row=(label,arr)=>`

      <tr>

        <th>${label}</th>

        <td>${quantile(arr,0.25).toFixed(0)}</td>

        <td>${quantile(arr,0.5).toFixed(0)}</td>

        <td>${quantile(arr,0.75).toFixed(0)}</td>

      </tr>

    `;



    const card=document.createElement("div");



    card.className="card";



    card.onclick=()=>{

      go(first.lat,first.lng,name);

    };



    card.innerHTML=`

      <div class="name">${name}</div>

      <div class="meta">${first.district}</div>



      <table class="price-table">



        <tr>

          <th></th>

          <th>25分位</th>

          <th>中位數</th>

          <th>75分位</th>

        </tr>



        ${row("雅房",types.雅房)}

        ${row("套房",types.套房)}

        ${row("整層",types.整層)}



      </table>

    `;



    el.appendChild(card);



  });



}

  switch(type){



    case "park":

      return 'node["leisure"="park"]';



    case "mall":

      return 'node["shop"="mall"]';



    case "convenience":

      return 'node["shop"="convenience"]';



    case "laundry":

      return 'node["shop"="laundry"]';



    case "police":

      return 'node["amenity"="police"]';

  }

}



/* =========================================================

   LOAD POI

   修正：僅搜尋半徑 2KM 內

========================================================= */



async function loadPOI(type){



  if(!currentSchool) return;



  const lat = currentSchool.lat;

  const lng = currentSchool.lng;



  const query = `

  [out:json][timeout:25];

  (

    ${getPOIQuery(type)}(around:2000,${lat},${lng});

  );

  out center;

  `;



  const url =

    "https://overpass-api.de/api/interpreter?data="

    + encodeURIComponent(query);



  try{



    const res = await fetch(url);



    const json = await res.json();



    poiLayers[type].clearLayers();



    json.elements.forEach(e=>{



      if(!e.lat || !e.lon) return;



      const poiName =

        e.tags?.name ||

        type;



      const marker = L.circleMarker([e.lat,e.lon],{

        radius:6,

        weight:1,

        color:"#1d4ed8",

        fillColor:"#2563eb",

        fillOpacity:0.9

      });



      marker.bindPopup(`

        <b>${poiName}</b><br>

        類型：${type}

      `);



      marker.addTo(poiLayers[type]);



      /* POI 名稱 */



      L.marker([e.lat,e.lon],{

        interactive:false,

        icon:L.divIcon({

          className:"",

          html:`<div class="poi-text">${poiName}</div>`,

          iconSize:[100,20],

          iconAnchor:[-8,10]

        })

      }).addTo(poiLayers[type]);



    });



  }catch(err){



    console.error("POI載入失敗:",err);



  }



}



/* =========================================================

   UPDATE POI

========================================================= */



function updatePOI(){



  document.querySelectorAll(".poi")

  .forEach(cb=>{



    const type = cb.value;



    if(cb.checked){



      loadPOI(type);



    }else{



      poiLayers[type].clearLayers();



    }



  });



}



/* =========================================================

   EVENTS

========================================================= */



document.querySelectorAll(".poi")

.forEach(cb=>{



  cb.addEventListener("change",updatePOI);



});

/* =========================================================

   Draggable POI BOX

========================================================= */



const box = document.getElementById("poiBox");



let dragging = false;

let offsetX = 0;

let offsetY = 0;



box.addEventListener("mousedown",(e)=>{



  dragging = true;



  offsetX = e.clientX - box.offsetLeft;

  offsetY = e.clientY - box.offsetTop;



});



document.addEventListener("mousemove",(e)=>{



  if(!dragging) return;



  box.style.left =

    (e.clientX-offsetX)+"px";



  box.style.top =

    (e.clientY-offsetY)+"px";



});



document.addEventListener("mouseup",()=>{



  dragging = false;



});



</script>
