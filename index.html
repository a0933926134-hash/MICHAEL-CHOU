<script>
let map = L.map('map').setView([25.012098, 121.465675], 15);

/* =========================================================
    GIS 多底圖架構（合法替代 Google Maps）
    ========================================================= */

/* =========================================================
    1. NLSC 電子地圖（預設）
    ========================================================= */
const nlscEMAP = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:19,
    attribution:'© NLSC'
});

/* =========================================================
    2. NLSC 正射影像
    ========================================================= */
const nlscPHOTO = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:20,
    attribution:'© NLSC 正射影像'
});

/* =========================================================
    3. OpenStreetMap
    ========================================================= */
const osmLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19,
    attribution:'© OpenStreetMap contributors'
});

/* =========================================================
    4. ESRI World Imagery（合法衛星圖）
    ========================================================= */
const esriWorldImagery = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
    maxZoom:19,
    attribution:'© Esri World Imagery'
});

/* =========================================================
    預設底圖
    ========================================================= */
nlscEMAP.addTo(map);

/* =========================================================
    地籍圖（獨立 overlay）
    ========================================================= */
const cadastralLayer = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/CADASTRAL/default/GoogleMapsCompatible/{z}/{y}/{x}',
{
    maxZoom:20,
    opacity:0.75,
    attribution:'© NLSC 地籍圖'
}
);

cadastralLayer.addTo(map);

/* =========================================================
    底圖切換
    ========================================================= */
const baseMaps = {
    "NLSC 電子地圖": nlscEMAP,
    "NLSC 正射影像": nlscPHOTO,
    "OpenStreetMap": osmLayer,
    "ESRI 衛星影像": esriWorldImagery
};

/* =========================================================
    GIS Overlay
    ========================================================= */
const nlscDEM = L.tileLayer(
'https://wmts.nlsc.gov.tw/wmts/EMAP5_OPENDATA/default/EPSG:3857/{z}/{y}/{x}',
{
    maxZoom:18,
    opacity:0.45,
    attribution:'© NLSC DEM'
});

const overlayMaps = {
    "地籍圖": cadastralLayer,
    "DEM 地形": nlscDEM
};

/* =========================================================
    圖層控制器
    ========================================================= */
L.control.layers(baseMaps, overlayMaps,{
    collapsed:false,
    position:'topright'
}).addTo(map);

/* 比例尺 */
const scaleControl = L.control({ position: 'bottomleft' });

scaleControl.onAdd = function () {
this._div = L.DomUtil.create('div', 'scale-denominator');
this._div.style.background = 'rgba(255,255,255,0.9)';
this._div.style.padding = '4px 8px';
this._div.style.borderRadius = '6px';
this._div.style.boxShadow = '0 1px 5px rgba(0,0,0,0.3)';
this._div.style.fontSize = '12px';
this._div.style.fontWeight = 'bold';
this._div.style.marginBottom = '42px';
this.update();
return this._div;
};

scaleControl.update = function () {
const center = map.getCenter();
const zoom = map.getZoom();
const metersPerPixel = 40075016.686 * Math.abs(Math.cos(center.lat * Math.PI / 180)) / Math.pow(2, zoom + 8);
const dpi = 96;
const scale = metersPerPixel * dpi / 0.0254;
const rounded = Math.round(scale / 100) * 100;
this._div.innerHTML = `比例尺 1:${rounded.toLocaleString()}`;
};

scaleControl.addTo(map);
map.on('zoomend moveend', () => {
    scaleControl.update();
});

let markerLayer=L.layerGroup().addTo(map);
  
const latInput=document.getElementById("lat");
const lonInput=document.getElementById("lon");
const radiusInput=document.getElementById("radius");
const tbody=document.getElementById("tbody");
const routeInfo=document.getElementById("routeInfo");
const queryBtn=document.getElementById("query-btn");

let userMarker=null;
let origin=null;
let results=[];

let sortState = { distance:true, route:true };
let routeLayer=null;

origin=[25.012098,121.465675];

userMarker=L.marker(origin,{
icon:L.divIcon({
className:'',
html: `<div style="width:18px;height:18px;background:#ef4444;border:3px solid #ffffff;border-radius:50%;box-shadow:0 0 0 2px rgba(239,68,68,0.35);"></div>`,
iconSize:[18,18],
iconAnchor:[9,9]
}),
interactive:false
}).addTo(map);


/* ====================================================================
    ★ 多邊形繪製與管理系統 - 支持多個多邊形
   ==================================================================== */

let isDrawingPolygon = false;
let drawPoints = [];       
let previewPolyline = null;
let drawMarkers = L.layerGroup().addTo(map);
let polygons = [];              // 儲存所有多邊形
let selectedPolygonId = null;   // 當前選中的多邊形ID
let polygonEditMarkers = L.layerGroup().addTo(map);  // 編輯標記

const drawControl = L.control({ position: 'topleft' });
drawControl.onAdd = function() {
    const div = L.DomUtil.create('div', 'draw-control-bar');
    div.innerHTML = `
        <button id="btn-start-draw" class="draw-btn" onclick="toggleDrawMode(this)">📐 繪製新多邊形</button>
        <button id="btn-end-draw" class="draw-btn" onclick="finishPolygon()" style="display:none; background:#10b981; color:white;">✓ 完成閉合</button>
        <button id="btn-export-all" class="draw-btn shp-btn" onclick="exportAllPolygonsSHP()">📥 匯出全部 SHP</button>
        <label id="lbl-import-shp" class="shp-import-label">📤 匯入範圍 (支援 SHP.zip 或 GeoJSON)
            <input type="file" id="shp-file-input" accept=".zip,.geojson,.json" style="display:none;" onchange="importPolygonSHP(event)">
        </label>
        <button id="btn-clear-draw" class="draw-btn" onclick="cancelCurrentDraw()" style="display:none; background:#6b7280; color:white;">✕ 取消繪製</button>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
};
drawControl.addTo(map);

const resPanel = document.getElementById("resultPanel");
const sidePanel = document.getElementById("panel");
L.DomEvent.disableClickPropagation(resPanel);
L.DomEvent.disableClickPropagation(sidePanel);

function toggleDrawMode(btn) {
    isDrawingPolygon = !isDrawingPolygon;
    if (isDrawingPolygon) {
        btn.classList.add('active');
        btn.innerText = "🛑 停止點選";
        document.getElementById('btn-end-draw').style.display = 'block';
        document.getElementById('btn-clear-draw').style.display = 'block';
        clearPolygonDrawingData();
    } else {
        btn.classList.remove('active');
        btn.innerText = "📐 繪製新多邊形";
        if (drawPoints.length === 0) {
            document.getElementById('btn-end-draw').style.display = 'none';
            document.getElementById('btn-clear-draw').style.display = 'none';
        }
    }
}

function clearPolygonDrawingData() {
    drawPoints = [];
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    drawMarkers.clearLayers();
}

function cancelCurrentDraw() {
    clearPolygonDrawingData();
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製新多邊形";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-clear-draw').style.display = 'none';
}

function finishPolygon() {
    if (drawPoints.length < 3) {
        alert("請至少點選 3 個以上的頂點才能閉合範圍！");
        return;
    }
    if (previewPolyline) { map.removeLayer(previewPolyline); previewPolyline = null; }
    
    // 建立新多邊形物件
    const newPolygon = {
        id: Date.now(),
        points: [...drawPoints],
        centroid: calculateCentroid(drawPoints)
    };
    
    polygons.push(newPolygon);
    
    // 繪製多邊形
    renderPolygon(newPolygon);
    
    // 清空繪製資料
    clearPolygonDrawingData();
    isDrawingPolygon = false;
    const btn = document.getElementById('btn-start-draw');
    btn.classList.remove('active');
    btn.innerText = "📐 繪製新多邊形";
    document.getElementById('btn-end-draw').style.display = 'none';
    document.getElementById('btn-clear-draw').style.display = 'none';
    
    // 更新列表
    updatePolygonList();
    
    // 選取新多邊形
    selectPolygon(newPolygon.id);
}

function calculateCentroid(pts) {
    if (!pts || pts.length < 3) return null;
    
    let coordinates = pts.map(p => [p[1], p[0]]);
    if (coordinates[0][0] !== coordinates[coordinates.length-1][0] || coordinates[0][1] !== coordinates[coordinates.length-1][1]) {
        coordinates.push([pts[0][1], pts[0][0]]);
    }
    
    let turfPoly = turf.polygon([coordinates]);
    let centroid = turf.centroid(turfPoly);
    
    return {
        lat: centroid.geometry.coordinates[1],
        lon: centroid.geometry.coordinates[0]
    };
}

function renderPolygon(polygonObj) {
    const color = selectedPolygonId === polygonObj.id ? '#3b82f6' : '#dc2626';
    const weight = selectedPolygonId === polygonObj.id ? 4 : 3;
    
    // 移除舊的多邊形
    if (polygonObj.leafletPolygon) {
        map.removeLayer(polygonObj.leafletPolygon);
    }
    if (polygonObj.editMarkers) {
        map.removeLayer(polygonObj.editMarkers);
    }
    
    // 建立新多邊形
    const leafletPolygon = L.polygon(polygonObj.points, {
        color: color,
        weight: weight,
        fillColor: color,
        fillOpacity: 0.25
    }).addTo(map);
    
    leafletPolygon.on('click', () => selectPolygon(polygonObj.id));
    
    polygonObj.leafletPolygon = leafletPolygon;
    
    // 建立編輯標記層
    const editMarkers = L.layerGroup().addTo(map);
    
    polygonObj.points.forEach((pt, index) => {
        let marker = L.marker(pt, {
            icon: L.divIcon({
                className: '',
                html: '<div class="edit-handle"></div>',
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            }),
            draggable: true
        });
        
        marker.on('drag', function(e) {
            let newLatLng = e.target.getLatLng();
            polygonObj.points[index] = [newLatLng.lat, newLatLng.lng];
            leafletPolygon.setLatLngs(polygonObj.points);
        });
        
        marker.on('dragend', function() {
            polygonObj.centroid = calculateCentroid(polygonObj.points);
        });

        marker.addTo(editMarkers);
    });
    
    // 初始隱藏編輯標記，選取時才顯示
    if (selectedPolygonId !== polygonObj.id) {
        editMarkers.clearLayers();
    }
    
    polygonObj.editMarkers = editMarkers;
}

function selectPolygon(polygonId) {
    // 取消前一個選中
    if (selectedPolygonId !== null) {
        const prevPolygon = polygons.find(p => p.id === selectedPolygonId);
        if (prevPolygon) {
            renderPolygon(prevPolygon);
        }
    }
    
    // 選取新多邊形
    selectedPolygonId = polygonId;
    const selectedPoly = polygons.find(p => p.id === polygonId);
    
    if (selectedPoly) {
        renderPolygon(selectedPoly);
        
        // 更新中心點
        const centroid = selectedPoly.centroid;
        latInput.value = centroid.lat.toFixed(6);
        lonInput.value = centroid.lon.toFixed(6);
        origin = [centroid.lat, centroid.lon];
        
        // 更新使用者標記
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([centroid.lat, centroid.lon], {
            icon: L.divIcon({
                className: '',
                html: `<div style="width:18px; height:18px; background:#3b82f6; border:3px solid #ffffff; border-radius:50%; box-shadow:0 0 0 2px rgba(59,130,246,0.35);"></div>`,
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            }),
            interactive: false
        }).addTo(map);
        
        // 更新列表高亮
        updatePolygonList();
    }
}

function deletePolygon(polygonId) {
    const index = polygons.findIndex(p => p.id === polygonId);
    if (index > -1) {
        const polygon = polygons[index];
        if (polygon.leafletPolygon) {
            map.removeLayer(polygon.leafletPolygon);
        }
        if (polygon.editMarkers) {
            map.removeLayer(polygon.editMarkers);
        }
        polygons.splice(index, 1);
        
        if (selectedPolygonId === polygonId) {
            selectedPolygonId = null;
            if (polygons.length > 0) {
                selectPolygon(polygons[0].id);
            }
        }
        
        updatePolygonList();
    }
}

function updatePolygonList() {
    const listContent = document.getElementById('polygonListContent');
    
    if (polygons.length === 0) {
        listContent.innerHTML = '<div style="padding:8px; color:#999;">尚無多邊形</div>';
        return;
    }
    
    let html = '';
    polygons.forEach((polygon, index) => {
        const isSelected = selectedPolygonId === polygon.id;
        const area = calculatePolygonArea(polygon.points);
        html += `
            <div class="polygon-item ${isSelected ? 'selected' : ''}" onclick="selectPolygon(${polygon.id})">
                <div>
                    多邊形 ${index + 1}<br>
                    <small style="color:#666;">面積: ${area.toFixed(0)} m²</small>
                </div>
                <div class="polygon-item-actions">
                    <button onclick="event.stopPropagation(); deletePolygon(${polygon.id})">刪除</button>
                </div>
            </div>
        `;
    });
    
    listContent.innerHTML = html;
}

function calculatePolygonArea(pts) {
    if (!pts || pts.length < 3) return 0;
    
    let coordinates = pts.map(p => [p[1], p[0]]);
    if (coordinates[0][0] !== coordinates[coordinates.length-1][0] || coordinates[0][1] !== coordinates[coordinates.length-1][1]) {
        coordinates.push([pts[0][1], pts[0][0]]);
    }
    
    let turfPoly = turf.polygon([coordinates]);
    return turf.area(turfPoly);
}

function exportAllPolygonsSHP() {
    if (polygons.length === 0) {
        alert("目前沒有多邊形可供匯出！");
        return;
    }
    
    try {
        let featureLayer = [];
        
        polygons.forEach((polygon, index) => {
            let ring = polygon.points.map(p => [Number(p[1]), Number(p[0])]);
            ring.push([Number(polygon.points[0][1]), Number(polygon.points[0][0])]);
            
            let tempPoly = turf.polygon([ring]);
            let areaSqm = Math.round(turf.area(tempPoly));
            
            featureLayer.push({
                geometry: {
                    type: 'Polygon',
                    coordinates: [ring]
                },
                properties: {
                    Name: `Polygon_${index + 1}`,
                    Area_Sqm: areaSqm,
                    CentroidLat: polygon.centroid.lat,
                    CentroidLon: polygon.centroid.lon
                }
            });
        });
        
        shpwrite.download(featureLayer);
        
    } catch (err) {
        console.error("SHP Export Error:", err);
        
        // 備用 GeoJSON
        let geojsonObj = {
            type: "FeatureCollection",
            features: polygons.map((polygon, index) => {
                let ringBackup = polygon.points.map(p => [Number(p[1]), Number(p[0])]);
                ringBackup.push([Number(polygon.points[0][1]), Number(polygon.points[0][0])]);
                
                return {
                    type: "Feature",
                    geometry: { type: "Polygon", coordinates: [ringBackup] },
                    properties: {
                        Name: `Polygon_${index + 1}`,
                        Area_Sqm: Math.round(turf.area(turf.polygon([ringBackup]))),
                        CentroidLat: polygon.centroid.lat,
                        CentroidLon: polygon.centroid.lon
                    }
                };
            })
        };
        
        let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(geojsonObj));
        let downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "All_Polygons_Backup.geojson");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        
        alert("提示：由於網頁快取防護阻擋，系統已為您自動下載為高相容性的 .geojson 向量格式圖資。");
    }
}

function importPolygonSHP(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    
    if (file.name.endsWith('.geojson') || file.name.endsWith('.json')) {
        reader.onload = function(e) {
            try {
                const geojson = JSON.parse(e.target.result);
                processImportedGeoJSON(geojson);
            } catch (err) {
                alert("GeoJSON 解析失敗，請確認檔案格式正確。");
            }
        };
        reader.readAsText(file);
    } else if (file.name.endsWith('.zip')) {
        reader.onload = function(e) {
            shp(e.target.result).then(function(geojson) {
                processImportedGeoJSON(geojson);
            }).catch(function(err) {
                console.error(err);
                alert("SHP 解壓縮解碼失敗，請確保該 .zip 內含有同名的 .shp, .shx, .dbf 檔案。");
            });
        };
        reader.readAsArrayBuffer(file);
    }
    
    // 重置檔案輸入
    event.target.value = '';
}

function processImportedGeoJSON(geojson) {
    let features = [];
    
    if (geojson.type === "FeatureCollection") {
        features = geojson.features;
    } else if (geojson.type === "Feature") {
        features = [geojson];
    }
    
    // 處理 MultiPolygon 或單個 Polygon
    features.forEach(feature => {
        if (!feature || !feature.geometry) return;
        
        let polygonCoordinates = [];
        
        if (feature.geometry.type === "Polygon") {
            polygonCoordinates = [feature.geometry.coordinates[0]];
        } else if (feature.geometry.type === "MultiPolygon") {
            polygonCoordinates = feature.geometry.coordinates.map(poly => poly[0]);
        }
        
        polygonCoordinates.forEach(ring => {
            if (!ring || ring.length < 3) return;
            
            // 檢查座標系統
            const invalidCoord = ring.some(coord =>
                Math.abs(coord[1]) > 90 ||
                Math.abs(coord[0]) > 180
            );
            
            if (invalidCoord) {
                alert("此 SHP 可能不是 WGS84(EPSG:4326) 座標系統，請先轉換座標。");
                return;
            }
            
            // 移除閉合點
            if (ring.length > 1 && ring[0][0] === ring[ring.length-1][0] && ring[0][1] === ring[ring.length-1][1]) {
                ring.pop();
            }
            
            const points = ring.map(coord => [coord[1], coord[0]]);
            
            const newPolygon = {
                id: Date.now() + Math.random(),
                points: points,
                centroid: calculateCentroid(points)
            };
            
            polygons.push(newPolygon);
            renderPolygon(newPolygon);
        });
    });
    
    updatePolygonList();
    
    if (polygons.length > 0) {
        selectPolygon(polygons[0].id);
        map.panTo(polygons[0].points[0]);
    }
    
    alert("🎉 成功！已實時解壓縮讀取檔案內容，並 100% 完美還原您繪製的多邊形。");
}

/* ==================================
   DEM 高程查詢
   ================================== */
const elevationCache = {};
async function getElevation(lat, lon){

    const cacheKey =
        lat.toFixed(5)+","+lon.toFixed(5);

    if(elevationCache[cacheKey] !== undefined){
        return elevationCache[cacheKey];
    }

    try{

        const controller = new AbortController();

        const timeout = setTimeout(()=>{
            controller.abort();
        },10000);

        const url =
        `https://michael-chou.pages.dev/?lat=${lat}&lon=${lon}`;

        const res = await fetch(url,{
            signal:controller.signal
        });

        clearTimeout(timeout);

        console.log("DEM HTTP:", res.status, url);

        if(!res.ok){
            return null;
        }

        const text = await res.text();

        console.log("DEM RAW:", text);

        const data = JSON.parse(text);

        const ele =
            data?.results?.[0]?.elevation;

        if(ele !== null && ele !== undefined && !isNaN(ele)){

            elevationCache[cacheKey] = Number(ele);
            return elevationCache[cacheKey];

        }

        return null;

    } catch(err){

        console.error("DEM ERROR:", err);
        return null;
    }
}

/* 哈弗辛直線距離 */
function haversine(lat1, lon1, lat2, lon2){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);
const a= Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* OSRM 路由服務 */
async function getRouteDistance(to, straightDist, isJunction = false, isInZone = false){
if(isInZone) {
    return { value: 0, isFallback: false, msg: "" };
}
try{
if(!origin) return null;

let url = `https://router.project-osrm.org/route/v1/driving/${origin[1]},${origin[0]};${to[1]},${to[0]}?overview=false`;

if(isJunction) {
    url = `https://router.project-osrm.org/route/v1/driving/${to[1]},${to[0]};${origin[1]},${origin[0]}?overview=false&radiuses=50;unlimited`;
}

const res = await fetch(url);
const data = await res.json();

if(data.code === 'Ok' && data.routes && data.routes.length > 0){
    const distance = data.routes[0].distance;
    return { value: distance, isFallback: false, msg: "" };
} else {
    return { value: straightDist * 1.25, isFallback: true, msg: "(自動降級至直線*1.25)" };
}
}catch(err){
    console.error("Route Error:", err);
    return { value: straightDist * 1.25, isFallback: true, msg: "(自動降級至直線*1.25)" };
}
}

async function runQuery() {
if (!origin) {
    alert("請先設定查詢位置！");
    return;
}

const radius = parseFloat(radiusInput.value);
if (isNaN(radius) || radius <= 0) {
    alert("半徑必須為正數！");
    return;
}

const checkedTypes = Array.from(document.querySelectorAll('#panel input[type="checkbox"]:checked')).map(c => c.value);
if (checkedTypes.length === 0) {
    alert("請至少選擇一個查詢類型！");
    return;
}

queryBtn.disabled = true;
queryBtn.innerText = "查詢中...";

results = [];

try {
    for (const type of checkedTypes) {
        const url = `https://michael-chou.pages.dev/?type=${type}&lat=${origin[0]}&lon=${origin[1]}&radius=${radius}`;
        const res = await fetch(url);
        const data = await res.json();

        if (data && data.results) {
            for (const item of data.results) {
                const dist = haversine(origin[0], origin[1], item.latitude, item.longitude);
                const isInZone = dist <= radius;

                results.push({
                    name: item.name || "未知",
                    type: type,
                    latitude: item.latitude,
                    longitude: item.longitude,
                    distance: dist,
                    route: 0,
                    isInZone: isInZone
                });
            }
        }
    }

    for (const result of results) {
        const routeData = await getRouteDistance([result.latitude, result.longitude], result.distance, result.type === 'motorway_junction', result.isInZone);
        result.route = routeData.value;
    }

    displayResults();
} catch (err) {
    console.error("Query Error:", err);
    alert("查詢失敗，請重試！");
} finally {
    queryBtn.disabled = false;
    queryBtn.innerText = "查詢";
}
}

function displayResults() {
tbody.innerHTML = '';
let totalDist = 0, totalRoute = 0;

results.forEach((r, i) => {
    const row = tbody.insertRow();
    const isInZone = r.distance <= parseFloat(radiusInput.value);
    
    row.innerHTML = `
        <td>${r.name}</td>
        <td>${r.type}</td>
        <td>${(r.distance / 1000).toFixed(2)} km</td>
        <td>${(r.route / 1000).toFixed(2)} km</td>
    `;
    
    if (isInZone) {
        row.classList.add('highlight');
    }
    
    totalDist += r.distance;
    totalRoute += r.route;
});

routeInfo.innerHTML = `
路線距離：<strong>${(totalRoute / 1000).toFixed(2)} km</strong>
(直線距離：${(totalDist / 1000).toFixed(2)} km)
`;
}

function sortResults(field) {
sortState[field] = !sortState[field];
results.sort((a, b) => {
    const val = sortState[field] ? a[field] - b[field] : b[field] - a[field];
    return val;
});
displayResults();
}
