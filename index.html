<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市價徵收查估作業系統 v2.0</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0a0e27;
            --primary-light: #1a1f3a;
            --accent: #00d4ff;
            --accent-dark: #0099cc;
            --text-primary: #ffffff;
            --text-secondary: #b0b8cc;
            --border-color: #2a3550;
            --success: #4CAF50;
            --warning: #ff9800;
            --error: #f44336;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            color: var(--text-primary);
            overflow: hidden;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #systemTitleBar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 12px 20px;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            z-index: 1000;
            cursor: move;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.15);
            user-select: none;
            transition: all 0.3s ease;
        }

        #systemTitleBar:hover {
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.25);
            border-color: #00ffff;
        }

        #sidebar {
            position: absolute;
            top: 70px;
            left: 10px;
            width: 320px;
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid var(--accent);
            border-radius: 8px;
            z-index: 999;
            cursor: move;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        #sidebar:hover {
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.3);
        }

        .sidebar-header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            border-bottom: 2px solid var(--accent);
            padding: 15px;
            font-weight: 600;
            font-size: 14px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-section {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .section-title {
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .polygon-list {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            padding: 8px;
        }

        .polygon-item {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid var(--accent);
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .polygon-item:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: translateX(4px);
        }

        .polygon-item.selected {
            background: rgba(0, 212, 255, 0.3);
            border-left-color: #00ffff;
        }

        .polygon-item-label {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 3px;
        }

        .polygon-item-info {
            color: var(--text-secondary);
            font-size: 11px;
        }

        .polygon-item-delete {
            background: var(--error);
            color: white;
            border: none;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
            margin-top: 5px;
            transition: all 0.2s ease;
        }

        .polygon-item-delete:hover {
            background: #d32f2f;
            transform: scale(1.05);
        }

        button {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--primary-dark);
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
            width: 100%;
        }

        button:hover {
            background: linear-gradient(135deg, #00ffff, var(--accent));
            box-shadow: 0 4px 16px rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: rgba(26, 31, 58, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(26, 31, 58, 0.95);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }

        #resultPanel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 350px;
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 15px;
            z-index: 999;
            cursor: move;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2);
            max-height: 400px;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        #resultPanel:hover {
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.3);
        }

        .result-panel-header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            border-bottom: 2px solid var(--accent);
            padding: 10px;
            margin: -15px -15px 10px -15px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 12px;
        }

        .result-item {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid var(--accent);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 3px;
            font-size: 11px;
        }

        .result-item-label {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 3px;
        }

        .result-item-value {
            color: var(--text-primary);
        }

        #toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.15);
        }

        .toolbar-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--primary-dark);
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s ease;
            white-space: nowrap;
            margin: 0;
            width: auto;
        }

        .toolbar-btn:hover {
            background: linear-gradient(135deg, #00ffff, var(--accent));
            box-shadow: 0 4px 16px rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }

        .toolbar-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ff9999);
            color: white;
        }

        #drawToolbar {
            position: absolute;
            top: 80px;
            right: 10px;
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.15);
        }

        .draw-btn {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            color: var(--primary-dark);
            cursor: pointer;
            font-size: 20px;
            font-weight: 600;
            transition: all 0.2s ease;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .draw-btn:hover {
            background: linear-gradient(135deg, #00ffff, var(--accent));
            box-shadow: 0 4px 16px rgba(0, 212, 255, 0.4);
            transform: scale(1.1);
        }

        .draw-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ff9999);
        }

        #statusBar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 39, 0.95);
            border-top: 2px solid var(--accent);
            padding: 8px 15px;
            color: var(--text-secondary);
            font-size: 11px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #debugConsole {
            position: absolute;
            bottom: 60px;
            right: 10px;
            width: 300px;
            height: 200px;
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: var(--text-secondary);
            display: none;
            z-index: 999;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2);
        }

        .debug-log {
            margin: 2px 0;
            padding: 2px;
            border-left: 2px solid var(--accent);
            padding-left: 6px;
        }

        .debug-log.error {
            color: #ff6b6b;
            border-left-color: #ff6b6b;
        }

        .debug-log.warning {
            color: #ffa500;
            border-left-color: #ffa500;
        }

        .debug-log.info {
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .leaflet-control-attribution {
            background: rgba(10, 14, 39, 0.9) !important;
            color: var(--text-secondary) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 4px !important;
        }

        .leaflet-control-zoom {
            border-radius: 4px !important;
            overflow: hidden !important;
        }

        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out {
            background: rgba(0, 212, 255, 0.9) !important;
            color: var(--primary-dark) !important;
            border: none !important;
            font-weight: 700 !important;
            transition: all 0.2s ease !important;
        }

        .leaflet-control-zoom-in:hover,
        .leaflet-control-zoom-out:hover {
            background: #00ffff !important;
        }

        .leaflet-popup {
            background: rgba(10, 14, 39, 0.95) !important;
        }

        .leaflet-popup-content {
            color: var(--text-primary) !important;
            font-size: 12px !important;
        }

        .leaflet-popup-content-wrapper {
            background: rgba(10, 14, 39, 0.95) !important;
            border: 2px solid var(--accent) !important;
            border-radius: 4px !important;
        }

        .leaflet-popup-tip {
            background: rgba(10, 14, 39, 0.95) !important;
            border-left: 2px solid var(--accent) !important;
            border-right: 2px solid var(--accent) !important;
        }

        .hidden {
            display: none !important;
        }

        /* 滾動條樣式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00ffff;
        }

        @media (max-width: 768px) {
            #sidebar {
                width: 280px;
            }

            #resultPanel {
                width: 280px;
            }

            #systemTitleBar {
                font-size: 14px;
                padding: 10px 15px;
            }

            #toolbar {
                flex-direction: column;
            }

            .toolbar-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div id="map"></div>
    
    <div id="systemTitleBar">
        🗺️ 市價徵收查估作業系統 v2.0
    </div>
    
    <div id="sidebar">
        <div class="sidebar-header">⚙️ 控制面板</div>
        
        <div class="sidebar-section">
            <div class="section-title">📍 基本信息</div>
            <input type="text" id="siteName" placeholder="地點名稱">
            <input type="text" id="siteAddress" placeholder="地址">
            <input type="number" id="siteArea" placeholder="面積(m²)" step="0.01">
        </div>
        
        <div class="sidebar-section">
            <div class="section-title">📊 多邊形管理</div>
            <div class="polygon-list" id="polygonList"></div>
            <button onclick="map_system.clearAllPolygons()">清除所有多邊形</button>
        </div>
        
        <div class="sidebar-section">
            <div class="section-title">💾 數據操作</div>
            <button onclick="map_system.exportToExcel()">📥 匯出 Excel</button>
            <button onclick="document.getElementById('fileInput').click()">📤 匯入 SHP/GeoJSON</button>
            <input type="file" id="fileInput" style="display: none;" accept=".shp,.geojson,.json">
            <button onclick="map_system.exportGeoJSON()">🌐 匯出 GeoJSON</button>
            <button onclick="map_system.exportSHP()">🗂️ 匯出 SHP</button>
        </div>
        
        <div class="sidebar-section">
            <div class="section-title">🎯 位置工具</div>
            <button onclick="map_system.getLocation()">📍 GPS定位</button>
        </div>
        
        <div class="sidebar-section">
            <div class="section-title">🔧 系統</div>
            <button onclick="map_system.toggleDebugConsole()">調試控制台</button>
            <button onclick="map_system.generateReport()">生成報告</button>
        </div>
    </div>
    
    <div id="drawToolbar">
        <button class="draw-btn" id="drawPolygonBtn" title="繪製多邊形" onclick="map_system.toggleDrawMode()">🔲</button>
        <button class="draw-btn" id="clearDrawBtn" title="清除繪製" onclick="map_system.cancelDraw()">❌</button>
    </div>
    
    <div id="resultPanel" style="display: none;">
        <div class="result-panel-header">📈 結果面板</div>
        <div id="resultContent"></div>
    </div>
    
    <div id="toolbar">
        <button class="toolbar-btn" onclick="map_system.switchLayer('EMAP')">EMAP圖層</button>
        <button class="toolbar-btn" onclick="map_system.switchLayer('PHOTO')">航拍圖</button>
        <button class="toolbar-btn" onclick="map_system.switchLayer('CADASTRAL')">地籍圖</button>
        <button class="toolbar-btn" onclick="map_system.switchLayer('OSM')">OpenStreetMap</button>
    </div>
    
    <div id="statusBar">
        <div class="status-item">
            <span class="status-indicator"></span>
            <span>系統就緒</span>
        </div>
        <div class="status-item" id="statusCoords">經度: -- | 緯度: --</div>
    </div>
    
    <div id="debugConsole"></div>

    <!-- Leaflet JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <!-- Turf.js 6 -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    
    <!-- XLSX.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    
    <!-- GIS Formats -->
    <script src="https://cdn.jsdelivr.net/npm/shp-write@latest/dist/shp-write.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shpjs@latest/dist/shp.js"></script>
    
    <!-- GeoTIFF -->
    <script src="https://cdn.jsdelivr.net/npm/geotiff@latest/dist-browser/geotiff.js"></script>
    
    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        // ===========================
        // DebugLogger 類
        // ===========================
        class DebugLogger {
            constructor() {
                this.logs = [];
                this.maxLogs = 200;
                this.setupInterception();
            }

            setupInterception() {
                const originalLog = console.log;
                const originalError = console.error;
                const originalWarn = console.warn;
                const originalInfo = console.info;

                console.log = (...args) => {
                    this.addLog('info', args);
                    originalLog.apply(console, args);
                };

                console.error = (...args) => {
                    this.addLog('error', args);
                    originalError.apply(console, args);
                };

                console.warn = (...args) => {
                    this.addLog('warning', args);
                    originalWarn.apply(console, args);
                };

                console.info = (...args) => {
                    this.addLog('info', args);
                    originalInfo.apply(console, args);
                };
            }

            addLog(type, args) {
                const message = args.map(arg => 
                    typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
                ).join(' ');
                
                const timestamp = new Date().toLocaleTimeString();
                this.logs.push({ type, message, timestamp });

                if (this.logs.length > this.maxLogs) {
                    this.logs.shift();
                }

                this.updateConsole();
            }

            updateConsole() {
                const console = document.getElementById('debugConsole');
                if (console) {
                    console.innerHTML = this.logs.map(log => 
                        `<div class="debug-log ${log.type}">[${log.timestamp}] ${log.message}</div>`
                    ).join('');
                    console.scrollTop = console.scrollHeight;
                }
            }

            getLogs() {
                return this.logs;
            }
        }

        // ===========================
        // 全局變量
        // ===========================
        const debugLogger = new DebugLogger();
        let map;
        let currentLayer = 'EMAP';
        let isDrawing = false;
        let currentPolygon = [];
        let polygons = [];
        let drawMarkers = [];
        let colorRotation = 0;
        const colors = [
            '#FF0000', '#00FF00', '#0000FF', '#FFFF00', 
            '#FF00FF', '#00FFFF', '#FFA500', '#800080', 
            '#FFC0CB', '#A52A2A'
        ];

        // ===========================
        // 地圖系統對象
        // ===========================
        const map_system = {
            init: function() {
                console.log('初始化市價徵收查估系統...');
                
                // 初始化地圖
                map = L.map('map').setView([25.033, 121.565], 10);

                // 添加基礎圖層
                this.addBaseLayers();

                // 綁定地圖事件
                map.on('click', (e) => this.handleMapClick(e));
                map.on('mousemove', (e) => this.updateCoordinates(e));

                // 綁定文件輸入
                document.getElementById('fileInput').addEventListener('change', (e) => {
                    this.importFile(e);
                });

                console.log('系統初始化完成');
            },

            addBaseLayers: function() {
                // NLSC EMAP
                L.tileLayer(
                    'https://wmts.nlsc.gov.tw/googlemaps/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&TILEMATRIXSET=GoogleMapsCompatible_Level&FORMAT=image/jpeg&LAYER=EMAP&STYLE=&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}',
                    {
                        attribution: '© NLSC',
                        maxZoom: 20,
                        minZoom: 1,
                        name: 'EMAP'
                    }
                ).addTo(map);

                // OSM
                L.tileLayer(
                    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                    {
                        attribution: '© OpenStreetMap',
                        maxZoom: 19,
                        name: 'OSM'
                    }
                );

                // NLSC PHOTO
                L.tileLayer(
                    'https://wmts.nlsc.gov.tw/googlemaps/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&TILEMATRIXSET=GoogleMapsCompatible_Level&FORMAT=image/jpeg&LAYER=PHOTO&STYLE=&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}',
                    {
                        attribution: '© NLSC',
                        maxZoom: 20,
                        minZoom: 1,
                        name: 'PHOTO'
                    }
                );

                // NLSC Cadastral
                L.tileLayer(
                    'https://wmts.nlsc.gov.tw/googlemaps/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&TILEMATRIXSET=GoogleMapsCompatible_Level&FORMAT=image/png&LAYER=CADASTRAL&STYLE=&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}',
                    {
                        attribution: '© NLSC',
                        maxZoom: 20,
                        minZoom: 1,
                        name: 'CADASTRAL'
                    }
                );

                console.log('基礎圖層添加完成');
            },

            switchLayer: function(layerName) {
                console.log('切換圖層: ' + layerName);
                currentLayer = layerName;

                map.eachLayer(layer => {
                    if (layer instanceof L.TileLayer) {
                        map.removeLayer(layer);
                    }
                });

                let newLayer;
                switch(layerName) {
                    case 'EMAP':
                        newLayer = L.tileLayer(
                            'https://wmts.nlsc.gov.tw/googlemaps/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&TILEMATRIXSET=GoogleMapsCompatible_Level&FORMAT=image/jpeg&LAYER=EMAP&STYLE=&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}',
                            { attribution: '© NLSC', maxZoom: 20 }
                        );
                        break;
                    case 'PHOTO':
                        newLayer = L.tileLayer(
                            'https://wmts.nlsc.gov.tw/googlemaps/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&TILEMATRIXSET=GoogleMapsCompatible_Level&FORMAT=image/jpeg&LAYER=PHOTO&STYLE=&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}',
                            { attribution: '© NLSC', maxZoom: 20 }
                        );
                        break;
                    case 'CADASTRAL':
                        newLayer = L.tileLayer(
                            'https://wmts.nlsc.gov.tw/googlemaps/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&TILEMATRIXSET=GoogleMapsCompatible_Level&FORMAT=image/png&LAYER=CADASTRAL&STYLE=&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}',
                            { attribution: '© NLSC', maxZoom: 20 }
                        );
                        break;
                    case 'OSM':
                        newLayer = L.tileLayer(
                            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                            { attribution: '© OpenStreetMap', maxZoom: 19 }
                        );
                        break;
                }

                if (newLayer) {
                    newLayer.addTo(map);
                }
            },

            toggleDrawMode: function() {
                isDrawing = !isDrawing;
                console.log('繪製模式: ' + (isDrawing ? '啟用' : '禁用'));
                
                const btn = document.getElementById('drawPolygonBtn');
                if (isDrawing) {
                    btn.style.background = 'linear-gradient(135deg, #ff6b6b, #ff9999)';
                    btn.style.color = 'white';
                } else {
                    btn.style.background = 'linear-gradient(135deg, var(--accent), var(--accent-dark))';
                    btn.style.color = 'var(--primary-dark)';
                }
            },

            handleMapClick: function(e) {
                if (!isDrawing) return;

                const { lat, lng } = e.latlng;
                currentPolygon.push({ lat, lng });

                console.log(`添加頂點: ${lat.toFixed(6)}, ${lng.toFixed(6)}`);

                // 繪製標記
                const marker = L.circleMarker([lat, lng], {
                    radius: 6,
                    color: colors[colorRotation % colors.length],
                    fill: true,
                    fillColor: colors[colorRotation % colors.length],
                    fillOpacity: 0.8,
                    weight: 2
                }).addTo(map)
                  .bindPopup(`頂點 #${currentPolygon.length}`);

                drawMarkers.push(marker);

                // 繪製線段
                if (currentPolygon.length > 1) {
                    const prev = currentPolygon[currentPolygon.length - 2];
                    const current = currentPolygon[currentPolygon.length - 1];
                    
                    L.polyline(
                        [[prev.lat, prev.lng], [current.lat, current.lng]],
                        { color: colors[colorRotation % colors.length], weight: 2, opacity: 0.7 }
                    ).addTo(map);
                }

                this.updateResultPanel();
            },

            completeDraw: function() {
                if (currentPolygon.length < 3) {
                    alert('至少需要3個頂點');
                    return;
                }

                const coordinates = currentPolygon.map(p => [p.lng, p.lat]);
                coordinates.push(coordinates[0]); // 閉合多邊形

                const polygon = {
                    id: Date.now(),
                    name: `多邊形 ${polygons.length + 1}`,
                    coordinates: coordinates,
                    color: colors[colorRotation % colors.length],
                    area: this.calculatePolygonArea(coordinates),
                    centroid: this.calculateCentroid(coordinates)
                };

                // 在地圖上繪製多邊形
                L.polygon(coordinates, {
                    color: polygon.color,
                    weight: 2,
                    opacity: 0.7,
                    fillOpacity: 0.3,
                    fillColor: polygon.color
                }).addTo(map)
                  .bindPopup(`<strong>${polygon.name}</strong><br>面積: ${polygon.area.toFixed(2)} m²`);

                polygons.push(polygon);
                colorRotation++;

                console.log(`多邊形已完成: ${polygon.name}, 面積: ${polygon.area.toFixed(2)} m²`);

                this.updatePolygonList();
                this.cancelDraw();
                this.updateResultPanel();
            },

            calculatePolygonArea: function(coords) {
                const polygon = turf.polygon([coords]);
                return turf.area(polygon);
            },

            calculateCentroid: function(coords) {
                const polygon = turf.polygon([coords]);
                const center = turf.center(polygon);
                return center.geometry.coordinates;
            },

            updatePolygonList: function() {
                const list = document.getElementById('polygonList');
                list.innerHTML = polygons.map((poly, idx) => `
                    <div class="polygon-item">
                        <div class="polygon-item-label" style="color: ${poly.color}">■ ${poly.name}</div>
                        <div class="polygon-item-info">
                            面積: ${poly.area.toFixed(2)} m² | 頂點: ${poly.coordinates.length - 1}
                        </div>
                        <button class="polygon-item-delete" onclick="map_system.deletePolygon(${poly.id})">刪除</button>
                    </div>
                `).join('');

                console.log(`多邊形列表已更新, 共 ${polygons.length} 個`);
            },

            deletePolygon: function(id) {
                polygons = polygons.filter(p => p.id !== id);
                this.updatePolygonList();
                console.log(`多邊形已刪除, ID: ${id}`);
            },

            clearAllPolygons: function() {
                if (confirm('確定要清除所有多邊形嗎?')) {
                    polygons = [];
                    this.updatePolygonList();
                    console.log('所有多邊形已清除');
                }
            },

            cancelDraw: function() {
                isDrawing = false;
                currentPolygon = [];
                drawMarkers.forEach(m => map.removeLayer(m));
                drawMarkers = [];

                const btn = document.getElementById('drawPolygonBtn');
                btn.style.background = 'linear-gradient(135deg, var(--accent), var(--accent-dark))';
                btn.style.color = 'var(--primary-dark)';

                console.log('繪製已取消');
            },

            updateCoordinates: function(e) {
                const { lat, lng } = e.latlng;
                document.getElementById('statusCoords').textContent = 
                    `經度: ${lng.toFixed(6)} | 緯度: ${lat.toFixed(6)}`;
            },

            getLocation: function() {
                console.log('正在獲取GPS位置...');
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        const { latitude, longitude } = pos.coords;
                        map.setView([latitude, longitude], 15);
                        L.marker([latitude, longitude]).addTo(map).bindPopup('您的位置');
                        console.log(`GPS位置: ${latitude}, ${longitude}`);
                    }, err => {
                        console.error('GPS定位失敗: ' + err.message);
                        alert('GPS定位失敗');
                    });
                } else {
                    alert('您的瀏覽器不支持地理定位');
                }
            },

            exportToExcel: function() {
                console.log('準備匯出Excel...');
                
                const workbook = XLSX.utils.book_new();
                const data = polygons.map(p => ({
                    '名稱': p.name,
                    '面積(m²)': p.area.toFixed(2),
                    '頂點數': p.coordinates.length - 1,
                    '中心緯度': p.centroid[1].toFixed(6),
                    '中心經度': p.centroid[0].toFixed(6),
                    '顏色': p.color
                }));

                const worksheet = XLSX.utils.json_to_sheet(data);
                XLSX.utils.book_append_sheet(workbook, worksheet, '多邊形數據');
                XLSX.writeFile(workbook, '地籍查估數據.xlsx');

                console.log('Excel已匯出');
            },

            exportGeoJSON: function() {
                console.log('準備匯出GeoJSON...');
                
                const geojson = {
                    type: 'FeatureCollection',
                    features: polygons.map(p => ({
                        type: 'Feature',
                        geometry: {
                            type: 'Polygon',
                            coordinates: [p.coordinates]
                        },
                        properties: {
                            name: p.name,
                            area: p.area,
                            color: p.color
                        }
                    }))
                };

                const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '地籍查估數據.geojson';
                a.click();

                console.log('GeoJSON已匯出');
            },

            exportSHP: function() {
                console.log('準備匯出SHP...');
                alert('SHP匯出功能開發中');
            },

            importFile: function(event) {
                const file = event.target.files[0];
                if (!file) return;

                console.log('正在匯入文件: ' + file.name);

                if (file.name.endsWith('.geojson') || file.name.endsWith('.json')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const geojson = JSON.parse(e.target.result);
                            console.log('GeoJSON已解析');
                            alert('GeoJSON匯入成功');
                        } catch (err) {
                            console.error('GeoJSON解析失敗: ' + err.message);
                            alert('文件格式錯誤');
                        }
                    };
                    reader.readAsText(file);
                } else {
                    alert('不支持的文件格式');
                }
            },

            updateResultPanel: function() {
                const panel = document.getElementById('resultPanel');
                if (polygons.length === 0) {
                    panel.style.display = 'none';
                    return;
                }

                panel.style.display = 'block';
                const content = document.getElementById('resultContent');
                
                const totalArea = polygons.reduce((sum, p) => sum + p.area, 0);
                content.innerHTML = `
                    <div class="result-item">
                        <div class="result-item-label">多邊形總數</div>
                        <div class="result-item-value">${polygons.length}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-item-label">總面積</div>
                        <div class="result-item-value">${totalArea.toFixed(2)} m²</div>
                    </div>
                    ${polygons.map((p, i) => `
                        <div class="result-item">
                            <div class="result-item-label">${p.name}</div>
                            <div class="result-item-value">${p.area.toFixed(2)} m²</div>
                        </div>
                    `).join('')}
                `;
            },

            toggleDebugConsole: function() {
                const console = document.getElementById('debugConsole');
                console.style.display = console.style.display === 'none' ? 'block' : 'none';
                console.log('調試控制台已' + (console.style.display === 'none' ? '隱藏' : '顯示'));
            },

            generateReport: function() {
                console.log('生成報告...');
                alert('報告生成功能開發中');
            }
        };

        // ===========================
        // 拖曳系統
        // ===========================
        function makeDraggable(element) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            element.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                if (e.target !== element && !element.contains(e.target)) return;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        // ===========================
        // 初始化
        // ===========================
        window.addEventListener('load', () => {
            map_system.init();
            makeDraggable(document.getElementById('systemTitleBar'));
            makeDraggable(document.getElementById('sidebar'));
            makeDraggable(document.getElementById('resultPanel'));
            console.log('應用程序已啟動');
        });

        // 右鍵菜單 - 完成繪製
        document.addEventListener('contextmenu', (e) => {
            if (isDrawing && currentPolygon.length >= 3) {
                e.preventDefault();
                map_system.completeDraw();
            }
        });
    </script>
</body>
</html>
